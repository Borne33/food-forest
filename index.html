    {k:"Moist", c:"#9c9c9c", pat:"solid"},
    {k:"Wet", c:"#4c4c4c", pat:"solid"},
    {k:"Unknown", c:"#cfcabb", pat:"q"},
  ]},
  ph:{ label:"Soil pH", opts:[   // red acidic -> purple ~7 -> blue basic
    {k:"Acidic (4.5–5.5)", c:"#d1495b", pat:"solid"},
    {k:"Slightly acidic (5.5–6.5)", c:"#b0567e", pat:"solid"},
    {k:"Neutral (6.5–7.5)", c:"#8a6ea6", pat:"solid"},
    {k:"Alkaline (7.5–8.5)", c:"#4a7ab5", pat:"solid"},
    {k:"Unknown", c:"#cfcabb", pat:"q"},
  ]},
};
const SOIL_CATS=["texture","drainage","ph"];
const SOIL_BRUSH={ S:1, M:3, L:6 }; // brush radius in grid cells
function soilOptIdx(cat,k){ return SOIL_DEF[cat].opts.findIndex(o=>o.k===k); } // 0-based; array stores idx+1
// ray-casting point-in-polygon on [lat,lng] rings
function pointInRing(lat,lng,ring){
  let inside=false;
  for(let i=0,j=ring.length-1;i<ring.length;j=i++){
    const yi=ring[i][0],xi=ring[i][1],yj=ring[j][0],xj=ring[j][1];
    if(((yi>lat)!==(yj>lat)) && (lng < (xj-xi)*(lat-yi)/(yj-yi)+xi)) inside=!inside;
  }
  return inside;
}
function rleEncode(arr){ const out=[]; let v=arr[0],n=0; for(let i=0;i<arr.length;i++){ if(arr[i]===v){n++;} else {out.push([v,n]); v=arr[i]; n=1;} } out.push([v,n]); return out; }
function rleDecode(pairs,len){ const a=new Int8Array(len); let i=0; (pairs||[]).forEach(([v,n])=>{ for(let k=0;k<n&&i<len;k++) a[i++]=v; }); return a; }
const SOIL_PX=8; // px per grid cell on the offscreen raster canvas
function drawSoilPattern(ctx,pat,x,y,px){ // USDA-ish area symbols over the base tint
  ctx.save();
  if(pat==="dots"){ ctx.fillStyle="rgba(90,60,20,.55)"; ctx.beginPath(); ctx.arc(x+px*0.5,y+px*0.5,px*0.15,0,7); ctx.fill(); }
  else if(pat==="fine"){ ctx.fillStyle="rgba(90,80,40,.5)"; ctx.beginPath(); ctx.arc(x+px*0.34,y+px*0.34,px*0.08,0,7); ctx.arc(x+px*0.7,y+px*0.7,px*0.08,0,7); ctx.fill(); }
  else if(pat==="hatch"){ ctx.strokeStyle="rgba(70,30,20,.5)"; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(x,y+px); ctx.lineTo(x+px,y); ctx.stroke(); }
  else if(pat==="q"){ ctx.fillStyle="rgba(80,80,80,.4)"; ctx.fillRect(x+px*0.42,y+px*0.28,px*0.16,px*0.16); ctx.fillRect(x+px*0.44,y+px*0.6,px*0.1,px*0.1); }
  ctx.restore();
}

function PlantingPlan({chosen, state, planId, openDetail, onSoilDerived}){
  const STEPS=[{key:"plants",label:"Plants"},{key:"map",label:"Map & Areas"},{key:"soil",label:"Soil Map"},{key:"place",label:"Place Plants"}];
  const [ready,setReady]=useState(false);
  const [mapReady,setMapReady]=useState(false);
  const [step,setStep]=useState("plants");
  const [counts,setCounts]=useState({});   // {plantId:n}
  const [view,setView]=useState(null);      // {center:[lat,lng], zoom, base}
  const [polys,setPolys]=useState([]);      // [[[lat,lng],...], ...]
  const [places,setPlaces]=useState([]);    // [{id, plantId, lat, lng}]
  const [placeMode,setPlaceMode]=useState("plant"); // plant | move
  const [activeSp,setActiveSp]=useState(null);
  const [geo,setGeo]=useState("");
  // Step 3 soil map
  const [soilMap,setSoilMap]=useState(null);   // {grid:{cols,rows,b:[[s,w],[n,e]]}, data:{texture:rle,drainage:rle,ph:rle}} (persisted)
  const [soilCat,setSoilCat]=useState("texture");
  const [soilTool,setSoilTool]=useState({type:"paint", k:"Sandy"}); // {type:paint,k} | {type:erase} | {type:pan}
  const [soilBrush,setSoilBrush]=useState("M");
  const [soilTick,setSoilTick]=useState(0); // bump to force overlay redraw

  const byId=useMemo(()=>{ const m={}; chosen.forEach(p=>m[p.id]=p); return m; },[chosen]);
  const codes=useMemo(()=>ppCodes(chosen),[chosen]);
  const stepIdx=STEPS.findIndex(s=>s.key===step);

  const mapRef=useRef(null), mapObj=useRef(null), drawn=useRef(null), placeG=useRef(null);
  const drawCtl=useRef(null), markers=useRef({});
  // soil raster: arrays (Int8 per category), inside-polygon mask, offscreen canvas, image overlay
  const soilArr=useRef(null), soilMask=useRef(null), soilCanvas=useRef(null), soilOverlay=useRef(null);
  const soilGrid=useRef(null), soilPainting=useRef(false), soilRaf=useRef(0);
  const soilCatRef=useRef(soilCat), soilToolRef=useRef(soilTool), soilBrushRef=useRef(soilBrush);
  useEffect(()=>{soilCatRef.current=soilCat;},[soilCat]);
  useEffect(()=>{soilToolRef.current=soilTool;},[soilTool]);
  useEffect(()=>{soilBrushRef.current=soilBrush;},[soilBrush]);
  const stepRef=useRef(step), modeRef=useRef(placeMode), activeRef=useRef(activeSp), openRef=useRef(openDetail);
  useEffect(()=>{stepRef.current=step;},[step]);
  useEffect(()=>{modeRef.current=placeMode;},[placeMode]);
  useEffect(()=>{activeRef.current=activeSp;},[activeSp]);
  useEffect(()=>{openRef.current=openDetail;},[openDetail]);

  // latest place-at fn (fresh counts/places closure), called by the map click handler
  const placeAtRef=useRef(()=>{});
  placeAtRef.current=(plantId,lat,lng)=>{
    const cap=counts[plantId]||0, cur=places.filter(x=>x.plantId===plantId).length;
    if(cur>=cap) return;
    setPlaces(ps=>[...ps,{id:"pl_"+Math.random().toString(36).slice(2,9),plantId,lat,lng}]);
  };

  /* ---- load layout on mount (localStorage instant, Supabase authoritative) ---- */
  useEffect(()=>{
    let cancelled=false;
    const apply=(L)=>{ if(!L) return;
      if(L.step && STEPS.some(s=>s.key===L.step)) setStep(L.step);
      setCounts(L.counts||{}); setView(L.view||null); setPolys(L.polys||[]); setPlaces(L.places||[]); setSoilMap(L.soilMap||null);
    };
    try{ const s=localStorage.getItem("ff-layout-"+planId); if(s) apply(JSON.parse(s)); }catch(e){}
    dataProvider.loadLayout(planId).then(remote=>{ if(cancelled) return; apply(remote); setReady(true); })
      .catch(e=>{ console.error(e); if(!cancelled) setReady(true); });
    return ()=>{ cancelled=true; };
  },[planId]);

  /* ---- autosave (debounced) once loaded ---- */
  const saveT=useRef(null);
  useEffect(()=>{
    if(!ready) return;
    const layout={ v:1, step, counts, view, polys, places, soilMap };
    try{ localStorage.setItem("ff-layout-"+planId, JSON.stringify(layout)); }catch(e){}
    clearTimeout(saveT.current);
    saveT.current=setTimeout(()=>{ dataProvider.saveLayout(planId,layout).catch(e=>console.error(e)); },800);
    return ()=>clearTimeout(saveT.current);
  },[ready,planId,step,counts,view,polys,places,soilMap]);

  /* ---- create the Leaflet map once data is loaded ---- */
  useEffect(()=>{
    if(!ready || mapObj.current || !mapRef.current || !window.L) return;
    const bases=TILE_LAYERS.map(t=>L.tileLayer(t.url,{maxZoom:t.max,attribution:t.attr}));
    const baseIdx=(view&&Number.isInteger(view.base))?view.base:0;
    const center=(view&&view.center)||[42.9,-75.5], zoom=(view&&view.zoom)||7; // default: upstate NY
    const map=L.map(mapRef.current,{center,zoom,layers:[bases[baseIdx]||bases[0]]});
    const baseObj={}; TILE_LAYERS.forEach((t,i)=>baseObj[t.name]=bases[i]);
    L.control.layers(baseObj,null,{position:"topright"}).addTo(map);
    drawn.current=new L.FeatureGroup(); map.addLayer(drawn.current);
    placeG.current=new L.LayerGroup(); map.addLayer(placeG.current);
    // seed previously-drawn polygons
    (polys||[]).forEach(ring=>{ if(ring&&ring.length>=3)
      drawn.current.addLayer(L.polygon(ring,{color:"#3a6b2e",weight:2,fillColor:"#6f8a5f",fillOpacity:.12})); });
    const sync=()=>{ setPolys(drawn.current.getLayers().map(l=>l.getLatLngs()[0].map(p=>[p.lat,p.lng]))); };
    map.on(L.Draw.Event.CREATED, e=>{
      if(drawn.current.getLayers().length>=5){ alert("You can map up to 5 areas."); return; }
      drawn.current.addLayer(e.layer); sync();
    });
    map.on(L.Draw.Event.EDITED, sync);
    map.on(L.Draw.Event.DELETED, sync);
    const remember=()=>setView(v=>({center:[map.getCenter().lat,map.getCenter().lng],zoom:map.getZoom(),base:(v&&Number.isInteger(v.base))?v.base:baseIdx}));
    map.on("moveend zoomend", remember);
    map.on("baselayerchange", e=>{ const i=TILE_LAYERS.findIndex(t=>t.name===e.name); setView(v=>({center:[map.getCenter().lat,map.getCenter().lng],zoom:map.getZoom(),base:i<0?0:i})); });
    map.on("click", e=>{ if(stepRef.current==="place" && modeRef.current==="plant" && activeRef.current!=null) placeAtRef.current(activeRef.current,e.latlng.lat,e.latlng.lng); });
    mapObj.current=map; setMapReady(true);
    return ()=>{ map.remove(); mapObj.current=null; };
  },[ready]);

  /* ---- add/remove the polygon draw control per step; keep map sized ---- */
  useEffect(()=>{
    if(!mapReady) return; const map=mapObj.current;
    if(step==="map"){
      if(!drawCtl.current) drawCtl.current=new L.Control.Draw({
        draw:{ polygon:{ showArea:false, showLength:true, metric:false, feet:true, allowIntersection:false,
          shapeOptions:{color:"#3a6b2e",weight:2,fillColor:"#6f8a5f",fillOpacity:.12} },
          polyline:false, rectangle:false, circle:false, marker:false, circlemarker:false },
        edit:{ featureGroup:drawn.current } });
      map.addControl(drawCtl.current);
    } else if(drawCtl.current){ map.removeControl(drawCtl.current); }
    if(step!=="plants") setTimeout(()=>map.invalidateSize(),30);
  },[step,mapReady]);

  /* =============== Step 3 soil map: grid, raster render, painting =============== */
  const onSoilRef=useRef(onSoilDerived); useEffect(()=>{onSoilRef.current=onSoilDerived;},[onSoilDerived]);
  const polysBounds=()=>{ let s=90,w=180,n=-90,e=-180,any=false;
    polys.forEach(r=>r.forEach(([la,ln])=>{ any=true; if(la<s)s=la; if(la>n)n=la; if(ln<w)w=ln; if(ln>e)e=ln; }));
    return any?[[s,w],[n,e]]:null; };
  const computeGrid=(b)=>{ const [s,w]=b[0],[n,e]=b[1], midLat=(s+n)/2;
    const mLat=(n-s)*111320, mLng=(e-w)*111320*Math.cos(midLat*Math.PI/180), maxM=Math.max(mLat,mLng,1);
    const cell=Math.max(0.5,maxM/140);
    return { cols:Math.max(1,Math.min(160,Math.ceil(mLng/cell))), rows:Math.max(1,Math.min(160,Math.ceil(mLat/cell))), b }; };
  const computeMask=()=>{ const g=soilGrid.current; if(!g) return;
    const [s,w]=g.b[0],[n,e]=g.b[1], mask=new Uint8Array(g.cols*g.rows);
    for(let r=0;r<g.rows;r++){ const lat=n-(r+0.5)/g.rows*(n-s);
      for(let c=0;c<g.cols;c++){ const lng=w+(c+0.5)/g.cols*(e-w); let inside=false;
        for(const ring of polys){ if(ring.length>=3 && pointInRing(lat,lng,ring)){ inside=true; break; } }
        mask[r*g.cols+c]=inside?1:0; } }
    soilMask.current=mask; };
  const ensureCanvasOverlay=()=>{ const g=soilGrid.current; if(!g||!mapObj.current) return;
    if(!soilCanvas.current) soilCanvas.current=document.createElement("canvas");
    const cv=soilCanvas.current; cv.width=g.cols*SOIL_PX; cv.height=g.rows*SOIL_PX;
    const bnds=L.latLngBounds([g.b[0][0],g.b[0][1]],[g.b[1][0],g.b[1][1]]);
    if(!soilOverlay.current){ soilOverlay.current=L.imageOverlay(cv.toDataURL(),bnds,{opacity:0,interactive:false}); soilOverlay.current.addTo(mapObj.current); }
    else soilOverlay.current.setBounds(bnds); };
  const renderSoil=()=>{ const g=soilGrid.current, arr=soilArr.current, cv=soilCanvas.current; if(!g||!arr||!cv) return;
    const cat=soilCatRef.current, opts=SOIL_DEF[cat].opts, a=arr[cat], mask=soilMask.current, ctx=cv.getContext("2d");
    ctx.clearRect(0,0,cv.width,cv.height);
    for(let r=0;r<g.rows;r++){ for(let c=0;c<g.cols;c++){ const i=r*g.cols+c;
      if(mask&&!mask[i]) continue; const v=a[i]; if(!v) continue; const o=opts[v-1]; if(!o) continue;
      const x=c*SOIL_PX,y=r*SOIL_PX; ctx.fillStyle=o.c; ctx.fillRect(x,y,SOIL_PX,SOIL_PX); drawSoilPattern(ctx,o.pat,x,y,SOIL_PX); } }
    if(soilOverlay.current) soilOverlay.current.setUrl(cv.toDataURL()); };
  const scheduleSoilRender=()=>{ if(soilRaf.current) return; soilRaf.current=requestAnimationFrame(()=>{ soilRaf.current=0; renderSoil(); }); };
  const ensureSoilGrid=()=>{ if(!mapReady) return; let grid,arr;
    if(soilMap&&soilMap.grid){ grid=soilMap.grid; const len=grid.cols*grid.rows;
      arr={ texture:rleDecode(soilMap.data.texture,len), drainage:rleDecode(soilMap.data.drainage,len), ph:rleDecode(soilMap.data.ph,len) };
    } else { const b=polysBounds(); if(!b) return; grid=computeGrid(b); const len=grid.cols*grid.rows;
      arr={ texture:new Int8Array(len), drainage:new Int8Array(len), ph:new Int8Array(len) }; }
    soilGrid.current=grid; soilArr.current=arr; computeMask(); ensureCanvasOverlay(); renderSoil(); };
  const paintAt=(latlng)=>{ const g=soilGrid.current, arr=soilArr.current; if(!g||!arr) return;
    const [s,w]=g.b[0],[n,e]=g.b[1], cf=(latlng.lng-w)/(e-w), rf=(n-latlng.lat)/(n-s);
    if(cf<0||cf>1||rf<0||rf>1) return;
    const cc=Math.floor(cf*g.cols), rr=Math.floor(rf*g.rows), tool=soilToolRef.current, cat=soilCatRef.current, rad=SOIL_BRUSH[soilBrushRef.current]||1;
    const val = tool.type==="erase" ? 0 : (tool.type==="paint" ? soilOptIdx(cat,tool.k)+1 : -1); if(val<0) return;
    const a=arr[cat], mask=soilMask.current;
    for(let dr=-rad+1;dr<rad;dr++) for(let dc=-rad+1;dc<rad;dc++){
      if(dr*dr+dc*dc>(rad-0.5)*(rad-0.5)) continue; const R=rr+dr,C=cc+dc;
      if(R<0||C<0||R>=g.rows||C>=g.cols) continue; const i=R*g.cols+C; if(mask&&!mask[i]) continue; a[i]=val; }
    scheduleSoilRender(); };
  const deriveSoil=(arr)=>{ const prof={tex:[],dr:[],phL:[]}, ck={texture:"tex",drainage:"dr",ph:"phL"};
    SOIL_CATS.forEach(cat=>{ const a=arr[cat], opts=SOIL_DEF[cat].opts, cnt=new Array(opts.length).fill(0);
      for(let i=0;i<a.length;i++){ const v=a[i]; if(v) cnt[v-1]++; }
      let best=0,bi=-1; opts.forEach((o,idx)=>{ if(o.k==="Unknown") return; if(cnt[idx]>best){ best=cnt[idx]; bi=idx; } });
      if(bi>=0) prof[ck[cat]]=[opts[bi].k]; });
    if(onSoilRef.current) onSoilRef.current(prof); };
  const commitSoil=()=>{ const g=soilGrid.current, arr=soilArr.current; if(!g||!arr) return;
    setSoilMap({ grid:g, data:{ texture:rleEncode(arr.texture), drainage:rleEncode(arr.drainage), ph:rleEncode(arr.ph) } });
    deriveSoil(arr); };
  const resetSoil=()=>{ if(!confirm("Clear the painted soil map?")) return;
    soilGrid.current=null; soilArr.current=null; setSoilMap(null);
    if(soilOverlay.current){ soilOverlay.current.remove(); soilOverlay.current=null; }
    if(onSoilRef.current) onSoilRef.current({tex:[],dr:[],phL:[]});
    setTimeout(()=>{ ensureSoilGrid(); },0); };
  const sampleSoilAt=(lat,lng)=>{ const g=soilGrid.current, arr=soilArr.current; if(!g||!arr) return null;
    const [s,w]=g.b[0],[n,e]=g.b[1], cf=(lng-w)/(e-w), rf=(n-lat)/(n-s); if(cf<0||cf>1||rf<0||rf>1) return null;
    const c=Math.min(g.cols-1,Math.floor(cf*g.cols)), r=Math.min(g.rows-1,Math.floor(rf*g.rows)), i=r*g.cols+c;
    const val=cat=>{ const v=arr[cat][i]; if(!v) return null; const o=SOIL_DEF[cat].opts[v-1]; return (o&&o.k!=="Unknown")?o.k:null; };
    return { tex:val("texture"), dr:val("drainage"), ph:val("ph") }; };
  const soilFns=useRef({}); soilFns.current={ ensureSoilGrid, computeMask, renderSoil, paintAt, commitSoil };

  // placements sitting on unsuitable painted soil (#4)
  const soilFlags=useMemo(()=>{ const set=new Set();
    if(!soilArr.current||!soilGrid.current) return set;
    places.forEach(pl=>{ const p=byId[pl.plantId]; if(!p) return; const sm=sampleSoilAt(pl.lat,pl.lng); if(!sm) return;
      const sel={ tex:sm.tex?[sm.tex]:[], dr:sm.dr?[sm.dr]:[], ph:sm.ph?PH_BANDS.filter(b=>b.label===sm.ph):[] };
      const f=soilFit(p,sel);
      if((sm.tex&&f.t===0)||(sm.dr&&f.d===0)||(sm.ph&&f.h===0)) set.add(pl.id); });
    return set; },[places,soilMap,byId]);

  // build grid when data present; toggle overlay visibility by step
  useEffect(()=>{ if(!mapReady) return;
    if(!soilGrid.current && (soilMap || step==="soil")) ensureSoilGrid();
    if(step==="soil"){ computeMask(); renderSoil(); }
    if(soilOverlay.current) soilOverlay.current.setOpacity(step==="soil"?0.62:0);
  },[step,mapReady,soilMap]); // eslint-disable-line
  // re-render the active category when it changes
  useEffect(()=>{ if(step==="soil") renderSoil(); },[soilCat]); // eslint-disable-line
  // enable/disable map dragging so a brush stroke doesn't pan the map
  useEffect(()=>{ if(!mapReady) return; const map=mapObj.current, paint=step==="soil"&&soilTool.type!=="pan";
    if(paint) map.dragging.disable(); else map.dragging.enable();
    if(map.getContainer()) map.getContainer().classList.toggle("pppaint",paint);
    return ()=>{ if(mapObj.current) mapObj.current.dragging.enable(); };
  },[step,soilTool,mapReady]);
  // soil paint pointer handlers (attached once map exists; call latest fns via ref)
  useEffect(()=>{ if(!mapReady) return; const map=mapObj.current;
    const down=e=>{ if(stepRef.current!=="soil"||soilToolRef.current.type==="pan") return; soilPainting.current=true; soilFns.current.paintAt(e.latlng); };
    const move=e=>{ if(soilPainting.current) soilFns.current.paintAt(e.latlng); };
    const up=()=>{ if(soilPainting.current){ soilPainting.current=false; soilFns.current.commitSoil(); } };
    map.on("mousedown",down); map.on("mousemove",move); map.on("mouseup",up);
    return ()=>{ map.off("mousedown",down); map.off("mousemove",move); map.off("mouseup",up); };
  },[mapReady]);

  /* ---- render plant placements as canopy circles + labeled markers ---- */
  useEffect(()=>{
    if(!mapReady || !placeG.current) return;
    placeG.current.clearLayers(); markers.current={};
    places.forEach(pl=>{
      const p=byId[pl.plantId]; if(!p) return;
      const info=PP_LAYER[p.type]||{color:"#6f8a5f"};
      const rad=(CANOPY_FT[p.type]||6)*0.3048/2;
      const circle=L.circle([pl.lat,pl.lng],{radius:rad,color:info.color,weight:1.5,fillColor:info.color,fillOpacity:.28,interactive:false});
      const px=PP_MARK_PX[p.type]||24;
      const bd=soilFlags.has(pl.id)?"3px solid #dd4b3e":"2px solid #fff";
      const icon=L.divIcon({className:"",iconSize:[px,px],iconAnchor:[px/2,px/2],
        html:`<div class="ppmark" style="width:${px}px;height:${px}px;background:${info.color};border:${bd};font-size:${Math.max(8,Math.round(px*0.34))}px">${codes[pl.plantId]||"?"}</div>`});
      const marker=L.marker([pl.lat,pl.lng],{icon,draggable:placeMode==="move"});
      marker.on("click",()=>{ if(modeRef.current!=="move" && openRef.current) openRef.current(byId[pl.plantId]); });
      marker.on("dragend",()=>{ const ll=marker.getLatLng(); circle.setLatLng(ll); setPlaces(ps=>ps.map(x=>x.id===pl.id?{...x,lat:ll.lat,lng:ll.lng}:x)); });
      placeG.current.addLayer(circle); placeG.current.addLayer(marker);
      markers.current[pl.id]={marker,circle};
    });
  },[places,placeMode,mapReady,byId,codes,soilFlags]);

  /* ---- when placing, keep a species active until it's fully placed, then advance ---- */
  const toPlace=chosen.filter(p=>(counts[p.id]||0)>0);
  const placedCount=id=>places.filter(x=>x.plantId===id).length;
  useEffect(()=>{
    if(step!=="place") return;
    const remaining=id=>(counts[id]||0)-placedCount(id);
    if(activeSp==null || remaining(activeSp)<=0){
      const next=toPlace.find(p=>remaining(p.id)>0);
      setActiveSp(next?next.id:(toPlace[0]?toPlace[0].id:null));
    }
  },[step,places,counts]); // eslint-disable-line

  const setQty=(id,n)=>{ n=Math.max(0,Math.min(999,n|0)); setCounts(c=>{ const nc={...c}; if(n) nc[id]=n; else delete nc[id]; return nc; }); };
  const doRestart=()=>{
    if(!confirm("Restart this planting plan from scratch? Your plant counts, mapped areas, and placements will be cleared.")) return;
    if(drawn.current) drawn.current.clearLayers();
    setCounts({}); setView(null); setPolys([]); setPlaces([]); setActiveSp(null); setPlaceMode("plant"); setStep("plants");
  };
  const clearPolys=()=>{ if(drawn.current) drawn.current.clearLayers(); setPolys([]); };
  const doGeo=async()=>{
    const q=geo.trim(); if(!q||!mapObj.current) return;
    try{ const r=await fetch("https://nominatim.openstreetmap.org/search?format=json&limit=1&q="+encodeURIComponent(q));
      const j=await r.json();
      if(j&&j[0]) mapObj.current.setView([parseFloat(j[0].lat),parseFloat(j[0].lon)],18); else alert("Couldn't find that place.");
    }catch(e){ alert("Address lookup failed."); }
  };

  const areaM2=useMemo(()=>{
    if(!(window.L&&L.GeometryUtil&&L.GeometryUtil.geodesicArea)) return 0;
    return polys.reduce((a,ring)=>{ if(!ring||ring.length<3) return a; return a+Math.abs(L.GeometryUtil.geodesicArea(ring.map(([la,ln])=>L.latLng(la,ln)))); },0);
  },[polys]);
  const sqft=areaM2*M2_TO_SQFT, acres=areaM2*M2_TO_ACRE;
  const fmt=n=>Math.round(n).toLocaleString();
  const totalToPlace=chosen.reduce((a,p)=>a+(counts[p.id]||0),0);
  const treeCanopyM2=places.reduce((a,pl)=>{ const p=byId[pl.plantId]; if(p&&p.type==="Tree"){ const r=CANOPY_FT.Tree*0.3048/2; return a+Math.PI*r*r; } return a; },0);
  const treePct=areaM2?Math.round(treeCanopyM2/areaM2*100):0;
  const placedPlants=places.map(pl=>byId[pl.plantId]).filter(Boolean);
  const polCount=placedPlants.filter(p=>p.pol).length, deerCount=placedPlants.filter(p=>p.deerResistant).length;
  const LAYER_ORDER=["Canopy","Shrub","Herbaceous","Groundcover","Vine"];
  const LAYER_COLOR={Canopy:"#4f7a3a",Shrub:"#7a8b3f",Herbaceous:"#9bbf3a",Groundcover:"#c99a2e",Vine:"#9c6b9e"};
  const layerCounts={}; LAYER_ORDER.forEach(l=>layerCounts[l]=0);
  placedPlants.forEach(p=>{ const lyr=(PP_LAYER[p.type]||{}).layer; if(lyr&&layerCounts[lyr]!=null) layerCounts[lyr]++; });
  const maxLayer=Math.max(1,...LAYER_ORDER.map(l=>layerCounts[l]));
  const supportCount=placedPlants.filter(p=>p.nf||p.pol).length;
  const supportPct=placedPlants.length?Math.round(supportCount/placedPlants.length*100):0;

  return (
    <div>
      <div className="ppsteps">
        {STEPS.map((s,i)=>(
          <React.Fragment key={s.key}>
            {i>0 && <span className="arrow">→</span>}
            <button className={"ppstep"+(step===s.key?" on":"")+(i<stepIdx?" done":"")} onClick={()=>setStep(s.key)}>
              <span className="n">{i+1}</span>{s.label}
            </button>
          </React.Fragment>
        ))}
      </div>
      <div className="ppbar">
        <button className="ppbtn ghost" disabled={stepIdx<=0} onClick={()=>setStep(STEPS[stepIdx-1].key)}>← Back</button>
        <button className="ppbtn primary" disabled={stepIdx>=STEPS.length-1} onClick={()=>setStep(STEPS[stepIdx+1].key)}>Next →</button>
        <span className="grow"></span>
        <span className="pphint" style={{marginRight:8}}>Autosaves as you go</span>
        <button className="ppbtn danger" onClick={doRestart}>⟲ Restart</button>
      </div>

      {!ready && <div className="empty">Loading your planting plan…</div>}

      {ready && step==="plants" && (
        <div>
          <div className="pphint" style={{margin:"0 0 12px"}}>Enter how many of each plant you want to place. Vital stats are shown for each — click any row to open its full card. Total to place: <b>{totalToPlace}</b>.</div>
          <div className="pplist">
            <div className="pplhead">
              <div>Common name</div><div>Score</div><div>Min→fruit</div><div>Harvest</div><div>Ecology</div><div>Quantity</div>
            </div>
            {chosen.map(p=>{
              const sc=overall(p,state);
              return (
                <div className="pplrow" key={p.id} onClick={()=>openDetail(p)}>
                  <div className="cn">{p.common}<i>{p.sci}</i></div>
                  <div><span className="sc" style={{background:bandColor(sc),color:bandText(sc)}}>{sc}</span></div>
                  <div>{p.minPlantsFruit?(p.minPlantsFruit>=2?p.minPlantsFruit+" plants":"Self‑fruitful"):"—"}</div>
                  <div style={{fontSize:13,color:"var(--ink2)"}}>{nd(p.harvest)}</div>
                  <div className="eco">{p.nf&&<span className="ecopill nf">N‑fixer</span>}{p.pol&&<span className="ecopill">Pollinator</span>}{!p.nf&&!p.pol&&<span style={{color:"var(--faint)",fontSize:12}}>—</span>}</div>
                  <div className="ppqty" onClick={e=>e.stopPropagation()}>
                    <button onClick={()=>setQty(p.id,(counts[p.id]||0)-1)}>–</button>
                    <input type="number" min="0" value={counts[p.id]||0} onChange={e=>setQty(p.id,parseInt(e.target.value||"0",10))}/>
                    <button onClick={()=>setQty(p.id,(counts[p.id]||0)+1)}>+</button>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      <div className="ppmapwrap" style={{display: (ready&&step!=="plants")?"flex":"none"}}>
        <div className="ppmap" ref={mapRef}></div>
        {step==="map" && (
          <div className="ppside">
            <div className="ppcard">
              <h4>Find your site</h4>
              <div className="ppgeo">
                <input placeholder="Address or place…" value={geo} onChange={e=>setGeo(e.target.value)} onKeyDown={e=>{ if(e.key==="Enter") doGeo(); }}/>
                <button className="ppbtn" onClick={doGeo}>Go</button>
              </div>
              <div className="pphint">Use the polygon tool (top‑left of the map) to outline 1–5 areas. Edge length shows in feet as you draw. Switch Map / Satellite / Topographic at top‑right.</div>
            </div>
            <div className="ppcard">
              <h4>Mapped area · {polys.length}/5</h4>
              <div className="pptotals">
                <div className="pptot"><div className="v">{fmt(sqft)}</div><div className="l">sq ft</div></div>
                <div className="pptot"><div className="v">{acres.toFixed(3)}</div><div className="l">acres</div></div>
              </div>
              {polys.length>0 && <button className="ppbtn ghost" style={{marginTop:10,width:"100%"}} onClick={clearPolys}>Clear areas</button>}
            </div>
          </div>
        )}
        {step==="soil" && (
          <div className="ppside">
            {polys.length===0 && <div className="ppcard"><div className="pphint">Draw at least one area in <b>Step 2</b> first — soil paints only inside your mapped areas.</div></div>}
            <div className="ppcard">
              <h4>Soil category</h4>
              <div className="ppseg">
                {SOIL_CATS.map(c=><button key={c} className={soilCat===c?"on":""} onClick={()=>{ setSoilCat(c); setSoilTool({type:"paint",k:SOIL_DEF[c].opts[0].k}); }}>{SOIL_DEF[c].label}</button>)}
              </div>
              <div className="pphint" style={{marginTop:8}}>You paint one category at a time. A value replaces others in the <i>same</i> category but leaves the other two untouched.</div>
            </div>
            <div className="ppcard">
              <h4>{SOIL_DEF[soilCat].label} · legend & paint</h4>
              <div className="ppspecies" style={{maxHeight:"none"}}>
                {SOIL_DEF[soilCat].opts.map(o=>(
                  <button key={o.k} className={"ppsp"+(soilTool.type==="paint"&&soilTool.k===o.k?" on":"")} onClick={()=>setSoilTool({type:"paint",k:o.k})}>
                    <span className="dot" style={{background:o.c,border:"1px solid rgba(0,0,0,.25)"}}></span>
                    <span className="nm">{o.k}</span>
                  </button>
                ))}
                <button className={"ppsp"+(soilTool.type==="erase"?" on":"")} onClick={()=>setSoilTool({type:"erase"})}><span className="dot" style={{background:"#fff",border:"1px dashed #999"}}></span><span className="nm">Erase</span></button>
                <button className={"ppsp"+(soilTool.type==="pan"?" on":"")} onClick={()=>setSoilTool({type:"pan"})}><span className="dot" style={{border:"1px solid #999",background:"transparent"}}></span><span className="nm">Pan / move map</span></button>
              </div>
            </div>
            <div className="ppcard">
              <h4>Brush size</h4>
              <div className="ppseg">{["S","M","L"].map(b=><button key={b} className={soilBrush===b?"on":""} onClick={()=>setSoilBrush(b)}>{b==="S"?"Small":b==="M"?"Medium":"Large"}</button>)}</div>
              <button className="ppbtn ghost" style={{marginTop:10,width:"100%"}} onClick={resetSoil}>Clear soil map</button>
              <div className="pphint" style={{marginTop:8}}>This map feeds your <b>Soil Exam</b> (dominant value per category); you can still adjust the exam by hand afterward.</div>
            </div>
          </div>
        )}
        {step==="place" && (
          <div className="ppside">
            <div className="ppcard">
              <h4>Place plants</h4>
              <div className="ppseg" style={{marginBottom:10}}>
                <button className={placeMode==="plant"?"on":""} onClick={()=>setPlaceMode("plant")}>Plant</button>
                <button className={placeMode==="move"?"on":""} onClick={()=>setPlaceMode("move")}>Move</button>
              </div>
              <div className="pphint">{placeMode==="plant" ? (activeSp!=null ? <span>Click the map to place <b>{byId[activeSp]&&byId[activeSp].common}</b>. It keeps placing until all are down.</span> : "Pick a species below, then click the map.") : "Drag any plant to reposition it. Click a plant to open its card."}</div>
            </div>
            <div className="ppcard">
              <h4>Species</h4>
              <div className="ppspecies">
                {toPlace.length===0 && <div className="pphint">No counts yet — go to Step 1 and set how many of each plant you want.</div>}
                {toPlace.map(p=>{ const done=placedCount(p.id), cap=counts[p.id]||0, info=PP_LAYER[p.type]||{color:"#6f8a5f"};
                  return (
                    <button key={p.id} className={"ppsp"+(activeSp===p.id?" on":"")+(done>=cap?" done":"")} onClick={()=>setActiveSp(p.id)}>
                      <span className="dot" style={{background:info.color}}></span>
                      <span className="nm">{codes[p.id]} · {p.common}</span>
                      <span className="ct">{done}/{cap}</span>
                    </button>
                  );
                })}
              </div>
            </div>
            <div className="ppcard">
              <h4>Canopy legend</h4>
              <div className="ppleg">{PP_LAYER_LEGEND.map(([nm,c])=><span className="it" key={nm}><span className="sw" style={{background:c}}></span>{nm}</span>)}</div>
            </div>
            <div className="ppcard">
              <h4>Layer stacking</h4>
              {placedPlants.length===0 ? <div className="pphint">Place plants to see how they stack across forest layers.</div> :
                <div className="ppstack">
                  {LAYER_ORDER.map(l=>(
                    <div className="ppstackrow" key={l}>
                      <span className="lb">{l}</span>
                      <span className="track"><span className="fill" style={{width:Math.round(layerCounts[l]/maxLayer*100)+"%",background:LAYER_COLOR[l]}}></span></span>
                      <span className="vn">{layerCounts[l]}</span>
                    </div>
                  ))}
                </div>}
            </div>
            <div className="ppcard">
              <h4>Support species · target 25–35%</h4>
              <div className="ppgauge"><span className="band"></span><span className="fillg" style={{width:Math.min(100,supportPct)+"%"}}></span></div>
              <div className="pphint" style={{marginTop:7}}><b>{supportPct}%</b> of placed plants fix nitrogen or feed pollinators ({supportCount}/{placedPlants.length}). {placedPlants.length? (supportPct<25?"Consider adding more N‑fixers or pollinators.":supportPct>35?"Well supported — you have room for more productive plants.":"Nicely balanced."):""}</div>
            </div>
            <div className="ppcard">
              <h4>Plan health</h4>
              <div className="pphint">
                <b>{places.length}</b> of <b>{totalToPlace}</b> plants placed.<br/>
                Tree canopy fills <b style={{color:treePct>100?"var(--red)":"var(--sage-d)"}}>{treePct}%</b> of your mapped area.<br/>
                {soilMap && <span><b style={{color:soilFlags.size?"var(--red)":"var(--sage-d)"}}>{soilFlags.size}</b> placement{soilFlags.size===1?"":"s"} on unsuitable soil (red ring).<br/></span>}
                <b>{polCount}</b> pollinator‑supporting · <b>{deerCount}</b> deer‑resistant (of placed).
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function MyPlan({plants, state, plans, planItems, curPlan, setCurPlan, membership, toggle, newPlan, renamePlan, deletePlan, go}){
  const [detail,setDetail]=useState(null);
  const [view,setView]=useState("layers"); // layers | soil | risk
  const [soil,setSoil]=useState({tex:["Loam"], dr:["Well-drained"], phL:["Neutral (6.5–7.5)"]});
  const [soilDerived,setSoilDerived]=useState(null); // dominant profile from the Planting Plan soil map
  const lastDerived=useRef("");
  const onSoilDerived=(prof)=>{
    setSoilDerived(prof);
    const sig=JSON.stringify(prof), hasAny=prof && (prof.tex.length||prof.dr.length||prof.phL.length);
    if(sig!==lastDerived.current && hasAny){ lastDerived.current=sig;
      setSoil(s=>({ tex:prof.tex.length?prof.tex:s.tex, dr:prof.dr.length?prof.dr:s.dr, phL:prof.phL.length?prof.phL:s.phL })); }
  };
  const curObj=plans.find(p=>p.id===curPlan)||plans[0];
  const curSet=useMemo(()=>new Set(planItems.filter(it=>it.planId===curPlan).map(it=>it.plantId)),[planItems,curPlan]);
  const plan=plants.filter(p=>curSet.has(p.id)).map(p=>p.id); // plant ids in the CURRENT plan
  const curToggle=id=>toggle(id,curPlan);                      // add/remove within the current plan
  const planCount=id=>planItems.filter(it=>it.planId===id).length;
  const doNew=async()=>{ const nm=prompt("Name your new plan:",""); if(nm===null) return; try{ await newPlan(nm); }catch(e){ alert("Couldn't create plan: "+(e.message||e)); } };
  const doRename=()=>{ const nm=prompt("Rename plan:", curObj?curObj.name:""); if(nm!==null) renamePlan(curPlan,nm); };
  const doDelete=async()=>{ if(!curObj) return; if(!confirm(`Delete the plan "${curObj.name}" and its ${planCount(curPlan)} plant(s)? This can't be undone.`)) return; try{ await deletePlan(curPlan); }catch(e){ alert("Couldn't delete plan: "+(e.message||e)); } };
  const planBar=(
    <div className="planbar">
      {plans.map(pn=>(
        <button key={pn.id} className={"planchip"+(pn.id===curPlan?" on":"")} onClick={()=>setCurPlan(pn.id)}
          style={pn.id===curPlan?{background:pn.color,color:textOn(pn.color),borderColor:pn.color}:{}}>
          <span className="cdot" style={{background:pn.color}}></span>{pn.name}<span className="n">{planCount(pn.id)}</span>
        </button>
      ))}
      <button className="planchip add" onClick={doNew}>+ New plan</button>
      <span className="pgrow"></span>
      <button className="planlink" onClick={doRename}>✎ Rename</button>
      {plans.length>1 && <button className="planlink del" onClick={doDelete}>✕ Delete</button>}
    </div>
  );
  const chosen=plants.filter(p=>curSet.has(p.id));
  if(chosen.length===0){
    return (
      <div>
        {planBar}
        <div className="pagehead"><div className="eye">My Plans</div><h2>{curObj?curObj.name:"Your food forest"}</h2>
          <p>This plan is empty.</p></div>
        <div className="empty">Browse the database and add plants to <b>{curObj?curObj.name:"this plan"}</b> — the add button lets you pick which plan.<br/><br/>
          <button className="addbtn" onClick={()=>go("db")}>Go to the database</button></div>
      </div>
    );
  }
  const avg=Math.round(chosen.reduce((a,p)=>a+overall(p,state),0)/chosen.length*10)/10;
  const nfix=chosen.filter(p=>p.nf);
  const polls=chosen.filter(p=>p.pol);
  const heavy=chosen.filter(p=>["Tree"].includes(p.type) && (p.s.raw[0]>=7||p.s.cooked[0]>=7)); // fruit/nut feeders
  const groundcovers=chosen.filter(p=>p.type==="Herb"||p.type==="Fern");
  const invasive=chosen.filter(p=>nativity(p,state).v<0);

  // food-harvest coverage across the four seasons (edible plants only)
  const foodChosen=chosen.filter(isFood);
  const covered=new Set();
  foodChosen.forEach(p=>harvestSeasons(p).forEach(s=>covered.add(s)));
  const gaps=SEASONS.filter(s=>!covered.has(s));

  // symbiosis insights
  const insights=[];
  if(foodChosen.length){
    if(gaps.length===0)
      insights.push(<div className="insight" key="harv"><b>Year-round harvest.</b> Your edible plants together yield across all four seasons — nicely done.</div>);
    else
      insights.push(<div className="insight" key="harv"><b>Harvest calendar.</b> Your edible plants cover {[...SEASONS.filter(s=>covered.has(s))].join(", ")||"no seasons yet"}. Gap{gaps.length>1?"s":""}: <b>{gaps.join(", ")}</b> — see suggested additions to fill {gaps.length>1?"them":"it"}.</div>);
  }
  if(nfix.length && heavy.length)
    insights.push(<div className="insight" key="nf"><b>Nitrogen pairing.</b> Your {nfix.map(p=>p.common).join(", ")} fix nitrogen — site them near hungry fruit/nut trees like {heavy.map(p=>p.common).join(", ")} to feed them naturally.</div>);
  if(polls.length>=2)
    insights.push(<div className="insight" key="pol"><b>Pollinator support.</b> {polls.length} pollinator plants in your plan will boost fruit set across the whole guild; stagger their bloom for season-long coverage.</div>);
  if(groundcovers.length)
    insights.push(<div className="insight" key="gc"><b>Living ground layer.</b> {groundcovers.map(p=>p.common).join(", ")} can carpet the soil to suppress weeds and hold moisture under your taller plants.</div>);
  if(invasive.length)
    insights.push(<div className="insight" key="inv" style={{borderColor:"var(--red)",background:"#f6e3df"}}><b>Heads up.</b> {invasive.map(p=>p.common).join(", ")} scored as invasive in {STATE_NAMES[state]} — consider removing it from your plan.</div>);
  if(!nfix.length)
    insights.push(<div className="insight" key="nonf"><b>No nitrogen source yet.</b> Adding a nitrogen-fixer would help feed the rest of your plan with less fertilizer.</div>);

  // suggestions: top-scoring plants not in plan, prioritizing missing functions
  const notIn=plants.filter(p=>!plan.includes(p.id) && nativity(p,state).v>=0);
  const ranked=[...notIn].sort((a,b)=>overall(b,state)-overall(a,state));
  const suggestions=[];
  const pushSugg=(p,why)=>{ if(p && !suggestions.find(s=>s.p.id===p.id)) suggestions.push({p,why}); };
  if(!nfix.length) pushSugg(ranked.find(p=>p.nf),"adds nitrogen fixing");
  if(!polls.length) pushSugg(ranked.find(p=>p.pol),"adds pollinator support");
  if(!groundcovers.length) pushSugg(ranked.find(p=>p.type==="Herb"||p.type==="Fern"),"adds a ground layer");
  for(const g of gaps) pushSugg(ranked.find(p=>isFood(p)&&harvestSeasons(p).has(g)),"fills the "+g.toLowerCase()+" harvest gap");
  for(const p of ranked){ if(suggestions.length>=6) break; pushSugg(p,"high overall score for "+state); }

  // whole-forest category scores (average per category × 10, so each is out of 100)
  const catAvg=k=>Math.round(chosen.reduce((a,p)=>a+p.s[k][0],0)/chosen.length*10);
  const CAT_KEYS=[["raw","Edible Raw"],["cooked","Edible Cooked"],["life","Lifecycle"],["eco","Ecology"],["materials","Materials"],["med","Medicinal"]];
  // overall soil fit (from the Soil Examination view's current profile)
  const soilSel={tex:soil.tex, dr:soil.dr, ph:PH_BANDS.filter(b=>soil.phL.includes(b.label))};
  const avgSoilFit=chosen.length?Math.round(chosen.reduce((a,p)=>a+soilFit(p,soilSel).pct,0)/chosen.length):0;
  const nTypes=new Set(chosen.map(p=>p.type)).size;
  const NEUTRAL={bg:"#ece7d7", fg:"var(--ink)"};
  const scoreBox=(label,v)=>({label, val:v, bg:bandColor(v), fg:bandText(v)});
  const sfC=pctColor(avgSoilFit);
  const summaryBoxes=[
    {label:"Overall Score", val:avg, bg:bandColor(avg), fg:bandText(avg)},
    scoreBox("Edible Raw",catAvg("raw")), scoreBox("Edible Cooked",catAvg("cooked")),
    scoreBox("Lifecycle",catAvg("life")), scoreBox("Ecology",catAvg("eco")),
    scoreBox("Materials",catAvg("materials")), scoreBox("Medicinal",catAvg("med")),
    {label:"Plants", val:chosen.length, ...NEUTRAL}, {label:"Layers/types", val:nTypes, ...NEUTRAL},
    {label:"N-fixers", val:nfix.length, ...NEUTRAL}, {label:"Pollinator", val:polls.length, ...NEUTRAL},
    {label:"Overall Soil Fit", val:avgSoilFit+"%", bg:sfC, fg:sfC==="var(--yellow)"?"#2b2a22":"#fff"},
  ];

  return (
    <div>
      {planBar}
      <div className="pagehead"><div className="eye">My Plans · {chosen.length} plants</div>
        <h2>{curObj?curObj.name:"Your food forest"}</h2>
        <p>Layers, soil fit, and risks for the plants in this plan.</p></div>

      <div className="viewtoggle">
        <button className={view==="layers"?"on":""} onClick={()=>setView("layers")}>Forest Layers</button>
        <button className={view==="plant"?"on":""} onClick={()=>setView("plant")}>Planting Plan</button>
        <button className={view==="soil"?"on":""} onClick={()=>setView("soil")}>Soil Examination</button>
        <button className={view==="risk"?"on":""} onClick={()=>setView("risk")}>Risk Register</button>
      </div>

      {view==="layers" && (<React.Fragment>
        <div className="stats">
          {summaryBoxes.map(b=>(
            <div className="stat" key={b.label}>
              <div className="lab">{b.label}</div>
              <div className="v" style={{background:b.bg, color:b.fg}}>{b.val}</div>
            </div>
          ))}
        </div>

        <div className="foresttriad">
          <div style={{gridArea:"ins"}}>
            <div className="pagehead" style={{border:0,margin:"0 0 8px",padding:0}}><div className="eye">Symbiosis insights</div></div>
            {insights}
          </div>
          <div style={{gridArea:"layers"}}>
            <div className="pagehead" style={{border:0,margin:"0 0 10px",padding:0}}><div className="eye">Forest layers</div></div>
            {LAYERS.map((layer,li)=>{
              const inLayer=chosen.filter(p=>layer.types.includes(p.type));
              if(!inLayer.length) return null;
              return (
                <div className="layer" key={layer.name} style={{background:LAYER_BG[li],padding:"12px 12px 14px",borderRadius:6}}>
                  <h4>{layer.name}<span>{inLayer.length} plant{inLayer.length>1?"s":""}</span></h4>
                  <div className="minigrid">
                    {inLayer.map(p=><PlanMiniCard key={p.id} p={p} state={state} remove={curToggle} onOpen={setDetail} />)}
                  </div>
                </div>
              );
            })}
          </div>
          <div style={{gridArea:"sug"}}>
            <div className="pagehead" style={{border:0,margin:"0 0 8px",padding:0}}><div className="eye">Suggested additions</div></div>
            {suggestions.map(({p,why})=>(
              <div className="sugg" key={p.id} style={{display:"block"}}>
                <div><b>{p.common}</b> <span style={{fontStyle:"italic",color:"var(--ink2)"}}>{p.sci}</span><div className="why">{why} · scores {overall(p,state)}</div></div>
                <button className="addbtn" onClick={()=>curToggle(p.id)} style={{marginTop:6}}>+ Add</button>
              </div>
            ))}
          </div>
        </div>
      </React.Fragment>)}

      {view==="plant" && <PlantingPlan key={curPlan} chosen={chosen} state={state} planId={curPlan} openDetail={setDetail} onSoilDerived={onSoilDerived} />}

      {view==="soil" && <SoilExam plants={plants} state={state} plan={plan} toggle={curToggle} soil={soil} setSoil={setSoil} soilDerived={soilDerived} />}

      {view==="risk" && (<React.Fragment>
        <div className="pagehead" style={{border:0,margin:"0 0 10px",padding:0}}><div className="eye">Risk register · from each plant's cautions</div></div>
        <RiskRegister chosen={chosen} />
      </React.Fragment>)}

      {detail && (
        <div className="pmodal">
          <div className="scrim" onClick={()=>setDetail(null)}></div>
          <div className="inner">
            <button className="x" onClick={()=>setDetail(null)}>Close ✕</button>
            <PlantCard p={detail} state={state} plans={plans} memberOf={membership[detail.id]} toggle={toggle} defaultOpen />
          </div>
        </div>
      )}
    </div>
  );
}

/* ---------- Scoring Guide page ---------- */
const GUIDE = {
  nativity:[
    [10,"Native to your selected state — best fit for local ecology."],
    [8,"Native to your broader region (e.g. the Northeast or Southeast) but not recorded in your state."],
    [5,"Native somewhere in the US, outside your region."],
    [4,"Native elsewhere in North America (Canada or Mexico) but not the US."],
    [3,"Native elsewhere in the Americas (Central or South America, or the Caribbean)."],
    [0,"Introduced from outside the Americas, but not classed as invasive."],
    [-5,"Invasive or prohibited in your area — actively harmful; avoid planting."],
  ],
  raw:[
    [10,"Excellent raw with strong evidence of safety & quality (e.g. blueberries)."],
    [9,"Good raw, well documented, minor caveats."],
    [4,"Edible raw but marginal, astringent, or limited evidence."],
    [1,"Technically raw-edible but poor/unsafe without cooking."],
    [0,"Toxic raw — must be cooked, or not eaten raw at all."],
  ],
  cooked:[
    [10,"Excellent cooked staple, strong evidence (e.g. hazelnuts)."],
    [9,"Reliable cooked food, well documented."],
    [4,"Edible cooked but minor/secondary use or thin evidence."],
    [1,"Rarely used cooked; weak evidence."],
    [0,"No meaningful cooked food use."],
  ],
  life:[
    [10,"Long-lived woody perennial — anchors a permanent food forest."],
    [8,"Hardy herbaceous/clumping perennial returning yearly."],
    [5,"Short-lived perennial or reliable self-seeder."],
    [2,"Biennial."],
    [0,"Annual — must be replanted each year (least permanence)."],
  ],
  eco:[
    [10,"Keystone ecological value — e.g. monarch host plus broad pollinator/wildlife support."],
    [8,"Strong pollinator and wildlife value, or nitrogen-fixing soil builder."],
    [5,"Moderate wildlife/pollinator value."],
    [2,"Limited ecological function."],
    [0,"Little to no ecological benefit (or net negative)."],
  ],
  materials:[
    [10,"Premium material use with strong evidence (e.g. rot-resistant timber, a major dye source)."],
    [7,"Solid documented material/craft use — timber, dye, cordage, basketry, or fiber."],
    [4,"Minor or historical material or dye use."],
    [1,"Negligible material value."],
    [0,"No material use."],
  ],
  med:[
    [10,"Well-supported medicinal use with peer-reviewed evidence."],
    [7,"Traditional medicinal use with some clinical/scientific backing."],
    [4,"Folk/ethnobotanical use, limited evidence."],
    [1,"Anecdotal claims only."],
    [0,"No documented medicinal use."],
  ],
};
function ScoringGuide(){
  const lvlColor=v=>({background:catColor(v),color:catText(v)});
  return (
    <div>
      <div className="pagehead"><div className="eye">Scoring Guide</div><h2>How each score is assigned</h2>
        <p>Every category is rated 0–10. Within a category, the <b>quality of supporting evidence</b> nudges the grade —
          a claimed use with no scientific backing scores lower than the same use confirmed by research. The overall
          score is the raw weighted sum of all categories.</p></div>

      <div className="gcat">
        <h3>Overall score &amp; color bands<span className="w">raw weighted sum</span></h3>
        <div className="scale">
          <p style={{margin:"4px 0 10px",fontSize:15}}>Overall = Nativity×4 + Edible&nbsp;Raw×2 + Edible&nbsp;Cooked×2 + Lifecycle×1 + Ecology×1 + Materials×0.7 + Medicinal×0.3. Range ≈ −20 to 110.</p>
          <div className="legend">
            <span style={{background:"var(--blue)",color:"#fff"}}>Blue 90–110</span>
            <span style={{background:"var(--green)",color:"#fff"}}>Green 80–89</span>
            <span style={{background:"var(--ygreen)"}}>Yellow-green 70–79</span>
            <span style={{background:"var(--yellow)"}}>Yellow 55–69</span>
            <span style={{background:"var(--orange)",color:"#fff"}}>Orange 30–54</span>
            <span style={{background:"var(--red)",color:"#fff"}}>Red ≤29</span>
          </div>
          <p style={{margin:"14px 0 6px",fontSize:15}}>Each category score also carries an <b>evidence tier</b> shown beside it — how well-supported the rating is. Stronger evidence justifies a higher, more confident score:</p>
          <div className="lvl" style={{gridTemplateColumns:"130px 1fr"}}><span className="b" style={{background:"var(--green)",color:"#fff"}}>Peer-reviewed</span><p>Backed by scientific studies or clinical research.</p></div>
          <div className="lvl" style={{gridTemplateColumns:"130px 1fr"}}><span className="b" style={{background:"var(--ygreen)"}}>Ethnobotanical</span><p>Documented traditional or historical use by Indigenous peoples and foragers.</p></div>
          <div className="lvl" style={{gridTemplateColumns:"130px 1fr"}}><span className="b" style={{background:"var(--yellow)"}}>Anecdotal</span><p>Informal reports or scattered claims without systematic documentation.</p></div>
          <div className="lvl" style={{gridTemplateColumns:"130px 1fr"}}><span className="b" style={{background:"var(--orange)",color:"#fff"}}>No evidence</span><p>No meaningful support for the claimed use in this category.</p></div>
        </div>
      </div>

      {CATS.map(c=>(
        <div className="gcat" key={c.key}>
          <h3>{c.label}<span className="w">weight ×{c.weight}</span></h3>
          <div className="scale">
            {GUIDE[c.key].map(([v,desc])=>(
              <div className="lvl" key={v}>
                <span className="b" style={lvlColor(v)}>{v}</span>
                <p>{desc}</p>
              </div>
            ))}
            {c.key==="nativity" && (
              <div style={{marginTop:14,borderTop:"1px dashed var(--dot)",paddingTop:14}}>
                <p style={{margin:"0 0 12px",fontSize:14.5}}>The <b>+8 "native to region"</b> credit uses the six regions below (50 states + DC). A plant is tagged with a region when it's native to at least half of that region's states.</p>
                <RegionMap/>
                <div style={{marginTop:16}}>
                  {Object.keys(REGION).map(reg=>(
                    <div className="lvl" style={{gridTemplateColumns:"168px 1fr"}} key={reg}>
                      <span className="b" style={{background:`var(${REGION_COLORS[reg]})`,color:REGION_DARKTEXT[reg]?"#2b2a22":"#fff",fontSize:11}}>{reg}</span>
                      <p className="mono" style={{fontSize:12.5,letterSpacing:".02em"}}>{REGION[reg].join(" · ")}</p>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        </div>
      ))}

      <div className="gcat">
        <h3>Soil fit<span className="w">Soil Exam · % match</span></h3>
        <div className="scale">
          <p style={{margin:"4px 0 10px",fontSize:15}}>The <b>Soil Exam</b> scores every plant against the soil you describe — its <b>texture</b>, <b>drainage</b>, and <b>pH</b>. Each of those three attributes gets a sub-score:</p>
          <div className="lvl" style={{gridTemplateColumns:"56px 1fr"}}><span className="b" style={{background:"var(--green)",color:"#fff"}}>1.0</span><p><b>Match</b> — the plant's preference includes what you selected.</p></div>
          <div className="lvl" style={{gridTemplateColumns:"56px 1fr"}}><span className="b" style={{background:"var(--yellow)"}}>0.5</span><p><b>Near</b> — an adaptable texture, one step off on the dry–moist–wet drainage scale, or a pH within 0.5 of the plant's range.</p></div>
          <div className="lvl" style={{gridTemplateColumns:"56px 1fr"}}><span className="b" style={{background:"var(--red)",color:"#fff"}}>0</span><p><b>Mismatch</b> — outside the plant's tolerated range.</p></div>
          <p style={{margin:"12px 0 6px",fontSize:15}}><b>% fit = (Texture + Drainage + pH) ÷ 3 × 100.</b> So a plant that matches all three scores 100%, two-of-three scores 67%, and so on.</p>

function flat(p, state){
  const nat=nativity(p,state);
  return {
    "Common Name":p.common, "Scientific Name":p.sci, "Family":p.family, "Type":p.type, "Lifecycle":p.life,
    "Overall":overall(p,state),
    "Nativity":nat.v, "Nativity Status":nat.label,
    "Edible Raw":p.s.raw[0], "Raw Evidence":TIER[p.s.raw[1]],
    "Edible Cooked":p.s.cooked[0], "Cooked Evidence":TIER[p.s.cooked[1]],
    "Lifecycle Score":p.s.life[0], "Ecology":p.s.eco[0], "Ecology Evidence":TIER[p.s.eco[1]],
    "Materials":p.s.materials[0], "Medicinal":p.s.med[0], "Medicinal Evidence":TIER[p.s.med[1]],
    "Nitrogen Fixer":p.nf?"Yes":"No", "Pollinator":p.pol?"Yes":"No",
    "Deer Resistant":p.deerResistant?"Yes":"No", "Hardiness Zones":p.hardinessZones,
    "NY Priority":p.decPriority?"Yes":"No",
    "Edible Parts":p.edibleParts, "Other Uses":p.otherUses, "Preparation":p.prep,
    "Harvest Time":p.harvest, "Sun":p.sun, "Soil":p.soil,
    "Soil pH":p.soilPh, "Soil N":p.soilN, "Soil P":p.soilP, "Soil K":p.soilK,
    "Health Risks":p.risks, "Where to Buy":p.buy,
    "Sources":p.sources.map(s=>s[1]).join(" | "),
  };
}
function download(filename, text, mime){
  const blob=new Blob([text],{type:mime});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url; a.download=filename; a.click();
  setTimeout(()=>URL.revokeObjectURL(url),500);
}
function esc(v){ v=String(v==null?"":v); return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v; }
function RawData({plants, state}){
  const rows=plants.map(p=>flat(p,state));
  const cols=Object.keys(rows[0]);
  const exportCSV=()=>{
    const csv=[cols.join(",")].concat(rows.map(r=>cols.map(c=>esc(r[c])).join(","))).join("\n");
    download(`native-food-forest_${state}.csv`, csv, "text/csv;charset=utf-8;");
  };
  const exportXLS=()=>{
    // Excel-readable HTML table (.xls) — opens natively in Excel, no library needed
    const th=cols.map(c=>`<th>${c}</th>`).join("");
    const trs=rows.map(r=>"<tr>"+cols.map(c=>`<td>${String(r[c]).replace(/&/g,"&amp;").replace(/</g,"&lt;")}</td>`).join("")+"</tr>").join("");
    const html=`<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel"><head><meta charset="utf-8"></head><body><table border="1"><thead><tr>${th}</tr></thead><tbody>${trs}</tbody></table></body></html>`;
    download(`native-food-forest_${state}.xls`, html, "application/vnd.ms-excel");
  };
  return (
    <div>
      <div className="pagehead"><div className="eye">Raw Data · {plants.length} rows</div><h2>Spreadsheet view</h2>
        <p>Every field and score behind the app, for {STATE_NAMES[state]}. Export to use in Excel, Sheets, or your own analysis.</p></div>
      <div className="exportrow">
        <button onClick={exportCSV}>⬇ Export CSV</button>
        <button className="alt" onClick={exportXLS}>⬇ Export Excel (.xls)</button>
      </div>
      <div className="tablewrap">
        <table>
          <thead><tr>{cols.map(c=><th key={c}>{c}</th>)}</tr></thead>
          <tbody>
            {rows.map((r,i)=><tr key={i}>{cols.map(c=>
              <td key={c} className={c==="Scientific Name"?"sci":""}
                  style={c==="Overall"?{fontFamily:"Space Mono",fontWeight:700,color:bandColor(r[c])}:null}>
                {c==="Sources"?<span className="mono" style={{fontSize:11}}>{r[c].split(" | ").length} links</span>:String(r[c])}
              </td>)}</tr>)}
          </tbody>
        </table>
      </div>
      <p className="footnote">Tip: the .xls export opens directly in Microsoft Excel; the .csv works everywhere including Google Sheets.</p>
    </div>
  );
}

/* ---------- Auth screen (email + password) ---------- */
function Auth(){
  const [mode,setMode]=useState("in"); // in | up
  const [email,setEmail]=useState("");
  const [pw,setPw]=useState("");
  const [busy,setBusy]=useState(false);
  const [msg,setMsg]=useState(null); // {type,text}

  const submit=async()=>{
    setMsg(null);
    if(!email || !pw){ setMsg({type:"err",text:"Enter an email and password."}); return; }
    if(mode==="up" && pw.length<6){ setMsg({type:"err",text:"Password must be at least 6 characters."}); return; }
    setBusy(true);
    try{
      if(mode==="in"){
        const { error } = await auth.signIn(email,pw);
        if(error) throw error;
        // onAuthStateChange in App will pick up the session
      }else{
        const { data, error } = await auth.signUp(email,pw);
        if(error) throw error;
        if(data.session){ /* auto signed in (email confirmation off) */ }
        else setMsg({type:"ok",text:"Account created. Check your email to confirm, then sign in."});
      }
    }catch(err){ setMsg({type:"err",text:err.message||String(err)}); }
    setBusy(false);
  };
  const reset=async()=>{
    if(!email){ setMsg({type:"err",text:"Enter your email above first."}); return; }
    const { error } = await auth.resetPassword(email);
    setMsg(error?{type:"err",text:error.message}:{type:"ok",text:"Password reset email sent."});
  };

  return (
    <div className="authwrap">
      <div className="authcard">
        <div className="acc">Native Food Forest Planner</div>
        <h2>{mode==="in"?"Sign in":"Create account"}</h2>
        <p className="sub">Your plan is saved to your account, so it's there on any device you sign in from.</p>
        <div className="fld"><label>Email</label>
          <input type="email" autoComplete="email" value={email} onChange={e=>setEmail(e.target.value)}
                 onKeyDown={e=>e.key==="Enter"&&submit()} placeholder="you@example.com" /></div>
        <div className="fld"><label>Password</label>
          <input type="password" autoComplete={mode==="in"?"current-password":"new-password"} value={pw}
                 onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()} placeholder="••••••••" /></div>
        <button className="authbtn" onClick={submit} disabled={busy}>
          {busy?"Working…":(mode==="in"?"Sign in":"Create account")}</button>
        {msg && <div className={"authmsg "+msg.type}>{msg.text}</div>}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <button className="authtoggle" onClick={()=>{setMode(m=>m==="in"?"up":"in");setMsg(null);}}>
            {mode==="in"?"Need an account? Create one":"Have an account? Sign in"}</button>
          {mode==="in" && <button className="authtoggle" onClick={reset}>Forgot password?</button>}
        </div>
      </div>
    </div>
  );
}

  const setScore=(k,i,v)=>setF(o=>({...o,scores:{...o.scores,[k]:i===0?[v,o.scores[k][1]]:[o.scores[k][0],v]}}));

  const save=async()=>{

      <div className="frow"><label>Risks</label>{T("risks")}</div>
      <div className="frow"><label>Where to buy</label>{T("buy")}</div>

      <h5>Category scores (0–10 + evidence tier)</h5>

function VerifyPage({plants, state, plans, membership, toggle, verifyToggle, removeImage, updatePlant}){

  const nver=plants.filter(p=>p.humanVerified).length;
  const view=plants.filter(p=>{
    if(filt==="yes" && !p.humanVerified) return false;
    if(filt==="no" && p.humanVerified) return false;

  });
  return (
    <div>
      <div className="pagehead">
        <div className="eye">Human Verify · {nver}/{plants.length} verified</div>

      <div className="controls">
        <div className="fld search"><label>Search name</label>

        <button className={"chip"+(filt==="yes"?" on":"")} onClick={()=>setFilt("yes")}>Verified</button>
        <button className={"chip"+(filt==="no"?" on":"")} onClick={()=>setFilt("no")}>Unverified</button>
      </div>
      <div className="count">{view.length} shown</div>
      {view.map(p=>(
        <div key={p.id}>
          <PlantCard p={p} state={state} plans={plans} memberOf={membership[p.id]} toggle={toggle} />
          <div className="vbar">
            <div className="vrow">
              <label>
                <input type="checkbox" checked={!!p.humanVerified}
                       onChange={e=>verifyToggle(p.id, e.target.checked)} />

              </label>
              <button className="editbtn" onClick={()=>setEditingId(editingId===p.id?null:p.id)}>
                {editingId===p.id?"Close editor":"✎ Edit data"}</button>
            </div>
            {editingId===p.id && <PlantEditor p={p} onSave={updatePlant} onCancel={()=>setEditingId(null)} />}
            {(p.images||[]).length>0 && (
              <div className="vphotos">
                <dt>Photos ({p.images.length}) — remove any wrong ones</dt>
                <div className="vthumbs">
                  {p.images.map((im)=>(
                    <div className="vthumb" key={im.url} title={im.title||""}>
                      <img src={im.url} alt={im.title||""} loading="lazy" />
                      <button className="rm" title="Remove this photo"
                              onClick={()=>{ if(confirm("Remove this photo (and its source) from "+p.common+"?")) removeImage(p.id, im.url); }}>✕</button>
                    </div>
                  ))}
                </div>
              </div>
            )}
            <div className="vsrc">
              <dt>All sources ({(p.sources||[]).length})</dt>
              {(p.sources||[]).map((s,i)=><a key={i} href={s[1]} target="_blank" rel="noreferrer">↗ {s[0]}</a>)}
            </div>
          </div>
        </div>
      ))}
      {view.length===0 && <div className="empty">No plants match those filters.</div>}
    </div>
  );
}

function MultiSelect({label, options, value, onChange}){

  return (
    <div className="msfield">
      <label>{label}</label>
      <div className="mscontrol" onClick={()=>setOpen(o=>!o)}>
        {value.length ? value.map(v=><span className="mschip" key={v}>{v.replace(/ \(.*/,"")}</span>) : <span className="msph">Any</span>}
        <span className="mschev">▼</span>
      </div>
      {open && (
        <div className="msmenu">
          {options.map(o=>(
            <div key={o} className={"msopt"+(value.includes(o)?" on":"")} onClick={()=>toggle(o)}>
              <span className="box">{value.includes(o)?"✓":""}</span>{o}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}
