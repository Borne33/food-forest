<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Native Food Forest Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,600;0,800;1,400;1,600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --paper:#f3efe3; --paper2:#ece7d7; --ink:#2b2a22; --ink2:#5b5743; --faint:#6c6750;
    --line:#c9c2ab; --dot:#c2bba2; --sage:#6f8a5f; --sage-d:#42603a;
    --blue:#3b82f6; --green:#46a34a; --ygreen:#9bbf3a; --yellow:#e0b932; --orange:#e8923c; --red:#dd4b3e;
    --soil:#7a5a34; --soil-d:#5c421f; --soil-bg:#efe4d0; --soil-line:#d8c39c;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--paper);color:var(--ink);font-family:'Spectral',Georgia,serif;line-height:1.5;-webkit-font-smoothing:antialiased}
  .mono{font-family:'Space Mono',ui-monospace,monospace}
  a{color:var(--sage-d)}
  button{font-family:inherit;cursor:pointer}
  /* ---------- chrome ---------- */
  .topbar{position:sticky;top:0;z-index:40;background:var(--paper);border-bottom:1.5px solid var(--ink);
    display:flex;align-items:center;justify-content:space-between;padding:12px 18px}
  .brand{display:flex;flex-direction:column;line-height:1.05}
  .brand .acc{font-family:'Space Mono';font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--faint)}
  .brand h1{margin:2px 0 0;font-size:21px;font-weight:800;letter-spacing:-.01em}
  .ham{border:1.5px solid var(--ink);background:var(--paper);border-radius:3px;width:42px;height:38px;display:flex;flex-direction:column;gap:4px;align-items:center;justify-content:center}
  .ham i{display:block;width:18px;height:2px;background:var(--ink)}
  .menu{position:fixed;inset:0;z-index:50;display:none}
  .menu.open{display:block}
  .menu .scrim{position:absolute;inset:0;background:rgba(20,18,10,.32)}
  .menu .panel{position:absolute;top:0;right:0;height:100%;width:min(320px,86vw);background:var(--paper);
    border-left:1.5px solid var(--ink);padding:18px;display:flex;flex-direction:column;gap:4px;box-shadow:-20px 0 50px -30px #000}
  .menu .panel .ttl{font-family:'Space Mono';font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--faint);margin:6px 4px 10px}
  .menu .panel button{text-align:left;border:0;background:transparent;font-family:'Spectral';font-size:18px;font-weight:600;
    padding:12px 12px;border-radius:4px;color:var(--ink);display:flex;justify-content:space-between;align-items:center}
  .menu .panel button:hover{background:var(--paper2)}
  .menu .panel button.active{background:var(--ink);color:var(--paper)}
  .menu .panel button .num{font-family:'Space Mono';font-size:11px;opacity:.6}
  .menu .close{margin-top:auto;border:1.5px solid var(--ink);border-radius:3px;background:transparent;padding:10px;font-family:'Space Mono';font-size:12px;letter-spacing:.1em;text-transform:uppercase}
  .wrap{max-width:1020px;margin:0 auto;padding:22px 18px 90px}
  .pagehead{border-bottom:1px solid var(--line);padding-bottom:14px;margin-bottom:18px}
  .pagehead .eye{font-family:'Space Mono';font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--faint)}
  .pagehead h2{margin:6px 0 4px;font-size:30px;font-weight:800;letter-spacing:-.02em}
  .pagehead p{margin:0;color:var(--ink2);max-width:680px}
  /* ---------- controls ---------- */
  .controls{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;margin-bottom:8px}
  .fld{display:flex;flex-direction:column;gap:4px}
  .fld label{font-family:'Space Mono';font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint)}
  .fld input,.fld select{font-family:'Spectral';font-size:15px;background:#fbf9f2;border:1.5px solid var(--line);border-radius:4px;padding:8px 10px;color:var(--ink)}
  .fld input:focus,.fld select:focus{outline:2px solid var(--sage);outline-offset:1px;border-color:var(--sage)}
  .search{min-width:230px;flex:1 1 230px}
  .dirbtn{border:1.5px solid var(--line);background:#fbf9f2;border-radius:4px;height:39px;width:42px;font-family:'Space Mono';font-size:16px}
  .toggles{display:flex;flex-wrap:wrap;gap:7px;margin:10px 0 4px}
  .chip{font-family:'Space Mono';font-size:11px;letter-spacing:.04em;border:1.5px solid var(--line);background:#fbf9f2;border-radius:99px;padding:6px 12px;color:var(--ink2)}
  .chip.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .count{font-family:'Space Mono';font-size:12px;color:var(--faint);margin:12px 2px 6px}
  .pager{display:flex;flex-wrap:wrap;gap:6px;align-items:center;justify-content:center;margin:14px 0}
  .pager button{font-family:'Space Mono';font-size:12px;border:1.5px solid var(--line);background:#fbf9f2;border-radius:4px;padding:6px 11px;color:var(--ink)}
  .pager button.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .pager button:disabled{opacity:.4;cursor:default}
  .pager .pgnum{font-family:'Space Mono';font-size:12px;color:var(--faint);padding:0 8px}
  /* ---------- Soil Exam ---------- */
  .msfield{position:relative;display:flex;flex-direction:column;gap:4px}
  .msfield>label{font-family:'Space Mono';font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint)}
  .mscontrol{min-height:39px;border:1.5px solid var(--soil-line);background:#fbf9f2;border-radius:4px;padding:5px 8px;display:flex;flex-wrap:wrap;gap:5px;align-items:center;cursor:pointer}
  .mschip{font-family:'Space Mono';font-size:11px;background:var(--soil-bg);color:var(--soil-d);border:1px solid var(--soil-line);border-radius:99px;padding:2px 8px}
  .msph{font-family:'Space Mono';font-size:12px;color:var(--faint)}
  .mschev{margin-left:auto;color:var(--soil);font-size:12px}
  .msmenu{position:absolute;top:100%;left:0;right:0;z-index:20;margin-top:4px;background:#fbf9f2;border:1.5px solid var(--soil-line);border-radius:5px;box-shadow:0 14px 30px -18px #000;overflow:hidden}
  .msopt{display:flex;align-items:center;gap:8px;padding:8px 11px;font-size:14px;cursor:pointer}
  .msopt:hover{background:var(--soil-bg)}
  .msopt .box{width:16px;height:16px;border:1.5px solid var(--soil-line);border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--paper)}
  .msopt.on .box{background:var(--soil-d);border-color:var(--soil-d)}
  .soilprof{background:var(--soil-bg);border:1.5px solid var(--soil-line);border-radius:6px;padding:14px 16px;display:flex;flex-wrap:wrap;align-items:center;gap:14px 22px;margin-bottom:16px}
  .soilprof .eyes{font-family:'Space Mono';font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--soil);flex-basis:100%}
  .soilprof .at label{font-family:'Space Mono';font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--soil);display:block}
  .soilprof .at .v{font-size:15px;color:var(--soil-d);font-weight:600}
  .soilprof .edit{margin-left:auto;align-self:center;border:1.5px solid var(--soil-d);background:transparent;color:var(--soil-d);border-radius:4px;padding:8px 13px;font-family:'Space Mono';font-size:11px;letter-spacing:.06em;text-transform:uppercase}
  .soiledit{background:var(--soil-bg);border:1.5px solid var(--soil-line);border-radius:6px;padding:14px 16px;margin-bottom:16px}
  .soiledit .grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
  .soiledit .done{margin-top:12px;border:1.5px solid var(--soil-d);background:var(--soil-d);color:var(--paper);border-radius:4px;padding:8px 16px;font-family:'Space Mono';font-size:11px;letter-spacing:.06em;text-transform:uppercase}
  .soilcols{display:grid;grid-template-columns:minmax(0,0.85fr) minmax(0,1.5fr) minmax(0,1fr);gap:14px;align-items:start}
  .swidget{border:1px solid var(--soil-line);background:#f7f1e6;border-radius:6px;padding:13px 15px}
  .swidget .wh{font-family:'Space Mono';font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--soil);border-bottom:1.5px solid var(--soil-line);padding-bottom:7px;margin-bottom:11px;display:flex;align-items:center;gap:6px}
  .sfmetrics{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
  .sfmetric{background:var(--soil-bg);border-radius:5px;padding:10px 12px}
  .sfmetric b{display:block;font-family:'Space Mono';font-size:24px;line-height:1.1}
  .sfmetric span{font-family:'Space Mono';font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--soil)}
  .smatrix{width:100%;border-collapse:collapse;font-size:13px}
  .smatrix th{font-family:'Space Mono';font-size:9px;letter-spacing:.04em;text-transform:uppercase;color:var(--faint);font-weight:400;text-align:center;padding:4px 3px;border-bottom:1.5px solid var(--soil-line)}
  .smatrix th.l{text-align:left}
  .smatrix td{padding:6px 3px;border-bottom:1px solid var(--soil-line);text-align:center}
  .smatrix td.l{text-align:left}
  .fdot{width:18px;height:18px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;color:#fff}
  .fdot.ok{background:var(--green)} .fdot.mid{background:var(--yellow);color:#2b2a22} .fdot.no{background:var(--red)}
  .fpct{font-family:'Space Mono';font-size:13px;font-weight:700}
  .ovmini{font-family:'Space Mono';font-size:11px;font-weight:700;padding:1px 6px;border-radius:3px;margin-left:6px}
  .ssug{border-bottom:1px solid var(--soil-line);padding:9px 0}
  .ssug:last-child{border-bottom:0}
  .ssug .top{display:flex;align-items:center;gap:8px}
  .ssug .nm{font-size:14px;flex:1;min-width:0}
  .ssug .dots{display:flex;gap:4px;margin:6px 0}
  .ssug .acts{display:flex;gap:6px}
  .ssug .acts button{flex:1;font-family:'Space Mono';font-size:11px;border:1.5px solid var(--soil-line);border-radius:4px;padding:4px 0;background:#fbf9f2;color:var(--soil-d);display:inline-flex;align-items:center;justify-content:center;gap:4px}
  .ssug .acts button.add{background:var(--sage-d);border-color:var(--sage-d);color:var(--paper)}
  .sinsight{border-left:3px solid var(--soil);background:var(--soil-bg);padding:8px 11px;border-radius:0 4px 4px 0;margin-bottom:8px;font-size:13.5px;color:var(--ink)}
  @media(max-width:820px){ .soilcols{grid-template-columns:1fr} .soiledit .grid{grid-template-columns:1fr} }
  /* ---------- plant card (Herbarium) ---------- */
  .card{background:#f7f4ea;border:1px solid var(--line);border-radius:3px;box-shadow:0 1px 0 #fff inset, 0 10px 24px -22px #000;margin-bottom:14px;overflow:hidden}
  .card .head{display:flex;align-items:flex-start;gap:14px;padding:15px 18px 12px;border-bottom:1.5px solid var(--ink);cursor:pointer}
  .card .head .info{flex:1 1 auto;min-width:0}
  .card .head .rgt{display:flex;align-items:flex-start;gap:12px;flex:0 0 auto}
  /* image carousel on the collapsed card */
  .pcar{flex:0 0 auto;width:132px}
  .pcar .frame{position:relative;width:132px;height:100px;border:1px solid var(--line);border-radius:4px;overflow:hidden;background:#efeadc}
  .pcar img{width:100%;height:100%;object-fit:cover;display:block}
  .pcar .nav{position:absolute;top:50%;transform:translateY(-50%);width:22px;height:22px;border-radius:99px;border:1px solid var(--line);
    background:rgba(247,244,234,.9);color:var(--ink);font-family:'Space Mono';font-size:12px;line-height:1;display:flex;align-items:center;justify-content:center;padding:0}
  .pcar .nav.l{left:4px} .pcar .nav.r{right:4px}
  .pcar .cap{font-family:'Space Mono';font-size:8.5px;color:var(--faint);text-align:center;margin-top:3px;line-height:1.25;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .pcar .dots{position:absolute;bottom:4px;left:0;right:0;display:flex;justify-content:center;gap:4px}
  .pcar .dots i{width:5px;height:5px;border-radius:99px;background:rgba(43,42,34,.35)}
  .pcar .dots i.on{background:var(--paper)}
  /* ---------- My Plan: layered mini cards ---------- */
  .layer{margin-bottom:22px}
  .layer h4{font-family:'Space Mono';font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink);
    border-bottom:1.5px solid var(--ink);padding-bottom:6px;margin:0 0 12px;display:flex;justify-content:space-between;align-items:baseline}
  .layer h4 span{font-size:10px;color:var(--faint)}
  .minigrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
  .mini{position:relative;border:1px solid var(--line);border-radius:5px;background:#f7f4ea;overflow:hidden;box-shadow:0 8px 20px -20px #000}
  .mini .mtop{position:relative;background:#efeadc;min-height:40px}
  .mini .pcar.full{width:100%}
  .mini .pcar.full .frame{width:100%;height:120px;border:0;border-radius:0}
  .mini .pcar .cap{display:none}
  .mini .mscore{position:absolute;top:6px;right:6px;z-index:3;font-family:'Space Mono';font-weight:700;font-size:15px;
    padding:2px 8px;border-radius:3px;box-shadow:0 1px 5px rgba(0,0,0,.35)}
  .mini .mrm{position:absolute;top:6px;left:6px;z-index:3;width:20px;height:20px;border-radius:99px;border:0;
    background:rgba(20,18,10,.55);color:#fff;font-family:'Space Mono';font-size:11px;line-height:1;
    display:flex;align-items:center;justify-content:center;padding:0}
  .mini{cursor:pointer}
  .mini .pcar .dots{display:none}
  .mini .mname{font-size:15px;font-weight:800;line-height:1.15;padding:9px 10px 0}
  .mini .msci{font-style:italic;color:var(--ink2);font-size:12.5px;padding:1px 10px 11px}
  /* harvest strip + fruit token overlaid on the image (no extra card height) */
  .mini .mstrip{position:absolute;left:0;right:0;bottom:0;z-index:2;display:flex;align-items:center;gap:5px;
    background:linear-gradient(transparent,rgba(20,18,10,.72) 45%);padding:14px 8px 5px;pointer-events:none}
  .mini .mstrip .harv{font-family:'Space Mono';font-size:9px;letter-spacing:.02em;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .mini .mstrip .fru{flex:0 0 auto;font-family:'Space Mono';font-size:9px;font-weight:700;color:#2b2a22;background:#f0d9a8;border-radius:3px;padding:1px 5px}
  /* left-click detail modal */
  .pmodal{position:fixed;inset:0;z-index:60;display:flex;align-items:flex-start;justify-content:center;padding:38px 14px;overflow:auto}
  .pmodal .scrim{position:fixed;inset:0;background:rgba(20,18,10,.42)}
  .pmodal .inner{position:relative;z-index:1;width:100%;max-width:720px}
  .pmodal .x{position:absolute;top:-32px;right:0;background:transparent;border:1.5px solid var(--paper);color:var(--paper);
    border-radius:3px;font-family:'Space Mono';font-size:12px;letter-spacing:.08em;text-transform:uppercase;padding:6px 12px}
  /* human-verified badge (collapsed card, left of the overall score) */
  .vchk{text-align:center;align-self:start}
  .vchk b{display:flex;align-items:center;justify-content:center;width:34px;height:34px;margin:0 auto;border-radius:99px;
    background:var(--sage-d);color:var(--paper);font-size:18px;line-height:1}
  .vchk small{font-family:'Space Mono';font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--sage-d);display:block;margin-top:4px;font-weight:700}
  /* verify page */
  .vbar{border:1px solid var(--line);border-top:0;border-radius:0 0 4px 4px;background:#faf7ef;padding:12px 16px;margin:-14px 0 16px}
  .vbar .vrow{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .vbar label{display:flex;align-items:center;gap:9px;font-family:'Space Mono';font-size:13px;letter-spacing:.03em;
    text-transform:uppercase;color:var(--ink);cursor:pointer;font-weight:700}
  .vbar input[type=checkbox]{width:20px;height:20px;accent-color:var(--sage-d);cursor:pointer}
  .vbar .vsrc{margin-top:10px}
  .vbar .vsrc dt{font-family:'Space Mono';font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin-bottom:4px}
  .vbar .vsrc a{display:block;font-family:'Space Mono';font-size:12px;margin:2px 0;color:var(--sage-d);word-break:break-all}
  .vbar .vphotos{margin-top:12px}
  .vbar .vphotos dt{font-family:'Space Mono';font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin-bottom:4px}
  .vbar .vthumbs{display:flex;flex-wrap:wrap;gap:8px}
  .vbar .vthumb{position:relative;width:74px;height:56px;border:1px solid var(--line);border-radius:4px;overflow:hidden;background:#efeadc}
  .vbar .vthumb img{width:100%;height:100%;object-fit:cover;display:block}
  .vbar .vthumb .rm{position:absolute;top:2px;right:2px;width:19px;height:19px;border-radius:99px;border:0;
    background:rgba(221,75,62,.94);color:#fff;font-family:'Space Mono';font-size:11px;line-height:1;
    display:flex;align-items:center;justify-content:center;padding:0}
  .vbar .vrow{justify-content:space-between}
  .editbtn{border:1.5px solid var(--sage-d);background:transparent;color:var(--sage-d);border-radius:4px;padding:5px 11px;font-family:'Space Mono';font-size:11px;letter-spacing:.05em;text-transform:uppercase}
  .peditor{border:1.5px solid var(--sage-d);border-radius:6px;background:#f4f7ee;padding:14px 16px;margin:10px 0 16px}
  .peditor h5{font-family:'Space Mono';font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--sage-d);margin:15px 0 7px;border-bottom:1px solid var(--line);padding-bottom:4px}
  .peditor h5:first-child{margin-top:0}
  .peditor .frow{display:grid;grid-template-columns:120px 1fr;gap:8px;align-items:start;margin-bottom:6px}
  .peditor .frow>label{font-family:'Space Mono';font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--faint);padding-top:7px}
  .peditor input,.peditor textarea,.peditor select{width:100%;font-family:'Spectral';font-size:14px;background:#fbf9f2;border:1.5px solid var(--line);border-radius:4px;padding:6px 8px;color:var(--ink)}
  .peditor textarea{min-height:50px;resize:vertical}
  .peditor .checks{display:flex;flex-wrap:wrap;gap:8px 16px}
  .peditor .checks label{display:flex;align-items:center;gap:5px;font-family:'Space Mono';font-size:12px;color:var(--ink)}
  .peditor .checks input{width:auto}
  .peditor .scorerow{display:grid;grid-template-columns:110px 62px 1fr;gap:8px;align-items:center;margin-bottom:5px}
  .peditor .listrow{display:flex;gap:6px;margin-bottom:5px;align-items:center}
  .peditor .rmbtn{flex:0 0 auto;width:30px;border:1.5px solid var(--line);background:#fbf9f2;border-radius:4px;padding:5px 0;font-family:'Space Mono';font-size:12px;color:var(--red)}
  .peditor .addbtn2{border:1.5px dashed var(--line);background:transparent;border-radius:4px;padding:5px 11px;font-family:'Space Mono';font-size:11px;color:var(--ink2);margin-top:3px}
  .peditor .save{border:1.5px solid var(--sage-d);background:var(--sage-d);color:var(--paper);border-radius:4px;padding:9px 18px;font-family:'Space Mono';font-size:12px;letter-spacing:.06em;text-transform:uppercase;margin:14px 8px 0 0}
  .peditor .cancel{border:1.5px solid var(--line);background:transparent;color:var(--ink);border-radius:4px;padding:9px 18px;font-family:'Space Mono';font-size:12px;letter-spacing:.06em;text-transform:uppercase;margin-top:14px}
  .card .acc{font-family:'Space Mono';font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint)}
  .card h3{margin:5px 0 1px;font-size:22px;font-weight:800;letter-spacing:-.01em}
  .card .sci{font-style:italic;color:var(--ink2);font-size:15px}
  .card .ov{text-align:center;align-self:start}
  .card .ov b{display:block;font-family:'Space Mono';font-size:28px;line-height:1;padding:9px 12px;border-radius:3px;min-width:62px}
  .card .ov small{font-family:'Space Mono';font-size:9px;letter-spacing:.14em;color:var(--faint);display:block;margin-top:4px}
  .pills{display:flex;flex-wrap:wrap;gap:6px;margin:9px 0 2px}
  .pill{font-family:'Space Mono';font-size:10px;letter-spacing:.04em;border-radius:99px;padding:3px 9px;border:1px solid}
  .pill.nat{color:#2f6d2a;background:#e7f3e2;border-color:#bcdcb4}
  .pill.life{color:#5a4a1f;background:#f3ecd5;border-color:#ddcfa3}
  .pill.type{color:#3a4660;background:#e6eaf3;border-color:#c2cce0}
  .pill.nf{color:#1f5e5a;background:#dcefec;border-color:#aad6cf}

<script type="text/babel">
const {useState,useMemo,useEffect} = React;

/* =====================================================================
   ▼▼▼  CONFIG — PASTE YOUR TWO SUPABASE VALUES HERE  ▼▼▼
   Find them in your project: Settings ▸ API
     • Project URL           -> SUPABASE_URL
     • Project API key (anon / publishable) -> SUPABASE_ANON_KEY
   ===================================================================== */
const SUPABASE_URL      = "https://sysrtpvnkpfuieznfkzb.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_KFuVBUO-ID97Wbem0VBapA_XnYqZjGs";
/* ▲▲▲  nothing else below needs editing  ▲▲▲ */

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Map a DB row (snake_case + jsonb) into the shape the UI already expects.
function rowToPlant(r){
  return {
    id:r.id, common:r.common, sci:r.sci, family:r.family, type:r.type, life:r.life,
    edibleParts:r.edible_parts, otherUses:r.other_uses, prep:r.prep, harvest:r.harvest,
    sun:r.sun, soil:r.soil, risks:r.risks, buy:r.buy,
    nativeStates:r.native_states||[], nativeRegions:r.native_regions||[], nativeToUS:r.native_to_us,
    invasiveStates:r.invasive_states||[], invasiveEverywhere:r.invasive_everywhere, decPriority:r.dec_priority,
    nf:r.nf, pol:r.pol, s:r.scores, sources:r.sources||[],
    humanVerified:!!r.human_verified, images:r.images||[],
    hardinessZones:r.hardiness_zones||"", deerResistant:!!r.deer_resistant,
    minPlantsFruit:r.min_plants_fruit||null, yearsToFruit:r.years_to_fruit||"",
    soilPh:r.soil_ph||"", soilN:r.soil_n||"", soilP:r.soil_p||"", soilK:r.soil_k||"",
    soilTexture:r.soil_texture||[], soilDrainage:r.soil_drainage||[],
  };
}

/* Only this signed-in user sees the Human Verify page and may write
   verification. Enforced server-side by an RLS policy on plants too. */
const ADMIN_EMAIL = "alex@bornemann.us";

/* =====================================================================
   DATA PROVIDER  —  the ONLY section that talks to the backend.
   getPlants() reads public reference data; the plan methods read/write
   the current user's rows in user_plans (protected by RLS). Auth is by
   email + password; user_plans.user_id defaults to auth.uid() on insert.
   ===================================================================== */
const auth = {
  getSession(){ return sb.auth.getSession(); },
  onChange(cb){ return sb.auth.onAuthStateChange((_e,session)=>cb(session?.user||null)); },
  signIn(email,password){ return sb.auth.signInWithPassword({ email, password }); },
  signUp(email,password){ return sb.auth.signUp({ email, password }); },
  resetPassword(email){ return sb.auth.resetPasswordForEmail(email); },
  signOut(){ return sb.auth.signOut(); },
};
const dataProvider = {
  async getPlants(){
    const { data, error } = await sb.from('plants').select('*').order('id');
    if(error) throw error;
    return data.map(rowToPlant);
  },
  async loadPlan(){
    const { data, error } = await sb.from('user_plans').select('plant_id');
    if(error) throw error;
    return data.map(r=>r.plant_id);
  },
  async addPlant(plantId){
    // user_id is filled automatically by the column default auth.uid()
    const { error } = await sb.from('user_plans').insert({ plant_id:plantId });
    if(error) throw error;
  },
  async removePlant(plantId){
    const { error } = await sb.from('user_plans').delete().eq('plant_id', plantId);
    if(error) throw error;
  },
  async setVerified(plantId, val){
    // allowed only for the admin user (enforced by RLS on plants)
    const { error } = await sb.from('plants').update({ human_verified:val }).eq('id', plantId);
    if(error) throw error;
  },
  async saveImages(plantId, images, sources){
    // admin-only (RLS): persist a pruned image list + matching sources
    const { error } = await sb.from('plants').update({ images, sources }).eq('id', plantId);
    if(error) throw error;
  },
  async updatePlant(plantId, patch){
    // admin-only (RLS): edit plant fields; returns the fresh row
    const { data, error } = await sb.from('plants').update(patch).eq('id', plantId).select('*').single();
    if(error) throw error;
    return rowToPlant(data);
  },
};

/* ---------- US region grouping for the Nativity rule ---------- */
const REGION = {
  "Northeast":["ME","NH","VT","MA","RI","CT","NY","NJ","PA","DE","MD","DC"],
  "Southeast":["VA","WV","NC","SC","GA","FL","AL","MS","TN","KY","AR","LA"],
  "Midwest":["OH","IN","IL","MI","WI","MN","IA","MO"],
  "Great Plains":["ND","SD","NE","KS","OK","TX"],
  "Mountain/Southwest":["MT","WY","CO","NM","ID","UT","AZ","NV"],
  "Pacific":["WA","OR","CA","AK","HI"],
};
const STATES = Object.values(REGION).flat().sort();
const STATE_NAMES = {AL:"Alabama",AK:"Alaska",AZ:"Arizona",AR:"Arkansas",CA:"California",CO:"Colorado",CT:"Connecticut",DE:"Delaware",DC:"Washington DC",FL:"Florida",GA:"Georgia",HI:"Hawaii",ID:"Idaho",IL:"Illinois",IN:"Indiana",IA:"Iowa",KS:"Kansas",KY:"Kentucky",LA:"Louisiana",ME:"Maine",MD:"Maryland",MA:"Massachusetts",MI:"Michigan",MN:"Minnesota",MS:"Mississippi",MO:"Missouri",MT:"Montana",NE:"Nebraska",NV:"Nevada",NH:"New Hampshire",NJ:"New Jersey",NM:"New Mexico",NY:"New York",NC:"North Carolina",ND:"North Dakota",OH:"Ohio",OK:"Oklahoma",OR:"Oregon",PA:"Pennsylvania",RI:"Rhode Island",SC:"South Carolina",SD:"South Dakota",TN:"Tennessee",TX:"Texas",UT:"Utah",VT:"Vermont",VA:"Virginia",WA:"Washington",WV:"West Virginia",WI:"Wisconsin",WY:"Wyoming"};
function regionGroupOf(st){
  for(const g in REGION){ if(REGION[g].includes(st)) return g; }
  return "Other";
}
/* region -> color (from the shared palette) for the guide map + legend */
const REGION_COLORS = {
  "Northeast":"--blue", "Southeast":"--green", "Midwest":"--yellow",
  "Great Plains":"--orange", "Mountain/Southwest":"--red", "Pacific":"--sage",
};
const REGION_DARKTEXT = {"Midwest":true}; // light fills that need dark labels
/* [col,row] tile positions for the schematic US map (west->east, north->south) */
const TILE = {
  WA:[1,1],OR:[1,2],CA:[1,3],AK:[1,7],HI:[1,8],
  ID:[2,1],NV:[2,2],UT:[2,3],AZ:[2,4],
  MT:[3,1],WY:[3,2],CO:[3,3],NM:[3,4],
  ND:[4,1],SD:[4,2],NE:[4,3],KS:[4,4],OK:[4,5],TX:[4,6],
  MN:[5,1],IA:[5,2],MO:[5,3],AR:[5,4],LA:[5,5],
  WI:[6,1],IL:[6,2],KY:[6,3],TN:[6,4],MS:[6,5],
  IN:[7,2],WV:[7,3],AL:[7,5],GA:[7,6],
  MI:[8,1],OH:[8,2],VA:[8,3],NC:[8,4],SC:[8,5],FL:[8,6],
  PA:[9,3],NJ:[9,4],MD:[9,5],DC:[9,6],
  VT:[10,2],NY:[10,3],CT:[10,4],DE:[10,5],
  ME:[11,1],NH:[11,2],MA:[11,3],RI:[11,4],
};
function RegionMap(){
  const CELL=32, INSET=2, COLS=11, ROWS=8;
  return (
    <svg viewBox={`0 0 ${COLS*CELL} ${ROWS*CELL}`} role="img"
         aria-label="Map of US regions" style={{width:"100%",maxWidth:440,height:"auto",display:"block"}}>
      {STATES.map(st=>{
        const pos=TILE[st]; if(!pos) return null;
        const [c,r]=pos, reg=regionGroupOf(st), dark=REGION_DARKTEXT[reg];
        return (
          <g key={st}>
            <rect x={(c-1)*CELL+INSET} y={(r-1)*CELL+INSET} width={CELL-2*INSET} height={CELL-2*INSET}
                  rx="3" fill={`var(${REGION_COLORS[reg]||"--line"})`} stroke="#f5f1e6" strokeWidth="1"/>
            <text x={(c-1)*CELL+CELL/2} y={(r-1)*CELL+CELL/2+0.5} textAnchor="middle" dominantBaseline="central"
                  fontFamily="'Space Mono',monospace" fontSize="10" fontWeight="700"
                  fill={dark?"#2b2a22":"#fff"}>{st}</text>
          </g>
        );
      })}
    </svg>
  );
}

/* ---------- Scoring engine ---------- */
const TIER = {P:"peer-reviewed",E:"ethnobotanical",A:"anecdotal",N:"no evidence"};
const WEIGHTS = {nativity:4, raw:2, cooked:2, life:1, eco:1, fiber:0.7, med:0.3};

function nativity(p, st){
  if(p.invasiveEverywhere || (p.invasiveStates||[]).includes(st)) return {v:-5,label:"Invasive here"};
  if((p.nativeStates||[]).includes(st)) return {v:10,label:"Native to "+st};
  if((p.nativeRegions||[]).includes(regionGroupOf(st))) return {v:8,label:"Native to region"};
  if(p.nativeToUS) return {v:5,label:"Native to US"};
  return {v:0,label:"Not native"};
}
function overall(p, st){
  const nat = nativity(p,st).v;
  const s=p.s;
  const total = nat*WEIGHTS.nativity + s.raw[0]*WEIGHTS.raw + s.cooked[0]*WEIGHTS.cooked
    + s.life[0]*WEIGHTS.life + s.eco[0]*WEIGHTS.eco + s.fiber[0]*WEIGHTS.fiber + s.med[0]*WEIGHTS.med;
  return Math.round(total*10)/10;
}
function bandColor(score){ // 0-100 scale
  if(score>=90) return "var(--blue)";
  if(score>=80) return "var(--green)";
  if(score>=70) return "var(--ygreen)";
  if(score>=55) return "var(--yellow)";
  if(score>=30) return "var(--orange)";
  return "var(--red)";
}
function bandText(score){ return (score>=70 && score<80)||(score>=55&&score<70) ? "#2b2a22" : "#fff"; }
function catColor(v){ return bandColor(v*10); }
function catText(v){ return bandText(v*10); }

/* ---- harvest-season parsing + fruit helpers (My Plan insights) ---- */
const SEASONS=["Spring","Summer","Fall","Winter"];
function harvestSeasons(p){
  const t=(p.harvest||"").toLowerCase(); const s=new Set();
  if(/year|any season/.test(t)){ SEASONS.forEach(x=>s.add(x)); return s; }
  if(/spring/.test(t)) s.add("Spring");
  if(/summer/.test(t)) s.add("Summer");
  if(/fall|autumn/.test(t)) s.add("Fall");
  if(/winter/.test(t)) s.add("Winter");
  const M={jan:"Winter",feb:"Winter",mar:"Spring",apr:"Spring",may:"Spring",jun:"Summer",jul:"Summer",aug:"Summer",sep:"Fall",oct:"Fall",nov:"Fall",dec:"Winter"};
  for(const m in M){ if(t.includes(m)) s.add(M[m]); }
  return s;
}
function isFood(p){ return Math.max(p.s.raw[0], p.s.cooked[0]) >= 5; }
function fruitLabel(p){
  if(!p.minPlantsFruit) return null;
  return p.minPlantsFruit>=2 ? p.minPlantsFruit+" to fruit" : "Self-fruitful";
}
/* show "No Data Found" for empty fields (matters most for lesser-known plants) */
function nd(v){ return (v!=null && String(v).trim()!=="") ? v : "No Data Found"; }

/* ---- Soil Exam: fit model ---- */
const TEXTURES=["Sandy","Loam","Clay","Silt"];
const DRAINAGE=["Well-drained","Moist","Wet"]; // ordered dry -> wet
const PH_BANDS=[
  {label:"Acidic (4.5–5.5)", lo:4.5, hi:5.5},
  {label:"Slightly acidic (5.5–6.5)", lo:5.5, hi:6.5},
  {label:"Neutral (6.5–7.5)", lo:6.5, hi:7.5},
  {label:"Alkaline (7.5–8.5)", lo:7.5, hi:8.5},
];
const GOOD_FIT=66; // % threshold for a "good fit"
function parsePh(txt){ const m=(txt||"").match(/(\d+(?:\.\d+)?)\s*[–-]\s*(\d+(?:\.\d+)?)/); return m?[parseFloat(m[1]),parseFloat(m[2])]:null; }
function texScore(plantTex, sel){
  if(!sel.length) return 1;
  const set=new Set(plantTex||[]);
  if(sel.some(t=>set.has(t))) return 1;
  return (plantTex||[]).length>=3 ? 0.5 : 0; // adaptable = partial
}
function drainScore(plantDr, sel){
  if(!sel.length) return 1;
  const set=new Set(plantDr||[]);
  if(sel.some(d=>set.has(d))) return 1;
  const idx=d=>DRAINAGE.indexOf(d);
  const near=sel.some(sd=>(plantDr||[]).some(pd=>Math.abs(idx(pd)-idx(sd))===1));
  return near?0.5:0;
}
function phScore(plantPh, selBands){
  if(!selBands.length) return 1;
  const r=parsePh(plantPh); if(!r) return 0.5;
  const [plo,phi]=r;
  if(selBands.some(b=>plo<=b.hi && phi>=b.lo)) return 1;         // overlap
  if(selBands.some(b=>plo-0.5<=b.hi && phi+0.5>=b.lo)) return 0.5; // within 0.5
  return 0;
}
function soilFit(p, sel){
  const t=texScore(p.soilTexture,sel.tex), d=drainScore(p.soilDrainage,sel.dr), h=phScore(p.soilPh,sel.ph);
  return {t,d,h, pct:Math.round((t+d+h)/3*100)};
}
function fitCls(v){ return v>=1?"ok":(v>=0.5?"mid":"no"); }
function pctColor(pct){ return pct>=GOOD_FIT?"var(--green)":(pct>=40?"var(--yellow)":"var(--red)"); }

/* ---- Risk register: severity from each plant's Risk text ---- */
function riskSeverity(p){
  const raw=p.risks||""; const t=raw.toLowerCase().trim();
  if(!t || /^(none|no significant|no notable|not a food)/.test(t) || /no significant (hazard|toxicity)|none significant|no meaningful/.test(t)) return "low";
  if(/TOXIC|POISON|HIGHLY/.test(raw) || /poison|fatal|deadly|severely toxic|highly toxic|cytisine|aristolochic|carcinogen|all parts/.test(t)) return "high";
  if(/toxic|cyanogenic|irritat|sting|saponin|nausea|laxativ|emetic|acrid|photosensit|pyrrolizidine|caution|pregnan|hallucin|ergot|kidney|hepato|thorn|spine|prickl|bitter/.test(t)) return "mod";
  return "low";
}
const RISK_META={high:{label:"High",dot:"#9a2c22"}, mod:{label:"Moderate",dot:"#dd4b3e"}, low:{label:"Low",dot:"#b98c82"}};
const RISK_ORDER={high:0, mod:1, low:2};
function RiskRegister({chosen}){
  const rows=chosen.map(p=>({p, sev:riskSeverity(p)}))
    .sort((a,b)=>RISK_ORDER[a.sev]-RISK_ORDER[b.sev] || a.p.common.localeCompare(b.p.common));
  const counts={high:0,mod:0,low:0}; rows.forEach(r=>counts[r.sev]++);
  return (
    <div className="riskwrap">
      <div className="risksum">
        <span className="rpill hi">{counts.high} high</span>
        <span className="rpill mo">{counts.mod} moderate</span>
        <span className="rpill lo">{counts.low} low or none</span>
      </div>
      {rows.map(({p,sev})=>(
        <div className="rrow" key={p.id}>
          <span className="rdot" style={{background:RISK_META[sev].dot}}></span>
          <div className="rnm">{p.common}<span className="rtag" style={{color:RISK_META[sev].dot}}>{RISK_META[sev].label}</span></div>
          <div className="rtxt">{p.risks || "No significant hazards noted."}</div>
        </div>
      ))}
    </div>
  );
}

/* ---------- Database page ---------- */
function Pager({page, pageCount, go}){
  if(pageCount<=1) return null;
  const many=pageCount>12;
  const nums=[]; for(let i=1;i<=pageCount;i++) nums.push(i);
  return (
    <div className="pager">
      <button disabled={page<=1} onClick={()=>go(page-1)}>‹ Prev</button>
      {many
        ? <span className="pgnum">Page {page} of {pageCount}</span>
        : nums.map(n=><button key={n} className={n===page?"on":""} onClick={()=>go(n)}>{n}</button>)}
      <button disabled={page>=pageCount} onClick={()=>go(page+1)}>Next ›</button>
    </div>
  );
}

function Database({plants, state, setState, plan, toggle}){
  const [q,setQ]=useState("");
  const [sortKey,setSortKey]=useState("overall");
  const [dir,setDir]=useState(-1); // -1 desc, 1 asc
  const [types,setTypes]=useState([]); // active type filters
  const [flags,setFlags]=useState({nf:false,pol:false,raw:false,cooked:false,plan:false,notplan:false,deer:false,dec:false});

  const allTypes=[...new Set(plants.map(p=>p.type))];
  const toggleType=t=>setTypes(ts=>ts.includes(t)?ts.filter(x=>x!==t):[...ts,t]);
  const toggleFlag=f=>setFlags(s=>({...s,[f]:!s[f]}));

  const view=useMemo(()=>{
    let arr=plants.filter(p=>{
      if(q){const s=(p.common+" "+p.sci).toLowerCase(); if(!s.includes(q.toLowerCase())) return false;}
      if(types.length && !types.includes(p.type)) return false;
      if(flags.nf && !p.nf) return false;
      if(flags.pol && !p.pol) return false;
      if(flags.raw && p.s.raw[0]<5) return false;
      if(flags.cooked && p.s.cooked[0]<5) return false;
      if(flags.deer && !p.deerResistant) return false;
      if(flags.dec && !p.decPriority) return false;
      if(flags.plan && !plan.includes(p.id)) return false;
      if(flags.notplan && plan.includes(p.id)) return false;
      return true;
    });
    const val=p=>{
      if(sortKey==="overall") return overall(p,state);
      if(sortKey==="nativity") return nativity(p,state).v;
      if(sortKey==="name") return p.common.toLowerCase();
      return p.s[sortKey][0];
    };
    arr.sort((a,b)=>{const va=val(a),vb=val(b); if(va<vb)return -1*dir; if(va>vb)return 1*dir; return 0;});
    return arr;
  },[plants,q,types,flags,sortKey,dir,state,plan]);

  // pagination: cap at 100 plants per page
  const PER_PAGE=100;
  const [page,setPage]=useState(1);
  const pageCount=Math.max(1, Math.ceil(view.length/PER_PAGE));
  const curPage=Math.min(page, pageCount);
  const pageItems=view.slice((curPage-1)*PER_PAGE, curPage*PER_PAGE);
  useEffect(()=>{ setPage(1); },[q,types,flags,sortKey,dir,state]); // reset to page 1 on filter change
  const goPage=n=>{ setPage(n); window.scrollTo({top:0,behavior:"smooth"}); };

  return (
    <div>
      <div className="pagehead">
        <div className="eye">Database · {plants.length} plants</div>
        <h2>Browse native plants</h2>
        <p>Scores update to your state. Tap any card to expand details and sources, and add plants to your plan.</p>
      </div>

      <div className="statebar">
        <span className="lbl">My state</span>
        <select value={state} onChange={e=>setState(e.target.value)}>
          {STATES.map(s=><option key={s} value={s}>{STATE_NAMES[s]} ({s})</option>)}
        </select>
        <span className="note">Nativity is recalculated for {STATE_NAMES[state]} (10 in-state · 8 in-region · 5 in-US · 0 non-native · −5 invasive).</span>
      </div>

      <div className="controls">
        <div className="fld search"><label>Search name (common or scientific)</label>
          <input value={q} onChange={e=>setQ(e.target.value)} placeholder="e.g. hazelnut or Corylus" /></div>
        <div className="fld"><label>Sort by</label>
          <select value={sortKey} onChange={e=>setSortKey(e.target.value)}>
            <option value="overall">Overall score</option>
            <option value="nativity">Nativity</option>
            <option value="raw">Edible Raw</option>
            <option value="cooked">Edible Cooked</option>
            <option value="life">Lifecycle</option>
            <option value="eco">Ecology</option>
            <option value="fiber">Fiber / Material</option>
            <option value="med">Medicinal</option>
            <option value="name">Name (A–Z)</option>
          </select></div>
        <button className="dirbtn" title="Toggle direction" onClick={()=>setDir(d=>-d)}>{dir===-1?"↓":"↑"}</button>
      </div>

      <div className="toggles">
        {allTypes.map(t=><button key={t} className={"chip"+(types.includes(t)?" on":"")} onClick={()=>toggleType(t)}>{t}</button>)}
        <span style={{width:1,background:"var(--line)",margin:"0 3px"}}></span>
        <button className={"chip"+(flags.nf?" on":"")} onClick={()=>toggleFlag("nf")}>N-fixer</button>
        <button className={"chip"+(flags.pol?" on":"")} onClick={()=>toggleFlag("pol")}>Pollinator</button>
        <button className={"chip"+(flags.raw?" on":"")} onClick={()=>toggleFlag("raw")}>Good raw</button>
        <button className={"chip"+(flags.cooked?" on":"")} onClick={()=>toggleFlag("cooked")}>Good cooked</button>
        <button className={"chip"+(flags.deer?" on":"")} onClick={()=>toggleFlag("deer")}>Deer resistant</button>
        <button className={"chip"+(flags.dec?" on":"")} onClick={()=>toggleFlag("dec")}>NY priority</button>
        <button className={"chip"+(flags.plan?" on":"")} onClick={()=>toggleFlag("plan")}>In my plan</button>
        <button className={"chip"+(flags.notplan?" on":"")} onClick={()=>toggleFlag("notplan")}>Not in plan</button>
      </div>

      <div className="count">{view.length} shown{pageCount>1?` · page ${curPage} of ${pageCount}`:""}</div>
      <Pager page={curPage} pageCount={pageCount} go={goPage} />
      {pageItems.map(p=><PlantCard key={p.id} p={p} state={state} inPlan={plan.includes(p.id)} toggle={toggle} />)}
      {view.length===0 && <div className="empty">No plants match those filters. Clear a filter or search to see more.</div>}
      <Pager page={curPage} pageCount={pageCount} go={goPage} />
    </div>
  );
}

/* ---------- My Plan page ---------- */
function MyPlan({plants, state, plan, toggle, go}){
  const [detail,setDetail]=useState(null);
  const [view,setView]=useState("layers"); // layers | soil | risk
  const [soil,setSoil]=useState({tex:["Loam"], dr:["Well-drained"], phL:["Neutral (6.5–7.5)"]});
  const chosen=plants.filter(p=>plan.includes(p.id));
  if(chosen.length===0){
    return (
      <div>
        <div className="pagehead"><div className="eye">My Plan</div><h2>Your food forest</h2>
          <p>You haven't added any plants yet.</p></div>
        <div className="empty">Browse the database and tap <b>+ Add to my plan</b> on any plant.<br/><br/>
          <button className="addbtn" onClick={()=>go("db")}>Go to the database</button></div>
      </div>
    );
  }
  const avg=Math.round(chosen.reduce((a,p)=>a+overall(p,state),0)/chosen.length*10)/10;
  const nfix=chosen.filter(p=>p.nf);
  const polls=chosen.filter(p=>p.pol);
  const heavy=chosen.filter(p=>["Tree"].includes(p.type) && (p.s.raw[0]>=7||p.s.cooked[0]>=7)); // fruit/nut feeders
  const groundcovers=chosen.filter(p=>p.type==="Herb"||p.type==="Fern");
  const invasive=chosen.filter(p=>nativity(p,state).v<0);

  // food-harvest coverage across the four seasons (edible plants only)
  const foodChosen=chosen.filter(isFood);
  const covered=new Set();
  foodChosen.forEach(p=>harvestSeasons(p).forEach(s=>covered.add(s)));
  const gaps=SEASONS.filter(s=>!covered.has(s));

  // symbiosis insights
  const insights=[];
  if(foodChosen.length){
    if(gaps.length===0)
      insights.push(<div className="insight" key="harv"><b>Year-round harvest.</b> Your edible plants together yield across all four seasons — nicely done.</div>);
    else
      insights.push(<div className="insight" key="harv"><b>Harvest calendar.</b> Your edible plants cover {[...SEASONS.filter(s=>covered.has(s))].join(", ")||"no seasons yet"}. Gap{gaps.length>1?"s":""}: <b>{gaps.join(", ")}</b> — see suggested additions to fill {gaps.length>1?"them":"it"}.</div>);
  }
  if(nfix.length && heavy.length)
    insights.push(<div className="insight" key="nf"><b>Nitrogen pairing.</b> Your {nfix.map(p=>p.common).join(", ")} fix nitrogen — site them near hungry fruit/nut trees like {heavy.map(p=>p.common).join(", ")} to feed them naturally.</div>);
  if(polls.length>=2)
    insights.push(<div className="insight" key="pol"><b>Pollinator support.</b> {polls.length} pollinator plants in your plan will boost fruit set across the whole guild; stagger their bloom for season-long coverage.</div>);
  if(groundcovers.length)
    insights.push(<div className="insight" key="gc"><b>Living ground layer.</b> {groundcovers.map(p=>p.common).join(", ")} can carpet the soil to suppress weeds and hold moisture under your taller plants.</div>);
  if(invasive.length)
    insights.push(<div className="insight" key="inv" style={{borderColor:"var(--red)",background:"#f6e3df"}}><b>Heads up.</b> {invasive.map(p=>p.common).join(", ")} scored as invasive in {STATE_NAMES[state]} — consider removing it from your plan.</div>);
  if(!nfix.length)
    insights.push(<div className="insight" key="nonf"><b>No nitrogen source yet.</b> Adding a nitrogen-fixer would help feed the rest of your plan with less fertilizer.</div>);

  // suggestions: top-scoring plants not in plan, prioritizing missing functions
  const notIn=plants.filter(p=>!plan.includes(p.id) && nativity(p,state).v>=0);
  const ranked=[...notIn].sort((a,b)=>overall(b,state)-overall(a,state));
  const suggestions=[];
  const pushSugg=(p,why)=>{ if(p && !suggestions.find(s=>s.p.id===p.id)) suggestions.push({p,why}); };
  if(!nfix.length) pushSugg(ranked.find(p=>p.nf),"adds nitrogen fixing");
  if(!polls.length) pushSugg(ranked.find(p=>p.pol),"adds pollinator support");
  if(!groundcovers.length) pushSugg(ranked.find(p=>p.type==="Herb"||p.type==="Fern"),"adds a ground layer");
  for(const g of gaps) pushSugg(ranked.find(p=>isFood(p)&&harvestSeasons(p).has(g)),"fills the "+g.toLowerCase()+" harvest gap");
  for(const p of ranked){ if(suggestions.length>=6) break; pushSugg(p,"high overall score for "+state); }

  // whole-forest category scores (average per category × 10, so each is out of 100)
  const catAvg=k=>Math.round(chosen.reduce((a,p)=>a+p.s[k][0],0)/chosen.length*10);
  const CAT_KEYS=[["raw","Edible Raw"],["cooked","Edible Cooked"],["life","Lifecycle"],["eco","Ecology"],["fiber","Fiber"],["med","Medicinal"]];
  // overall soil fit (from the Soil Examination view's current profile)
  const soilSel={tex:soil.tex, dr:soil.dr, ph:PH_BANDS.filter(b=>soil.phL.includes(b.label))};
  const avgSoilFit=chosen.length?Math.round(chosen.reduce((a,p)=>a+soilFit(p,soilSel).pct,0)/chosen.length):0;
  const nTypes=new Set(chosen.map(p=>p.type)).size;
  const NEUTRAL={bg:"#ece7d7", fg:"var(--ink)"};
  const scoreBox=(label,v)=>({label, val:v, bg:bandColor(v), fg:bandText(v)});
  const sfC=pctColor(avgSoilFit);
  const summaryBoxes=[
    {label:"Overall Score", val:avg, bg:bandColor(avg), fg:bandText(avg)},
    scoreBox("Edible Raw",catAvg("raw")), scoreBox("Edible Cooked",catAvg("cooked")),
    scoreBox("Lifecycle",catAvg("life")), scoreBox("Ecology",catAvg("eco")),
    scoreBox("Fiber",catAvg("fiber")), scoreBox("Medicinal",catAvg("med")),

function flat(p, state){
  const nat=nativity(p,state);
  return {
    "Common Name":p.common, "Scientific Name":p.sci, "Family":p.family, "Type":p.type, "Lifecycle":p.life,
    "Overall":overall(p,state),
    "Nativity":nat.v, "Nativity Status":nat.label,
    "Edible Raw":p.s.raw[0], "Raw Evidence":TIER[p.s.raw[1]],
    "Edible Cooked":p.s.cooked[0], "Cooked Evidence":TIER[p.s.cooked[1]],
    "Lifecycle Score":p.s.life[0], "Ecology":p.s.eco[0], "Ecology Evidence":TIER[p.s.eco[1]],
    "Fiber/Material":p.s.fiber[0], "Medicinal":p.s.med[0], "Medicinal Evidence":TIER[p.s.med[1]],
    "Nitrogen Fixer":p.nf?"Yes":"No", "Pollinator":p.pol?"Yes":"No",
    "Deer Resistant":p.deerResistant?"Yes":"No", "Hardiness Zones":p.hardinessZones,
    "NY Priority":p.decPriority?"Yes":"No",
    "Edible Parts":p.edibleParts, "Other Uses":p.otherUses, "Preparation":p.prep,
    "Harvest Time":p.harvest, "Sun":p.sun, "Soil":p.soil,
    "Soil pH":p.soilPh, "Soil N":p.soilN, "Soil P":p.soilP, "Soil K":p.soilK,
    "Health Risks":p.risks, "Where to Buy":p.buy,
    "Sources":p.sources.map(s=>s[1]).join(" | "),
  };
}
function download(filename, text, mime){
  const blob=new Blob([text],{type:mime});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url; a.download=filename; a.click();
  setTimeout(()=>URL.revokeObjectURL(url),500);
}
function esc(v){ v=String(v==null?"":v); return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v; }
function RawData({plants, state}){
  const rows=plants.map(p=>flat(p,state));
  const cols=Object.keys(rows[0]);
  const exportCSV=()=>{
    const csv=[cols.join(",")].concat(rows.map(r=>cols.map(c=>esc(r[c])).join(","))).join("\n");
    download(`native-food-forest_${state}.csv`, csv, "text/csv;charset=utf-8;");
  };
  const exportXLS=()=>{
    // Excel-readable HTML table (.xls) — opens natively in Excel, no library needed
    const th=cols.map(c=>`<th>${c}</th>`).join("");
    const trs=rows.map(r=>"<tr>"+cols.map(c=>`<td>${String(r[c]).replace(/&/g,"&amp;").replace(/</g,"&lt;")}</td>`).join("")+"</tr>").join("");
    const html=`<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel"><head><meta charset="utf-8"></head><body><table border="1"><thead><tr>${th}</tr></thead><tbody>${trs}</tbody></table></body></html>`;
    download(`native-food-forest_${state}.xls`, html, "application/vnd.ms-excel");
  };
  return (
    <div>
      <div className="pagehead"><div className="eye">Raw Data · {plants.length} rows</div><h2>Spreadsheet view</h2>
        <p>Every field and score behind the app, for {STATE_NAMES[state]}. Export to use in Excel, Sheets, or your own analysis.</p></div>
      <div className="exportrow">
        <button onClick={exportCSV}>⬇ Export CSV</button>
        <button className="alt" onClick={exportXLS}>⬇ Export Excel (.xls)</button>
      </div>
      <div className="tablewrap">
        <table>
          <thead><tr>{cols.map(c=><th key={c}>{c}</th>)}</tr></thead>
          <tbody>
            {rows.map((r,i)=><tr key={i}>{cols.map(c=>
              <td key={c} className={c==="Scientific Name"?"sci":""}
                  style={c==="Overall"?{fontFamily:"Space Mono",fontWeight:700,color:bandColor(r[c])}:null}>
                {c==="Sources"?<span className="mono" style={{fontSize:11}}>{r[c].split(" | ").length} links</span>:String(r[c])}
              </td>)}</tr>)}
          </tbody>
        </table>
      </div>
      <p className="footnote">Tip: the .xls export opens directly in Microsoft Excel; the .csv works everywhere including Google Sheets.</p>
    </div>
  );
}

/* ---------- Auth screen (email + password) ---------- */
function Auth(){
  const [mode,setMode]=useState("in"); // in | up
  const [email,setEmail]=useState("");
  const [pw,setPw]=useState("");
  const [busy,setBusy]=useState(false);
  const [msg,setMsg]=useState(null); // {type,text}

  const submit=async()=>{
    setMsg(null);
    if(!email || !pw){ setMsg({type:"err",text:"Enter an email and password."}); return; }
    if(mode==="up" && pw.length<6){ setMsg({type:"err",text:"Password must be at least 6 characters."}); return; }
    setBusy(true);
    try{
      if(mode==="in"){
        const { error } = await auth.signIn(email,pw);
        if(error) throw error;
        // onAuthStateChange in App will pick up the session
      }else{
        const { data, error } = await auth.signUp(email,pw);
        if(error) throw error;
        if(data.session){ /* auto signed in (email confirmation off) */ }
        else setMsg({type:"ok",text:"Account created. Check your email to confirm, then sign in."});
      }
    }catch(err){ setMsg({type:"err",text:err.message||String(err)}); }
    setBusy(false);
  };
  const reset=async()=>{
    if(!email){ setMsg({type:"err",text:"Enter your email above first."}); return; }
    const { error } = await auth.resetPassword(email);
    setMsg(error?{type:"err",text:error.message}:{type:"ok",text:"Password reset email sent."});
  };

  return (
    <div className="authwrap">
      <div className="authcard">
        <div className="acc">Native Food Forest Planner</div>
        <h2>{mode==="in"?"Sign in":"Create account"}</h2>
        <p className="sub">Your plan is saved to your account, so it's there on any device you sign in from.</p>
        <div className="fld"><label>Email</label>
          <input type="email" autoComplete="email" value={email} onChange={e=>setEmail(e.target.value)}
                 onKeyDown={e=>e.key==="Enter"&&submit()} placeholder="you@example.com" /></div>
        <div className="fld"><label>Password</label>
          <input type="password" autoComplete={mode==="in"?"current-password":"new-password"} value={pw}
                 onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()} placeholder="••••••••" /></div>
        <button className="authbtn" onClick={submit} disabled={busy}>
          {busy?"Working…":(mode==="in"?"Sign in":"Create account")}</button>
        {msg && <div className={"authmsg "+msg.type}>{msg.text}</div>}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <button className="authtoggle" onClick={()=>{setMode(m=>m==="in"?"up":"in");setMsg(null);}}>
            {mode==="in"?"Need an account? Create one":"Have an account? Sign in"}</button>
          {mode==="in" && <button className="authtoggle" onClick={reset}>Forgot password?</button>}
        </div>
      </div>
    </div>
  );
}

const SCORE_KEYS=[["raw","Edible Raw"],["cooked","Edible Cooked"],["life","Lifecycle"],["eco","Ecology"],["fiber","Fiber"],["med","Medicinal"]];
const TIER_OPTS=[["P","peer-reviewed"],["E","ethnobotanical"],["A","anecdotal"],["N","no evidence"]];
function plantToForm(p){
  return {
    common:p.common||"", sci:p.sci||"", family:p.family||"", type:p.type||"", life:p.life||"",
    edible_parts:p.edibleParts||"", other_uses:p.otherUses||"", prep:p.prep||"", harvest:p.harvest||"",
    sun:p.sun||"", soil:p.soil||"", risks:p.risks||"", buy:p.buy||"",
    hardiness_zones:p.hardinessZones||"", years_to_fruit:p.yearsToFruit||"", min_plants_fruit:p.minPlantsFruit==null?"":p.minPlantsFruit,
    nf:!!p.nf, pol:!!p.pol, deer_resistant:!!p.deerResistant, dec_priority:!!p.decPriority,
    native_to_us:!!p.nativeToUS, invasive_everywhere:!!p.invasiveEverywhere,
    native_states:(p.nativeStates||[]).join(", "), native_regions:(p.nativeRegions||[]).join(", "),
    invasive_states:(p.invasiveStates||[]).join(", "),
    soil_ph:p.soilPh||"", soil_n:p.soilN||"", soil_p:p.soilP||"", soil_k:p.soilK||"",
    soil_texture:(p.soilTexture||[]).join(", "), soil_drainage:(p.soilDrainage||[]).join(", "),
    scores:Object.fromEntries(SCORE_KEYS.map(([k])=>[k,[p.s[k][0],p.s[k][1]]])),
    images:(p.images||[]).map(im=>({url:im.url||"",title:im.title||"",source:im.source||""})),
    sources:(p.sources||[]).map(s=>[s[0]||"",s[1]||""]),
  };
}
function formToPatch(f){
  const arr=s=>String(s||"").split(",").map(x=>x.trim()).filter(Boolean);
  return {
    common:f.common, sci:f.sci, family:f.family, type:f.type, life:f.life,
    edible_parts:f.edible_parts, other_uses:f.other_uses, prep:f.prep, harvest:f.harvest,
    sun:f.sun, soil:f.soil, risks:f.risks, buy:f.buy,
    hardiness_zones:f.hardiness_zones, years_to_fruit:f.years_to_fruit,
    min_plants_fruit:f.min_plants_fruit===""?null:Number(f.min_plants_fruit),
    nf:f.nf, pol:f.pol, deer_resistant:f.deer_resistant, dec_priority:f.dec_priority,
    native_to_us:f.native_to_us, invasive_everywhere:f.invasive_everywhere,
    native_states:arr(f.native_states), native_regions:arr(f.native_regions), invasive_states:arr(f.invasive_states),
    soil_ph:f.soil_ph, soil_n:f.soil_n, soil_p:f.soil_p, soil_k:f.soil_k,
    soil_texture:arr(f.soil_texture), soil_drainage:arr(f.soil_drainage),
    scores:Object.fromEntries(SCORE_KEYS.map(([k])=>[k,[Number(f.scores[k][0])||0, f.scores[k][1]]])),
    images:f.images.filter(im=>im.url.trim()).map(im=>({url:im.url.trim(),title:im.title.trim(),source:im.source.trim()})),
    sources:f.sources.filter(s=>s[1].trim()).map(s=>[s[0].trim(),s[1].trim()]),
  };
}
function PlantEditor({p, onSave, onCancel}){
  const [f,setF]=useState(()=>plantToForm(p));
  const [busy,setBusy]=useState(false);
  const [err,setErr]=useState(null);
  const set=(k,v)=>setF(o=>({...o,[k]:v}));
  const T=(k)=><textarea value={f[k]} onChange={e=>set(k,e.target.value)} />;
  const I=(k,type)=><input type={type||"text"} value={f[k]} onChange={e=>set(k,e.target.value)} />;
  const C=(k,label)=><label><input type="checkbox" checked={f[k]} onChange={e=>set(k,e.target.checked)} />{label}</label>;
  const setScore=(k,i,v)=>setF(o=>({...o,scores:{...o.scores,[k]:i===0?[v,o.scores[k][1]]:[o.scores[k][0],v]}}));
  const setImg=(i,k,v)=>setF(o=>({...o,images:o.images.map((im,j)=>j===i?{...im,[k]:v}:im)}));
  const setSrc=(i,k,v)=>setF(o=>({...o,sources:o.sources.map((s,j)=>j===i?(k===0?[v,s[1]]:[s[0],v]):s)}));
  const save=async()=>{
    setBusy(true); setErr(null);
    try{ await onSave(p.id, formToPatch(f)); onCancel(); }
    catch(e){ setErr(e.message||String(e)); setBusy(false); }
  };
  return (
    <div className="peditor">
      <h5>Identity</h5>
      <div className="frow"><label>Common name</label>{I("common")}</div>
      <div className="frow"><label>Scientific</label>{I("sci")}</div>
      <div className="frow"><label>Family</label>{I("family")}</div>
      <div className="frow"><label>Type</label>{I("type")}</div>
      <div className="frow"><label>Lifecycle</label>{I("life")}</div>

      <h5>Details</h5>
      <div className="frow"><label>Edible parts</label>{T("edible_parts")}</div>
      <div className="frow"><label>Other uses</label>{T("other_uses")}</div>
      <div className="frow"><label>How to prepare</label>{T("prep")}</div>
      <div className="frow"><label>Harvest time</label>{T("harvest")}</div>
      <div className="frow"><label>Sun</label>{T("sun")}</div>
      <div className="frow"><label>Soil</label>{T("soil")}</div>
      <div className="frow"><label>Risks</label>{T("risks")}</div>
      <div className="frow"><label>Where to buy</label>{T("buy")}</div>

      <h5>Category scores (0–10 + evidence tier)</h5>
      {SCORE_KEYS.map(([k,label])=>(
        <div className="scorerow" key={k}>
          <span style={{fontFamily:"'Space Mono'",fontSize:11}}>{label}</span>
          <input type="number" min="0" max="10" value={f.scores[k][0]} onChange={e=>setScore(k,0,e.target.value)} />
          <select value={f.scores[k][1]} onChange={e=>setScore(k,1,e.target.value)}>
            {TIER_OPTS.map(([v,l])=><option key={v} value={v}>{l}</option>)}
          </select>
        </div>
      ))}

      <h5>Traits</h5>
      <div className="checks">{C("nf","N-fixer")}{C("pol","Pollinator")}{C("deer_resistant","Deer resistant")}{C("dec_priority","NY priority")}{C("native_to_us","Native to US")}{C("invasive_everywhere","Invasive everywhere")}</div>
      <div className="frow" style={{marginTop:8}}><label>Hardiness zones</label>{I("hardiness_zones")}</div>
      <div className="frow"><label>Years to fruit</label>{I("years_to_fruit")}</div>
      <div className="frow"><label>Min plants to fruit</label>{I("min_plants_fruit","number")}</div>

      <h5>Nativity (comma-separated 2-letter codes / region names)</h5>
      <div className="frow"><label>Native states</label>{I("native_states")}</div>
      <div className="frow"><label>Native regions</label>{I("native_regions")}</div>
      <div className="frow"><label>Invasive states</label>{I("invasive_states")}</div>

      <h5>Soil</h5>
      <div className="frow"><label>Soil pH</label>{I("soil_ph")}</div>
      <div className="frow"><label>Nitrogen (N)</label>{I("soil_n")}</div>
      <div className="frow"><label>Phosphorus (P)</label>{I("soil_p")}</div>
      <div className="frow"><label>Potassium (K)</label>{I("soil_k")}</div>
      <div className="frow"><label>Texture (csv)</label>{I("soil_texture")}</div>
      <div className="frow"><label>Drainage (csv)</label>{I("soil_drainage")}</div>

      <h5>Pictures</h5>
      {f.images.map((im,i)=>(
        <div className="listrow" key={i}>
          <input type="text" placeholder="image URL" value={im.url} onChange={e=>setImg(i,"url",e.target.value)} />
          <input type="text" placeholder="caption" value={im.title} onChange={e=>setImg(i,"title",e.target.value)} style={{maxWidth:140}} />
          <button className="rmbtn" onClick={()=>setF(o=>({...o,images:o.images.filter((_,j)=>j!==i)}))}>✕</button>
        </div>
      ))}
      <button className="addbtn2" onClick={()=>setF(o=>({...o,images:[...o.images,{url:"",title:"",source:""}]}))}>+ Add picture</button>

      <h5>Sources</h5>
      {f.sources.map((s,i)=>(
        <div className="listrow" key={i}>
          <input type="text" placeholder="label" value={s[0]} onChange={e=>setSrc(i,0,e.target.value)} style={{maxWidth:150}} />
          <input type="text" placeholder="URL" value={s[1]} onChange={e=>setSrc(i,1,e.target.value)} />
          <button className="rmbtn" onClick={()=>setF(o=>({...o,sources:o.sources.filter((_,j)=>j!==i)}))}>✕</button>
        </div>
      ))}
      <button className="addbtn2" onClick={()=>setF(o=>({...o,sources:[...o.sources,["",""]]}))}>+ Add source</button>

      {err && <div className="authmsg err" style={{marginTop:10}}>{err}</div>}
      <div><button className="save" onClick={save} disabled={busy}>{busy?"Saving…":"Save changes"}</button>
        <button className="cancel" onClick={onCancel} disabled={busy}>Cancel</button></div>
    </div>
  );
}

function VerifyPage({plants, state, plan, toggle, verifyToggle, removeImage, updatePlant}){
  const [q,setQ]=useState("");
  const [filt,setFilt]=useState("all"); // all | yes | no
  const [editingId,setEditingId]=useState(null);
  const nver=plants.filter(p=>p.humanVerified).length;
  const view=plants.filter(p=>{
    if(filt==="yes" && !p.humanVerified) return false;
    if(filt==="no" && p.humanVerified) return false;
    if(q){ const s=(p.common+" "+p.sci).toLowerCase(); if(!s.includes(q.toLowerCase())) return false; }
    return true;
  });
  return (
    <div>
      <div className="pagehead">
        <div className="eye">Human Verify · {nver}/{plants.length} verified</div>
        <h2>Verify plant data</h2>
        <p>Review each plant against its sources, then mark it <b>Human Verified</b>. Verified plants show a check in the Database. Only your account can see this page.</p>
      </div>
      <div className="controls">
        <div className="fld search"><label>Search name</label>
          <input value={q} onChange={e=>setQ(e.target.value)} placeholder="e.g. pawpaw or Asimina" /></div>
      </div>
      <div className="toggles">
        <button className={"chip"+(filt==="all"?" on":"")} onClick={()=>setFilt("all")}>All</button>
        <button className={"chip"+(filt==="yes"?" on":"")} onClick={()=>setFilt("yes")}>Verified</button>
        <button className={"chip"+(filt==="no"?" on":"")} onClick={()=>setFilt("no")}>Unverified</button>
      </div>
      <div className="count">{view.length} shown</div>
      {view.map(p=>(
        <div key={p.id}>
          <PlantCard p={p} state={state} inPlan={plan.includes(p.id)} toggle={toggle} />
          <div className="vbar">
            <div className="vrow">
              <label>
                <input type="checkbox" checked={!!p.humanVerified}
                       onChange={e=>verifyToggle(p.id, e.target.checked)} />
                Human Verified
              </label>
              <button className="editbtn" onClick={()=>setEditingId(editingId===p.id?null:p.id)}>
                {editingId===p.id?"Close editor":"✎ Edit data"}</button>
            </div>
            {editingId===p.id && <PlantEditor p={p} onSave={updatePlant} onCancel={()=>setEditingId(null)} />}
            {(p.images||[]).length>0 && (
              <div className="vphotos">
                <dt>Photos ({p.images.length}) — remove any wrong ones</dt>
                <div className="vthumbs">
                  {p.images.map((im)=>(
                    <div className="vthumb" key={im.url} title={im.title||""}>
                      <img src={im.url} alt={im.title||""} loading="lazy" />
                      <button className="rm" title="Remove this photo"
                              onClick={()=>{ if(confirm("Remove this photo (and its source) from "+p.common+"?")) removeImage(p.id, im.url); }}>✕</button>
                    </div>
                  ))}
                </div>
              </div>
            )}
            <div className="vsrc">
              <dt>All sources ({(p.sources||[]).length})</dt>
              {(p.sources||[]).map((s,i)=><a key={i} href={s[1]} target="_blank" rel="noreferrer">↗ {s[0]}</a>)}
            </div>
          </div>
        </div>
      ))}
      {view.length===0 && <div className="empty">No plants match those filters.</div>}
    </div>
  );
}

/* ---------- Soil Exam page ---------- */
function MultiSelect({label, options, value, onChange}){
  const [open,setOpen]=useState(false);
  const toggle=o=>onChange(value.includes(o)?value.filter(x=>x!==o):[...value,o]);
  return (
    <div className="msfield">
      <label>{label}</label>
      <div className="mscontrol" onClick={()=>setOpen(o=>!o)}>
        {value.length ? value.map(v=><span className="mschip" key={v}>{v.replace(/ \(.*/,"")}</span>) : <span className="msph">Any</span>}
        <span className="mschev">▼</span>
      </div>
      {open && (
        <div className="msmenu">
          {options.map(o=>(
            <div key={o} className={"msopt"+(value.includes(o)?" on":"")} onClick={()=>toggle(o)}>
              <span className="box">{value.includes(o)?"✓":""}</span>{o}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}
function FitDot({v, label}){ return <span className={"fdot "+fitCls(v)} title={label}>{v>=1?"✓":(v>=0.5?"~":"✕")}</span>; }

function SoilExam({plants, state, plan, toggle, soil, setSoil}){
  const [editing,setEditing]=useState(false);
  const [declined,setDeclined]=useState([]);
  const selTex=soil.tex, selDr=soil.dr, selPhL=soil.phL;
  const setSelTex=v=>setSoil(s=>({...s,tex:v})), setSelDr=v=>setSoil(s=>({...s,dr:v})), setSelPhL=v=>setSoil(s=>({...s,phL:v}));

  const sel={tex:selTex, dr:selDr, ph:PH_BANDS.filter(b=>selPhL.includes(b.label))};
  const planPlants=plants.filter(p=>plan.includes(p.id)).map(p=>({p, f:soilFit(p,sel)}))
    .sort((a,b)=>b.f.pct-a.f.pct);
  const total=planPlants.length;
  const goodCount=planPlants.filter(x=>x.f.pct>=GOOD_FIT).length;
  const avgPct=total?Math.round(planPlants.reduce((a,x)=>a+x.f.pct,0)/total):0;
  const suggestions=plants.filter(p=>!plan.includes(p.id) && !declined.includes(p.id))
    .map(p=>({p, f:soilFit(p,sel)})).filter(x=>x.f.pct>=GOOD_FIT)
    .sort((a,b)=>b.f.pct-a.f.pct).slice(0,5);

  const insights=[];
  if(total){
    insights.push(<div className="sinsight" key="a"><b>{goodCount} of {total}</b> plants in your plan are a good fit ({GOOD_FIT}%+) for this soil.</div>);
    const fails={Texture:0,Drainage:0,pH:0};
    planPlants.forEach(({f})=>{ if(f.t<1)fails.Texture++; if(f.d<1)fails.Drainage++; if(f.h<1)fails.pH++; });
    const worst=Object.entries(fails).sort((a,b)=>b[1]-a[1])[0];
    if(worst[1]>0) insights.push(<div className="sinsight" key="b"><b>{worst[0]}</b> is the most common mismatch ({worst[1]} plant{worst[1]>1?"s":""}) — amend the soil or lean on the suggestions.</div>);
    const poor=planPlants.filter(x=>x.f.pct<40).map(x=>x.p.common);
    if(poor.length) insights.push(<div className="sinsight" key="c" style={{borderColor:"var(--red)"}}><b>Poor fit:</b> {poor.join(", ")} may struggle here.</div>);
    if(!poor.length && goodCount===total) insights.push(<div className="sinsight" key="d" style={{borderColor:"var(--green)"}}>Every plant in your plan suits this soil — nicely matched.</div>);
  } else {
    insights.push(<div className="sinsight" key="e">Add plants to your plan to see how well they fit this soil.</div>);
  }

  return (
    <div>
      <div className="pagehead">
        <div className="eye">Soil Exam</div><h2>Match your plan to your soil</h2>
        <p>Set your soil's texture, drainage, and pH — then see how well your plan fits and what else would thrive.</p>
      </div>

      {editing ? (
        <div className="soiledit">
          <div className="grid">
            <MultiSelect label="Texture" options={TEXTURES} value={selTex} onChange={setSelTex} />
            <MultiSelect label="Drainage" options={DRAINAGE} value={selDr} onChange={setSelDr} />
            <MultiSelect label="Soil pH" options={PH_BANDS.map(b=>b.label)} value={selPhL} onChange={setSelPhL} />
          </div>
          <button className="done" onClick={()=>setEditing(false)}>Done</button>
        </div>
      ) : (
        <div className="soilprof">
          <div className="eyes">Your soil profile</div>
          <div className="at"><label>Texture</label><div className="v">{selTex.join(", ")||"Any"}</div></div>
          <div className="at"><label>Drainage</label><div className="v">{selDr.join(", ")||"Any"}</div></div>
          <div className="at"><label>Soil pH</label><div className="v">{selPhL.map(l=>l.replace(/ \(.*/,"")).join(", ")||"Any"}</div></div>
          <button className="edit" onClick={()=>setEditing(true)}>Edit soil</button>
        </div>
      )}

      <div className="soilcols">
        <div className="swidget">
          <div className="wh"><span>Soil insights</span></div>
          {insights}
        </div>

        <div className="swidget">
          <div className="wh"><span>Overall soil fit · your plan</span></div>
          <div className="sfmetrics">
            <div className="sfmetric"><b style={{color:pctColor(avgPct)}}>{avgPct}%</b><span>Average fit</span></div>
            <div className="sfmetric"><b>{goodCount}/{total}</b><span>Good fits ({GOOD_FIT}%+)</span></div>
          </div>
          {total ? (
            <table className="smatrix">
              <thead><tr><th className="l">Plant</th><th>Tex</th><th>Drain</th><th>pH</th><th>Fit</th></tr></thead>
              <tbody>
                {planPlants.map(({p,f})=>(
                  <tr key={p.id}>
                    <td className="l">{p.common}<span className="ovmini" style={{background:bandColor(overall(p,state)),color:bandText(overall(p,state))}}>{overall(p,state)}</span></td>
                    <td><FitDot v={f.t} label="Texture" /></td>
                    <td><FitDot v={f.d} label="Drainage" /></td>
                    <td><FitDot v={f.h} label="pH" /></td>
                    <td><span className="fpct" style={{color:pctColor(f.pct)}}>{f.pct}%</span></td>
                  </tr>
                ))}
              </tbody>
            </table>
          ) : <div className="empty">No plants in your plan yet.</div>}
          <div style={{fontFamily:"'Space Mono'",fontSize:10,color:"var(--faint)",marginTop:9}}>✓ match · ~ near · ✕ off</div>
        </div>

        <div className="swidget">
          <div className="wh"><span>Suggested for this soil</span></div>
          {suggestions.length ? suggestions.map(({p,f})=>(
            <div className="ssug" key={p.id}>
              <div className="top"><span className="nm">{p.common}<span className="ovmini" style={{background:bandColor(overall(p,state)),color:bandText(overall(p,state))}}>{overall(p,state)}</span></span><span className="fpct" style={{color:pctColor(f.pct)}}>{f.pct}%</span></div>
              <div className="dots"><FitDot v={f.t} label="Texture" /><FitDot v={f.d} label="Drainage" /><FitDot v={f.h} label="pH" /></div>
              <div className="acts">
                <button className="add" onClick={()=>toggle(p.id)}>✓ Add</button>
                <button onClick={()=>setDeclined(d=>[...d,p.id])}>✕ Decline</button>
              </div>
            </div>
          )) : <div style={{fontSize:13,color:"var(--faint)"}}>No more good-fit suggestions — all have been added or declined.</div>}
        </div>
      </div>
    </div>
  );
}

/* ---------- Menu + App shell ---------- */
const PAGES=[["db","Database"],["plan","My Plan"],["guide","Scoring Guide"],["data","Raw Data"]];
function App(){
  const [page,setPage]=useState("db");
  const [menu,setMenu]=useState(false);
  const [state,setState]=useState("NY");
  const [plants,setPlants]=useState([]);
  const [plan,setPlan]=useState([]);
  const [loadErr,setLoadErr]=useState(null);
  const [user,setUser]=useState(null);
  const [authReady,setAuthReady]=useState(false);

  // track the auth session
  useEffect(()=>{
    auth.getSession().then(({data})=>{ setUser(data.session?.user||null); setAuthReady(true); });
    const { data:sub } = auth.onChange(u=>{ setUser(u); });
    return ()=> sub.subscription.unsubscribe();
  },[]);

  // load data whenever we have a signed-in user
  useEffect(()=>{
    if(!user){ setPlants([]); setPlan([]); setLoadErr(null); return; }
    (async()=>{
      try{
        const [pl, plan] = await Promise.all([dataProvider.getPlants(), dataProvider.loadPlan()]);
        setPlants(pl); setPlan(plan);
      }catch(err){ console.error(err); setLoadErr(err.message||String(err)); }
    })();
  },[user]);

  const toggle=id=>{
    const have=plan.includes(id);
    setPlan(pl=> have ? pl.filter(x=>x!==id) : [...pl,id]); // optimistic
    (have ? dataProvider.removePlant(id) : dataProvider.addPlant(id))
      .catch(err=>{ console.error(err); setPlan(pl=> have ? [...pl,id] : pl.filter(x=>x!==id)); }); // revert on failure
  };
  const verifyToggle=(id,val)=>{
    setPlants(ps=>ps.map(p=>p.id===id?{...p,humanVerified:val}:p)); // optimistic
    dataProvider.setVerified(id,val).catch(err=>{ console.error(err);
      setPlants(ps=>ps.map(p=>p.id===id?{...p,humanVerified:!val}:p)); }); // revert on failure
  };
  const removeImage=(id,url)=>{
    const p=plants.find(x=>x.id===id); if(!p) return;
    const img=(p.images||[]).find(im=>im.url===url);
    const images=(p.images||[]).filter(im=>im.url!==url);
    // also drop the matching photo source (by its Commons url) so they stay in sync
    const sources=(img&&img.source)
      ? (p.sources||[]).filter(s=>!(Array.isArray(s)&&s[1]===img.source)) : (p.sources||[]);
    const prevImg=p.images, prevSrc=p.sources;
    setPlants(ps=>ps.map(x=>x.id===id?{...x,images,sources}:x)); // optimistic
    dataProvider.saveImages(id,images,sources).catch(err=>{ console.error(err);
      setPlants(ps=>ps.map(x=>x.id===id?{...x,images:prevImg,sources:prevSrc}:x)); }); // revert
  };
  const updatePlant=async(id,patch)=>{
    const updated=await dataProvider.updatePlant(id,patch); // throws on failure
    setPlants(ps=>ps.map(p=>p.id===id?updated:p));
  };
  const go=p=>{ setPage(p); setMenu(false); };
  const signOut=async()=>{ setMenu(false); await auth.signOut(); };

  // gate: wait for auth, then require sign-in
  if(!authReady) return <div className="wrap"><div className="empty">Loading…</div></div>;
  if(!user) return <Auth/>;

  const isAdmin = user.email === ADMIN_EMAIL;
  const navPages = isAdmin ? [...PAGES, ["verify","Human Verify"]] : PAGES;

  return (
    <div>
      <div className="topbar">
        <div className="brand">
          <span className="acc">Native Plant Database</span>
          <h1>Food Forest Planner</h1>
        </div>
        <button className="ham" aria-label="Menu" onClick={()=>setMenu(true)}><i></i><i></i><i></i></button>
      </div>

      <div className={"menu"+(menu?" open":"")}>
        <div className="scrim" onClick={()=>setMenu(false)}></div>
        <div className="panel">
          <div className="ttl">Navigate</div>
          {navPages.map(([k,label],i)=>(
            <button key={k} className={page===k?"active":""} onClick={()=>go(k)}>
              {label}<span className="num">0{i+1}{k==="plan"&&plan.length?` · ${plan.length}`:""}</span>
            </button>
          ))}
          <button className="close" onClick={()=>setMenu(false)}>Close ✕</button>
          <div className="userbar">
            <span className="em" title={user.email}>{user.email}</span>
            <button onClick={signOut}>Sign out</button>
          </div>
        </div>
      </div>

      <div className="wrap">
        {loadErr ? (
          <div className="empty" style={{borderColor:"var(--red)",color:"var(--ink)"}}>
            <b>Couldn't reach Supabase.</b>
            <div style={{margin:"8px 0",fontFamily:"'Space Mono'",fontSize:12,color:"var(--red)"}}>{loadErr}</div>
            Check that you pasted your <b>Project URL</b> and <b>anon key</b> in the CONFIG block,
            that the <b>Email</b> provider is enabled, and that you ran both SQL files.
          </div>
        ) : plants.length===0 ? <div className="empty">Loading plants…</div> : (
          page==="db" ? <Database plants={plants} state={state} setState={setState} plan={plan} toggle={toggle} /> :
          page==="plan" ? <MyPlan plants={plants} state={state} plan={plan} toggle={toggle} go={go} /> :
          page==="guide" ? <ScoringGuide /> :
          (page==="verify" && isAdmin) ? <VerifyPage plants={plants} state={state} plan={plan} toggle={toggle} verifyToggle={verifyToggle} removeImage={removeImage} updatePlant={updatePlant} /> :
          <RawData plants={plants} state={state} />
        )}
        <footer className="disclaimer">The contents of this website, such as text, graphics, images, and other material contained on this site (“Content”) are for informational purposes only. The Content is not intended to be a substitute for professional medical advice, diagnosis, or treatment. Caution must be used when utilizing any Content from this website and all Content must be verified by a reliable source before use. The creators of this website accept no liability or responsibility should any damage or injury occur as a result of the use that is made of the Content herein.</footer>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
