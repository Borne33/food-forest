function PlanFilter({plans, value, onChange}){
  const [open,setOpen]=useState(false);
  useEffect(()=>{ if(!open) return; const h=()=>setOpen(false);
    document.addEventListener("click",h); return ()=>document.removeEventListener("click",h); },[open]);
  const toggle=id=>onChange(value.includes(id)?value.filter(x=>x!==id):[...value,id]);
  const chosen=plans.filter(p=>value.includes(p.id));
  return (
    <div className="msfield" onClick={e=>e.stopPropagation()}>
      <label>Filter by plan</label>
      <div className="mscontrol" onClick={()=>setOpen(o=>!o)}>
        {chosen.length ? chosen.map(p=><span className="mschip" key={p.id} style={{background:p.color,color:textOn(p.color),borderColor:p.color}}>{p.name}</span>)
                       : <span className="msph">Any plan</span>}
        <span className="mschev">▼</span>
      </div>
      {open && (
        <div className="msmenu">
          {plans.map(p=>(
            <div key={p.id} className={"msopt"+(value.includes(p.id)?" on":"")} onClick={()=>toggle(p.id)}>
              <span className="box">{value.includes(p.id)?"✓":""}</span>
              <span style={{display:"inline-block",width:11,height:11,borderRadius:3,background:p.color,flex:"0 0 auto"}}></span>{p.name}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}
function FitDot({v, label}){ return <span className={"fdot "+fitCls(v)} title={label}>{v>=1?"✓":(v>=0.5?"~":"✕")}</span>; }

function SoilExam({plants, state, plan, toggle, soil, setSoil, soilDerived}){
  const [editing,setEditing]=useState(false);
  const [declined,setDeclined]=useState([]);
  const selTex=soil.tex, selDr=soil.dr, selPhL=soil.phL;
  // mismatch between the painted soil map (dominant) and the manual exam inputs
  const mism=[];
  if(soilDerived){
    if(soilDerived.tex.length && !soilDerived.tex.every(t=>selTex.includes(t))) mism.push(["Texture",soilDerived.tex.join(", ")]);
    if(soilDerived.dr.length && !soilDerived.dr.every(t=>selDr.includes(t))) mism.push(["Drainage",soilDerived.dr.join(", ")]);
    if(soilDerived.phL.length && !soilDerived.phL.every(t=>selPhL.includes(t))) mism.push(["pH",soilDerived.phL.map(l=>l.replace(/ \(.*/,"")).join(", ")]);
  }
  const setSelTex=v=>setSoil(s=>({...s,tex:v})), setSelDr=v=>setSoil(s=>({...s,dr:v})), setSelPhL=v=>setSoil(s=>({...s,phL:v}));

  const sel={tex:selTex, dr:selDr, ph:PH_BANDS.filter(b=>selPhL.includes(b.label))};
  const planPlants=plants.filter(p=>plan.includes(p.id)).map(p=>({p, f:soilFit(p,sel)}))
    .sort((a,b)=>b.f.pct-a.f.pct);
  const total=planPlants.length;
  const goodCount=planPlants.filter(x=>x.f.pct>=GOOD_FIT).length;
  const avgPct=total?Math.round(planPlants.reduce((a,x)=>a+x.f.pct,0)/total):0;
  const suggestions=plants.filter(p=>!plan.includes(p.id) && !declined.includes(p.id))
    .map(p=>({p, f:soilFit(p,sel)})).filter(x=>x.f.pct>=GOOD_FIT)
    .sort((a,b)=>b.f.pct-a.f.pct).slice(0,5);

  const insights=[];
  if(total){
    insights.push(<div className="sinsight" key="a"><b>{goodCount} of {total}</b> plants in your plan are a good fit ({GOOD_FIT}%+) for this soil.</div>);
    const fails={Texture:0,Drainage:0,pH:0};
    planPlants.forEach(({f})=>{ if(f.t<1)fails.Texture++; if(f.d<1)fails.Drainage++; if(f.h<1)fails.pH++; });
    const worst=Object.entries(fails).sort((a,b)=>b[1]-a[1])[0];
    if(worst[1]>0) insights.push(<div className="sinsight" key="b"><b>{worst[0]}</b> is the most common mismatch ({worst[1]} plant{worst[1]>1?"s":""}) — amend the soil or lean on the suggestions.</div>);
    const poor=planPlants.filter(x=>x.f.pct<40).map(x=>x.p.common);
    if(poor.length) insights.push(<div className="sinsight" key="c" style={{borderColor:"var(--red)"}}><b>Poor fit:</b> {poor.join(", ")} may struggle here.</div>);
    if(!poor.length && goodCount===total) insights.push(<div className="sinsight" key="d" style={{borderColor:"var(--green)"}}>Every plant in your plan suits this soil — nicely matched.</div>);
  } else {
    insights.push(<div className="sinsight" key="e">Add plants to your plan to see how well they fit this soil.</div>);
  }

  return (
    <div>
      <div className="pagehead">
        <div className="eye">Soil Exam</div><h2>Match your plan to your soil</h2>
        <p>Set your soil's texture, drainage, and pH — then see how well your plan fits and what else would thrive.</p>
      </div>

      {mism.length>0 && (
        <div className="sinsight" style={{borderColor:"var(--orange)",background:"#f6ead6",marginBottom:14}}>
          <b>Heads up — your Soil Exam doesn't match your painted soil map.</b> The map's dominant {mism.map(m=>m[0]).join(", ")} ({mism.map(m=>m[0]+": "+m[1]).join(" · ")}) differ{mism.length===1?"s":""} from the values set here. Adjust below to match, or keep your manual values.
        </div>
      )}

      {editing ? (
        <div className="soiledit">
          <div className="grid">
            <MultiSelect label="Texture" options={TEXTURES} value={selTex} onChange={setSelTex} />
            <MultiSelect label="Drainage" options={DRAINAGE} value={selDr} onChange={setSelDr} />
            <MultiSelect label="Soil pH" options={PH_BANDS.map(b=>b.label)} value={selPhL} onChange={setSelPhL} />
          </div>
          <button className="done" onClick={()=>setEditing(false)}>Done</button>
        </div>
      ) : (
        <div className="soilprof">
          <div className="eyes">Your soil profile</div>
          <div className="at"><label>Texture</label><div className="v">{selTex.join(", ")||"Any"}</div></div>
          <div className="at"><label>Drainage</label><div className="v">{selDr.join(", ")||"Any"}</div></div>
          <div className="at"><label>Soil pH</label><div className="v">{selPhL.map(l=>l.replace(/ \(.*/,"")).join(", ")||"Any"}</div></div>
          <button className="edit" onClick={()=>setEditing(true)}>Edit soil</button>
        </div>
      )}

      <div className="soilcols">
        <div className="swidget">
          <div className="wh"><span>Soil insights</span></div>
          {insights}
        </div>

        <div className="swidget">
          <div className="wh"><span>Overall soil fit · your plan</span></div>
          <div className="sfmetrics">
            <div className="sfmetric"><b style={{color:pctColor(avgPct)}}>{avgPct}%</b><span>Average fit</span></div>
            <div className="sfmetric"><b>{goodCount}/{total}</b><span>Good fits ({GOOD_FIT}%+)</span></div>
          </div>
          {total ? (
            <table className="smatrix">
              <thead><tr><th className="l">Plant</th><th>Tex</th><th>Drain</th><th>pH</th><th>Fit</th></tr></thead>
              <tbody>
                {planPlants.map(({p,f})=>(
                  <tr key={p.id}>
                    <td className="l">{p.common}<span className="ovmini" style={{background:bandColor(overall(p,state)),color:bandText(overall(p,state))}}>{overall(p,state)}</span></td>
                    <td><FitDot v={f.t} label="Texture" /></td>
                    <td><FitDot v={f.d} label="Drainage" /></td>
                    <td><FitDot v={f.h} label="pH" /></td>
                    <td><span className="fpct" style={{color:pctColor(f.pct)}}>{f.pct}%</span></td>
                  </tr>
                ))}
              </tbody>
            </table>
          ) : <div className="empty">No plants in your plan yet.</div>}
          <div style={{fontFamily:"'Space Mono'",fontSize:10,color:"var(--faint)",marginTop:9}}>✓ match · ~ near · ✕ off</div>
        </div>

        <div className="swidget">
          <div className="wh"><span>Suggested for this soil</span></div>
          {suggestions.length ? suggestions.map(({p,f})=>(
            <div className="ssug" key={p.id}>
              <div className="top"><span className="nm">{p.common}<span className="ovmini" style={{background:bandColor(overall(p,state)),color:bandText(overall(p,state))}}>{overall(p,state)}</span></span><span className="fpct" style={{color:pctColor(f.pct)}}>{f.pct}%</span></div>
              <div className="dots"><FitDot v={f.t} label="Texture" /><FitDot v={f.d} label="Drainage" /><FitDot v={f.h} label="pH" /></div>
              <div className="acts">
                <button className="add" onClick={()=>toggle(p.id)}>✓ Add</button>
                <button onClick={()=>setDeclined(d=>[...d,p.id])}>✕ Decline</button>
              </div>
            </div>
          )) : <div style={{fontSize:13,color:"var(--faint)"}}>No more good-fit suggestions — all have been added or declined.</div>}
        </div>
      </div>
    </div>
  );
}

/* ---------- Menu + App shell ---------- */
const PAGES=[["db","Database"],["plan","My Plans"],["guide","Scoring Guide"],["data","Raw Data"]];
// palette for plan pills; new plans cycle through these
const PLAN_COLORS=["#6b8f5a","#b5651d","#4a7a96","#9c6b9e","#c99a2e","#7a8b3f","#a5504d","#4f8a7b"];
// readable text color (dark/light) for a given hex background
function textOn(hex){
  const h=(hex||"#6b8f5a").replace("#",""); const r=parseInt(h.slice(0,2),16), g=parseInt(h.slice(2,4),16), b=parseInt(h.slice(4,6),16);
  return (0.299*r+0.587*g+0.114*b)>150 ? "#2b2a22" : "#fff";
}
function App(){
  const [page,setPage]=useState("db");
  const [menu,setMenu]=useState(false);
  const [state,setState]=useState("NY");
  const [plants,setPlants]=useState([]);
  const [plans,setPlans]=useState([]);          // [{id,name,color}]
  const [planItems,setPlanItems]=useState([]);  // [{planId,plantId}]
  const [curPlan,setCurPlan]=useState(null);    // plan currently shown on the My Plans page
  const [loadErr,setLoadErr]=useState(null);
  const [user,setUser]=useState(null);
  const [authReady,setAuthReady]=useState(false);

  // track the auth session
  useEffect(()=>{
    auth.getSession().then(({data})=>{ setUser(data.session?.user||null); setAuthReady(true); });
    const { data:sub } = auth.onChange(u=>{ setUser(u); });
    return ()=> sub.subscription.unsubscribe();
  },[]);

  // load data whenever we have a signed-in user
  useEffect(()=>{
    if(!user){ setPlants([]); setPlans([]); setPlanItems([]); setCurPlan(null); setLoadErr(null); return; }
    (async()=>{
      try{
        const [pl, pns, items] = await Promise.all([dataProvider.getPlants(), dataProvider.loadPlans(), dataProvider.loadPlanItems()]);
        let list=pns;
        if(list.length===0){ list=[await dataProvider.createPlan("My Plan", PLAN_COLORS[0])]; } // brand-new user
        setPlants(pl); setPlans(list); setPlanItems(items);
        setCurPlan(c=> (c && list.some(p=>p.id===c)) ? c : list[0].id);
      }catch(err){ console.error(err); setLoadErr(err.message||String(err)); }
    })();
  },[user]);

  // membership map: plantId -> [planId,...]
  const membership=useMemo(()=>{
    const m={}; planItems.forEach(it=>{ (m[it.plantId]||(m[it.plantId]=[])).push(it.planId); }); return m;
  },[planItems]);

  const toggle=(plantId, planId)=>{
    planId = planId || curPlan; if(!planId) return;
    const have = planItems.some(it=>it.planId===planId && it.plantId===plantId);
    setPlanItems(items=> have ? items.filter(it=>!(it.planId===planId&&it.plantId===plantId)) : [...items,{planId,plantId}]); // optimistic
    (have ? dataProvider.removePlant(plantId,planId) : dataProvider.addPlant(plantId,planId))
      .catch(err=>{ console.error(err); setPlanItems(items=> have ? [...items,{planId,plantId}] : items.filter(it=>!(it.planId===planId&&it.plantId===plantId))); });
  };
  const newPlan=async(name)=>{
    const color=PLAN_COLORS[plans.length % PLAN_COLORS.length];
    const d=await dataProvider.createPlan((name&&name.trim())||("Plan "+(plans.length+1)), color);
    setPlans(ps=>[...ps,d]); setCurPlan(d.id); return d;
  };
  const renamePlan=(id,name)=>{
    const nm=(name||"").trim(); if(!nm) return;
    setPlans(ps=>ps.map(p=>p.id===id?{...p,name:nm}:p)); // optimistic
    dataProvider.renamePlan(id,nm).catch(err=>console.error(err));
  };
  const deletePlan=async(id)=>{
    await dataProvider.deletePlan(id); // membership rows cascade
    const rest=plans.filter(p=>p.id!==id);
    setPlanItems(items=>items.filter(it=>it.planId!==id));
    if(rest.length===0){ const d=await dataProvider.createPlan("My Plan", PLAN_COLORS[0]); setPlans([d]); setCurPlan(d.id); }
    else { setPlans(rest); if(curPlan===id) setCurPlan(rest[0].id); }
  };
  const verifyToggle=(id,val)=>{
    setPlants(ps=>ps.map(p=>p.id===id?{...p,humanVerified:val}:p)); // optimistic
    dataProvider.setVerified(id,val).catch(err=>{ console.error(err);
      setPlants(ps=>ps.map(p=>p.id===id?{...p,humanVerified:!val}:p)); }); // revert on failure
  };
  const removeImage=(id,url)=>{
    const p=plants.find(x=>x.id===id); if(!p) return;
    const img=(p.images||[]).find(im=>im.url===url);
    const images=(p.images||[]).filter(im=>im.url!==url);
    // also drop the matching photo source (by its Commons url) so they stay in sync
    const sources=(img&&img.source)
      ? (p.sources||[]).filter(s=>!(Array.isArray(s)&&s[1]===img.source)) : (p.sources||[]);
    const prevImg=p.images, prevSrc=p.sources;
    setPlants(ps=>ps.map(x=>x.id===id?{...x,images,sources}:x)); // optimistic
    dataProvider.saveImages(id,images,sources).catch(err=>{ console.error(err);
      setPlants(ps=>ps.map(x=>x.id===id?{...x,images:prevImg,sources:prevSrc}:x)); }); // revert
  };
  const updatePlant=async(id,patch)=>{
    const updated=await dataProvider.updatePlant(id,patch); // throws on failure
    setPlants(ps=>ps.map(p=>p.id===id?updated:p));
  };
  const go=p=>{ setPage(p); setMenu(false); };
  const signOut=async()=>{ setMenu(false); await auth.signOut(); };

  // gate: wait for auth, then require sign-in
  if(!authReady) return <div className="wrap"><div className="empty">Loading…</div></div>;
  if(!user) return <Auth/>;

  const isAdmin = user.email === ADMIN_EMAIL;
  const navPages = isAdmin ? [...PAGES, ["verify","Human Verify"]] : PAGES;

  return (
    <div>
      <div className="topbar">
        <div className="brand">
          <span className="acc">Native Plant Database</span>
          <h1>Food Forest Planner</h1>
        </div>
        <button className="ham" aria-label="Menu" onClick={()=>setMenu(true)}><i></i><i></i><i></i></button>
      </div>

      <div className={"menu"+(menu?" open":"")}>
        <div className="scrim" onClick={()=>setMenu(false)}></div>
        <div className="panel">
          <div className="ttl">Navigate</div>
          {navPages.map(([k,label],i)=>(
            k==="plan" ? (
              <React.Fragment key={k}>
                <button className={page==="plan"?"active":""} onClick={()=>go("plan")}>
                  {label}<span className="num">0{i+1}</span>
                </button>
                {plans.map(pn=>(
                  <button key={pn.id} className={"plannav"+(page==="plan"&&curPlan===pn.id?" active":"")}
                    onClick={()=>{ setCurPlan(pn.id); go("plan"); }}>
                    <span className="dot" style={{background:pn.color}}></span>
                    <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{pn.name}</span>
                    <span className="num" style={{marginLeft:"auto"}}>{planItems.filter(it=>it.planId===pn.id).length}</span>
                  </button>
                ))}
                <button className="plannav newp" onClick={async()=>{ const nm=prompt("Name your new plan:",""); if(nm===null) return; try{ await newPlan(nm); go("plan"); }catch(e){ alert("Couldn't create plan: "+(e.message||e)); } }}>+ New plan</button>
              </React.Fragment>
            ) : (
              <button key={k} className={page===k?"active":""} onClick={()=>go(k)}>
                {label}<span className="num">0{i+1}</span>
              </button>
            )
          ))}
          <button className="close" onClick={()=>setMenu(false)}>Close ✕</button>
          <div className="userbar">
            <span className="em" title={user.email}>{user.email}</span>
            <button onClick={signOut}>Sign out</button>
          </div>
        </div>
      </div>

      <div className="wrap">
        {loadErr ? (
          <div className="empty" style={{borderColor:"var(--red)",color:"var(--ink)"}}>
            <b>Couldn't reach Supabase.</b>
            <div style={{margin:"8px 0",fontFamily:"'Space Mono'",fontSize:12,color:"var(--red)"}}>{loadErr}</div>
            Check that you pasted your <b>Project URL</b> and <b>anon key</b> in the CONFIG block,
            that the <b>Email</b> provider is enabled, and that you ran both SQL files.
          </div>
        ) : plants.length===0 ? <div className="empty">Loading plants…</div> : (
          page==="db" ? <Database plants={plants} state={state} setState={setState} plans={plans} membership={membership} toggle={toggle} /> :
          page==="plan" ? <MyPlan plants={plants} state={state} plans={plans} planItems={planItems} curPlan={curPlan} setCurPlan={setCurPlan} membership={membership} toggle={toggle} newPlan={newPlan} renamePlan={renamePlan} deletePlan={deletePlan} go={go} /> :
          page==="guide" ? <ScoringGuide /> :
          (page==="verify" && isAdmin) ? <VerifyPage plants={plants} state={state} plans={plans} membership={membership} toggle={toggle} verifyToggle={verifyToggle} removeImage={removeImage} updatePlant={updatePlant} /> :
          <RawData plants={plants} state={state} />
        )}
        <footer className="disclaimer">The contents of this website, such as text, graphics, images, and other material contained on this site (“Content”) are for informational purposes only. The Content is not intended to be a substitute for professional medical advice, diagnosis, or treatment. Caution must be used when utilizing any Content from this website and all Content must be verified by a reliable source before use. The creators of this website accept no liability or responsibility should any damage or injury occur as a result of the use that is made of the Content herein.</footer>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
