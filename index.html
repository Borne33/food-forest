<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Native Food Forest Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,600;0,800;1,400;1,600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<!-- Leaflet + Leaflet.draw (Planting Plan map): pinned versions, no build step -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
<style>
  :root{
    --paper:#f3efe3; --paper2:#ece7d7; --ink:#2b2a22; --ink2:#5b5743; --faint:#6c6750;
    --line:#c9c2ab; --dot:#c2bba2; --sage:#6f8a5f; --sage-d:#42603a;
    --blue:#3b82f6; --green:#46a34a; --ygreen:#9bbf3a; --yellow:#e0b932; --orange:#e8923c; --red:#dd4b3e;
    --soil:#7a5a34; --soil-d:#5c421f; --soil-bg:#efe4d0; --soil-line:#d8c39c;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--paper);color:var(--ink);font-family:'Spectral',Georgia,serif;line-height:1.5;-webkit-font-smoothing:antialiased}
  .mono{font-family:'Space Mono',ui-monospace,monospace}
  a{color:var(--sage-d)}
  button{font-family:inherit;cursor:pointer}
  /* ---------- chrome ---------- */
  .topbar{position:sticky;top:0;z-index:40;background:var(--paper);border-bottom:1.5px solid var(--ink);
    display:flex;align-items:center;justify-content:space-between;padding:12px 18px}
  .brand{display:flex;flex-direction:column;line-height:1.05}
  .brand .acc{font-family:'Space Mono';font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--faint)}
  .brand h1{margin:2px 0 0;font-size:21px;font-weight:800;letter-spacing:-.01em}
  .ham{border:1.5px solid var(--ink);background:var(--paper);border-radius:3px;width:42px;height:38px;display:flex;flex-direction:column;gap:4px;align-items:center;justify-content:center}
  .ham i{display:block;width:18px;height:2px;background:var(--ink)}
  .menu{position:fixed;inset:0;z-index:50;display:none}
  .menu.open{display:block}
  .menu .scrim{position:absolute;inset:0;background:rgba(20,18,10,.32)}
  .menu .panel{position:absolute;top:0;right:0;height:100%;width:min(320px,86vw);background:var(--paper);
    border-left:1.5px solid var(--ink);padding:18px;display:flex;flex-direction:column;gap:4px;box-shadow:-20px 0 50px -30px #000}
  .menu .panel .ttl{font-family:'Space Mono';font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--faint);margin:6px 4px 10px}
  .menu .panel button{text-align:left;border:0;background:transparent;font-family:'Spectral';font-size:18px;font-weight:600;
    padding:12px 12px;border-radius:4px;color:var(--ink);display:flex;justify-content:space-between;align-items:center}
  .menu .panel button:hover{background:var(--paper2)}
  .menu .panel button.active{background:var(--ink);color:var(--paper)}
  .menu .panel button .num{font-family:'Space Mono';font-size:11px;opacity:.6}
  .menu .close{margin-top:auto;border:1.5px solid var(--ink);border-radius:3px;background:transparent;padding:10px;font-family:'Space Mono';font-size:12px;letter-spacing:.1em;text-transform:uppercase}
  .wrap{max-width:1020px;margin:0 auto;padding:22px 18px 90px}
  .pagehead{border-bottom:1px solid var(--line);padding-bottom:14px;margin-bottom:18px}
  .pagehead .eye{font-family:'Space Mono';font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--faint)}
  .pagehead h2{margin:6px 0 4px;font-size:30px;font-weight:800;letter-spacing:-.02em}
  .pagehead p{margin:0;color:var(--ink2);max-width:680px}
  /* ---------- controls ---------- */
  .controls{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;margin-bottom:8px}
  .fld{display:flex;flex-direction:column;gap:4px}
  .fld label{font-family:'Space Mono';font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint)}
  .fld input,.fld select{font-family:'Spectral';font-size:15px;background:#fbf9f2;border:1.5px solid var(--line);border-radius:4px;padding:8px 10px;color:var(--ink)}
  .fld input:focus,.fld select:focus{outline:2px solid var(--sage);outline-offset:1px;border-color:var(--sage)}
  .search{min-width:230px;flex:1 1 230px}
  .dirbtn{border:1.5px solid var(--line);background:#fbf9f2;border-radius:4px;height:39px;width:42px;font-family:'Space Mono';font-size:16px}
  .toggles{display:flex;flex-wrap:wrap;gap:7px;margin:10px 0 4px}
  .chip{font-family:'Space Mono';font-size:11px;letter-spacing:.04em;border:1.5px solid var(--line);background:#fbf9f2;border-radius:99px;padding:6px 12px;color:var(--ink2)}
  .chip.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .count{font-family:'Space Mono';font-size:12px;color:var(--faint);margin:12px 2px 6px}
  .pager{display:flex;flex-wrap:wrap;gap:6px;align-items:center;justify-content:center;margin:14px 0}
  .pager button{font-family:'Space Mono';font-size:12px;border:1.5px solid var(--line);background:#fbf9f2;border-radius:4px;padding:6px 11px;color:var(--ink)}
  .pager button.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .pager button:disabled{opacity:.4;cursor:default}
  .pager .pgnum{font-family:'Space Mono';font-size:12px;color:var(--faint);padding:0 8px}
  /* ---------- Soil Exam ---------- */
  .msfield{position:relative;display:flex;flex-direction:column;gap:4px}
  .msfield>label{font-family:'Space Mono';font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint)}
  .mscontrol{min-height:39px;border:1.5px solid var(--soil-line);background:#fbf9f2;border-radius:4px;padding:5px 8px;display:flex;flex-wrap:wrap;gap:5px;align-items:center;cursor:pointer}
  .mschip{font-family:'Space Mono';font-size:11px;background:var(--soil-bg);color:var(--soil-d);border:1px solid var(--soil-line);border-radius:99px;padding:2px 8px}
  .msph{font-family:'Space Mono';font-size:12px;color:var(--faint)}
  .mschev{margin-left:auto;color:var(--soil);font-size:12px}
  .msmenu{position:absolute;top:100%;left:0;right:0;z-index:20;margin-top:4px;background:#fbf9f2;border:1.5px solid var(--soil-line);border-radius:5px;box-shadow:0 14px 30px -18px #000;overflow-y:auto;max-height:300px}
  .msopt{display:flex;align-items:center;gap:8px;padding:8px 11px;font-size:14px;cursor:pointer}
  .msopt:hover{background:var(--soil-bg)}
  .msopt .box{width:16px;height:16px;border:1.5px solid var(--soil-line);border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--paper)}
  .msopt.on .box{background:var(--soil-d);border-color:var(--soil-d)}
  .soilprof{background:var(--soil-bg);border:1.5px solid var(--soil-line);border-radius:6px;padding:14px 16px;display:flex;flex-wrap:wrap;align-items:center;gap:14px 22px;margin-bottom:16px}
  .soilprof .eyes{font-family:'Space Mono';font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--soil);flex-basis:100%}
  .soilprof .at label{font-family:'Space Mono';font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--soil);display:block}
  .soilprof .at .v{font-size:15px;color:var(--soil-d);font-weight:600}
  .soilprof .edit{margin-left:auto;align-self:center;border:1.5px solid var(--soil-d);background:transparent;color:var(--soil-d);border-radius:4px;padding:8px 13px;font-family:'Space Mono';font-size:11px;letter-spacing:.06em;text-transform:uppercase}
  .soiledit{background:var(--soil-bg);border:1.5px solid var(--soil-line);border-radius:6px;padding:14px 16px;margin-bottom:16px}
  .soiledit .grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
  .soiledit .done{margin-top:12px;border:1.5px solid var(--soil-d);background:var(--soil-d);color:var(--paper);border-radius:4px;padding:8px 16px;font-family:'Space Mono';font-size:11px;letter-spacing:.06em;text-transform:uppercase}
  .soilcols{display:grid;grid-template-columns:minmax(0,0.85fr) minmax(0,1.5fr) minmax(0,1fr);gap:14px;align-items:start}
  .swidget{border:1px solid var(--soil-line);background:#f7f1e6;border-radius:6px;padding:13px 15px}
  .swidget .wh{font-family:'Space Mono';font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--soil);border-bottom:1.5px solid var(--soil-line);padding-bottom:7px;margin-bottom:11px;display:flex;align-items:center;gap:6px}
  .sfmetrics{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
  .sfmetric{background:var(--soil-bg);border-radius:5px;padding:10px 12px}
  .sfmetric b{display:block;font-family:'Space Mono';font-size:24px;line-height:1.1}
  .sfmetric span{font-family:'Space Mono';font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--soil)}
  .smatrix{width:100%;border-collapse:collapse;font-size:13px}
  .smatrix th{font-family:'Space Mono';font-size:9px;letter-spacing:.04em;text-transform:uppercase;color:var(--faint);font-weight:400;text-align:center;padding:4px 3px;border-bottom:1.5px solid var(--soil-line)}
  .smatrix th.l{text-align:left}
  .smatrix td{padding:6px 3px;border-bottom:1px solid var(--soil-line);text-align:center}
  .smatrix td.l{text-align:left}
  .fdot{width:18px;height:18px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;color:#fff}
  .fdot.ok{background:var(--green)} .fdot.mid{background:var(--yellow);color:#2b2a22} .fdot.no{background:var(--red)}
  .fpct{font-family:'Space Mono';font-size:13px;font-weight:700}
  .ovmini{font-family:'Space Mono';font-size:11px;font-weight:700;padding:1px 6px;border-radius:3px;margin-left:6px}
  .ssug{border-bottom:1px solid var(--soil-line);padding:9px 0}
  .ssug:last-child{border-bottom:0}
  .ssug .top{display:flex;align-items:center;gap:8px}
  .ssug .nm{font-size:14px;flex:1;min-width:0}
  .ssug .dots{display:flex;gap:4px;margin:6px 0}
  .ssug .acts{display:flex;gap:6px}
  .ssug .acts button{flex:1;font-family:'Space Mono';font-size:11px;border:1.5px solid var(--soil-line);border-radius:4px;padding:4px 0;background:#fbf9f2;color:var(--soil-d);display:inline-flex;align-items:center;justify-content:center;gap:4px}
  .ssug .acts button.add{background:var(--sage-d);border-color:var(--sage-d);color:var(--paper)}
  .sinsight{border-left:3px solid var(--soil);background:var(--soil-bg);padding:8px 11px;border-radius:0 4px 4px 0;margin-bottom:8px;font-size:13.5px;color:var(--ink)}
  @media(max-width:820px){ .soilcols{grid-template-columns:1fr} .soiledit .grid{grid-template-columns:1fr} }
  /* ---------- plant card (Herbarium) ---------- */
  .card{background:#f7f4ea;border:1px solid var(--line);border-radius:3px;box-shadow:0 1px 0 #fff inset, 0 10px 24px -22px #000;margin-bottom:14px;overflow:hidden}
  .card .head{display:flex;align-items:flex-start;gap:14px;padding:15px 18px 12px;border-bottom:1.5px solid var(--ink);cursor:pointer}
  .card .head .info{flex:1 1 auto;min-width:0}
  .card .head .rgt{display:flex;align-items:flex-start;gap:12px;flex:0 0 auto}
  /* image carousel on the collapsed card */
  .pcar{flex:0 0 auto;width:132px}
  .pcar .frame{position:relative;width:132px;height:100px;border:1px solid var(--line);border-radius:4px;overflow:hidden;background:#efeadc}
  .pcar img{width:100%;height:100%;object-fit:cover;display:block}
  .pcar .nav{position:absolute;top:50%;transform:translateY(-50%);width:22px;height:22px;border-radius:99px;border:1px solid var(--line);
    background:rgba(247,244,234,.9);color:var(--ink);font-family:'Space Mono';font-size:12px;line-height:1;display:flex;align-items:center;justify-content:center;padding:0}
  .pcar .nav.l{left:4px} .pcar .nav.r{right:4px}
  .pcar .cap{font-family:'Space Mono';font-size:8.5px;color:var(--faint);text-align:center;margin-top:3px;line-height:1.25;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .pcar .dots{position:absolute;bottom:4px;left:0;right:0;display:flex;justify-content:center;gap:4px}
  .pcar .dots i{width:5px;height:5px;border-radius:99px;background:rgba(43,42,34,.35)}
  .pcar .dots i.on{background:var(--paper)}
  /* ---------- My Plan: layered mini cards ---------- */
  .layer{margin-bottom:22px}
  .layer h4{font-family:'Space Mono';font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink);
    border-bottom:1.5px solid var(--ink);padding-bottom:6px;margin:0 0 12px;display:flex;justify-content:space-between;align-items:baseline}
  .layer h4 span{font-size:10px;color:var(--faint)}
  .minigrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
  .mini{position:relative;border:1px solid var(--line);border-radius:5px;background:#f7f4ea;overflow:hidden;box-shadow:0 8px 20px -20px #000}
  .mini .mtop{position:relative;background:#efeadc;min-height:40px}
  .mini .pcar.full{width:100%}
  .mini .pcar.full .frame{width:100%;height:120px;border:0;border-radius:0}
  .mini .pcar .cap{display:none}
  .mini .mscore{position:absolute;top:6px;right:6px;z-index:3;font-family:'Space Mono';font-weight:700;font-size:15px;
    padding:2px 8px;border-radius:3px;box-shadow:0 1px 5px rgba(0,0,0,.35)}
  .mini .mrm{position:absolute;top:6px;left:6px;z-index:3;width:20px;height:20px;border-radius:99px;border:0;
    background:rgba(20,18,10,.55);color:#fff;font-family:'Space Mono';font-size:11px;line-height:1;
    display:flex;align-items:center;justify-content:center;padding:0}
  .mini{cursor:pointer}
  .mini .pcar .dots{display:none}
  .mini .mname{font-size:15px;font-weight:800;line-height:1.15;padding:9px 10px 0}
  .mini .msci{font-style:italic;color:var(--ink2);font-size:12.5px;padding:1px 10px 11px}
  /* harvest strip + fruit token overlaid on the image (no extra card height) */
  .mini .mstrip{position:absolute;left:0;right:0;bottom:0;z-index:2;display:flex;align-items:center;gap:5px;
    background:linear-gradient(transparent,rgba(20,18,10,.72) 45%);padding:14px 8px 5px;pointer-events:none}
  .mini .mstrip .harv{font-family:'Space Mono';font-size:9px;letter-spacing:.02em;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .mini .mstrip .fru{flex:0 0 auto;font-family:'Space Mono';font-size:9px;font-weight:700;color:#2b2a22;background:#f0d9a8;border-radius:3px;padding:1px 5px}
  /* left-click detail modal */
  .pmodal{position:fixed;inset:0;z-index:60;display:flex;align-items:flex-start;justify-content:center;padding:38px 14px;overflow:auto}
  .pmodal .scrim{position:fixed;inset:0;background:rgba(20,18,10,.42)}
  .pmodal .inner{position:relative;z-index:1;width:100%;max-width:720px}
  .pmodal .x{position:absolute;top:-32px;right:0;background:transparent;border:1.5px solid var(--paper);color:var(--paper);
    border-radius:3px;font-family:'Space Mono';font-size:12px;letter-spacing:.08em;text-transform:uppercase;padding:6px 12px}
  /* human-verified badge (collapsed card, left of the overall score) */
  .vchk{text-align:center;align-self:start}
  .vchk b{display:flex;align-items:center;justify-content:center;width:34px;height:34px;margin:0 auto;border-radius:99px;
    background:var(--sage-d);color:var(--paper);font-size:18px;line-height:1}
  .vchk small{font-family:'Space Mono';font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--sage-d);display:block;margin-top:4px;font-weight:700}
  /* verify page */
  .vbar{border:1px solid var(--line);border-top:0;border-radius:0 0 4px 4px;background:#faf7ef;padding:12px 16px;margin:-14px 0 16px}
  .vbar .vrow{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .vbar label{display:flex;align-items:center;gap:9px;font-family:'Space Mono';font-size:13px;letter-spacing:.03em;
    text-transform:uppercase;color:var(--ink);cursor:pointer;font-weight:700}
  .vbar input[type=checkbox]{width:20px;height:20px;accent-color:var(--sage-d);cursor:pointer}
  .vbar .vsrc{margin-top:10px}
  .vbar .vsrc dt{font-family:'Space Mono';font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin-bottom:4px}
  .vbar .vsrc a{display:block;font-family:'Space Mono';font-size:12px;margin:2px 0;color:var(--sage-d);word-break:break-all}
  .vbar .vphotos{margin-top:12px}
  .vbar .vphotos dt{font-family:'Space Mono';font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin-bottom:4px}
  .vbar .vthumbs{display:flex;flex-wrap:wrap;gap:8px}
  .vbar .vthumb{position:relative;width:74px;height:56px;border:1px solid var(--line);border-radius:4px;overflow:hidden;background:#efeadc}
  .vbar .vthumb img{width:100%;height:100%;object-fit:cover;display:block}
  .vbar .vthumb .rm{position:absolute;top:2px;right:2px;width:19px;height:19px;border-radius:99px;border:0;
    background:rgba(221,75,62,.94);color:#fff;font-family:'Space Mono';font-size:11px;line-height:1;
    display:flex;align-items:center;justify-content:center;padding:0}
  .vbar .vrow{justify-content:space-between}
  .editbtn{border:1.5px solid var(--sage-d);background:transparent;color:var(--sage-d);border-radius:4px;padding:5px 11px;font-family:'Space Mono';font-size:11px;letter-spacing:.05em;text-transform:uppercase}
  .peditor{border:1.5px solid var(--sage-d);border-radius:6px;background:#f4f7ee;padding:14px 16px;margin:10px 0 16px}
  .peditor h5{font-family:'Space Mono';font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--sage-d);margin:15px 0 7px;border-bottom:1px solid var(--line);padding-bottom:4px}
  .peditor h5:first-child{margin-top:0}
  .peditor .frow{display:grid;grid-template-columns:120px 1fr;gap:8px;align-items:start;margin-bottom:6px}
  .peditor .frow>label{font-family:'Space Mono';font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--faint);padding-top:7px}
  .peditor input,.peditor textarea,.peditor select{width:100%;font-family:'Spectral';font-size:14px;background:#fbf9f2;border:1.5px solid var(--line);border-radius:4px;padding:6px 8px;color:var(--ink)}
  .peditor textarea{min-height:50px;resize:vertical}
  .peditor .checks{display:flex;flex-wrap:wrap;gap:8px 16px}
  .peditor .checks label{display:flex;align-items:center;gap:5px;font-family:'Space Mono';font-size:12px;color:var(--ink)}
  .peditor .checks input{width:auto}
  .peditor .scorerow{display:grid;grid-template-columns:110px 62px 1fr;gap:8px;align-items:center;margin-bottom:5px}
  .peditor .listrow{display:flex;gap:6px;margin-bottom:5px;align-items:center}
  .peditor .rmbtn{flex:0 0 auto;width:30px;border:1.5px solid var(--line);background:#fbf9f2;border-radius:4px;padding:5px 0;font-family:'Space Mono';font-size:12px;color:var(--red)}
  .peditor .addbtn2{border:1.5px dashed var(--line);background:transparent;border-radius:4px;padding:5px 11px;font-family:'Space Mono';font-size:11px;color:var(--ink2);margin-top:3px}
  .peditor .save{border:1.5px solid var(--sage-d);background:var(--sage-d);color:var(--paper);border-radius:4px;padding:9px 18px;font-family:'Space Mono';font-size:12px;letter-spacing:.06em;text-transform:uppercase;margin:14px 8px 0 0}
  .peditor .cancel{border:1.5px solid var(--line);background:transparent;color:var(--ink);border-radius:4px;padding:9px 18px;font-family:'Space Mono';font-size:12px;letter-spacing:.06em;text-transform:uppercase;margin-top:14px}
  .card .acc{font-family:'Space Mono';font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint)}
  .card h3{margin:5px 0 1px;font-size:22px;font-weight:800;letter-spacing:-.01em}
  .card .sci{font-style:italic;color:var(--ink2);font-size:15px}
  .card .ov{text-align:center;align-self:start}
  .card .ov b{display:block;font-family:'Space Mono';font-size:28px;line-height:1;padding:9px 12px;border-radius:3px;min-width:62px}
  .card .ov small{font-family:'Space Mono';font-size:9px;letter-spacing:.14em;color:var(--faint);display:block;margin-top:4px}
  .pills{display:flex;flex-wrap:wrap;gap:6px;margin:9px 0 2px}

function regionGroupOf(st){
  for(const g in REGION){ if(REGION[g].includes(st)) return g; }
  return "Other";
}
// native_regions is derived from native_states: a region is flagged when the
// plant covers >=50% of that region's states (mirrors the importer).
function deriveRegions(states){
  const set=new Set(states||[]);
  return Object.keys(REGION).filter(r=>{ const rs=REGION[r]; return rs.filter(s=>set.has(s)).length*2 >= rs.length; });
}

/* ---------- Scoring engine ---------- */
const TIER = {P:"peer-reviewed",E:"ethnobotanical",A:"anecdotal",N:"no evidence"};
const WEIGHTS = {nativity:4, raw:2, cooked:2, life:1, eco:1, materials:0.7, med:0.3};

function nativity(p, st){
  if(p.invasiveEverywhere || (p.invasiveStates||[]).includes(st)) return {v:-5,label:"Invasive here"};
  if((p.nativeStates||[]).includes(st)) return {v:10,label:"Native to "+st};
  if((p.nativeRegions||[]).includes(regionGroupOf(st))) return {v:8,label:"Native to region"};
  if(p.nativeToUS) return {v:5,label:"Native to US"};
  if(p.nativeNorthAmerica) return {v:4,label:"Native to North America"};
  if(p.nativeAmericas) return {v:3,label:"Native to the Americas"};
  return {v:0,label:"Not native"};
}
function overall(p, st){
  const nat = nativity(p,st).v;
  const s=p.s;
  const total = nat*WEIGHTS.nativity + s.raw[0]*WEIGHTS.raw + s.cooked[0]*WEIGHTS.cooked
    + s.life[0]*WEIGHTS.life + s.eco[0]*WEIGHTS.eco + s.materials[0]*WEIGHTS.materials + s.med[0]*WEIGHTS.med;
  return Math.round(total*10)/10;
}
function bandColor(score){ // 0-100 scale
  if(score>=90) return "var(--blue)";
  if(score>=80) return "var(--green)";
  if(score>=70) return "var(--ygreen)";
  if(score>=55) return "var(--yellow)";
  if(score>=30) return "var(--orange)";
  return "var(--red)";
}
function bandText(score){ return (score>=70 && score<80)||(score>=55&&score<70) ? "#2b2a22" : "#fff"; }
function catColor(v){ return bandColor(v*10); }
function catText(v){ return bandText(v*10); }

/* ---- harvest-season parsing + fruit helpers (My Plan insights) ---- */
const SEASONS=["Spring","Summer","Fall","Winter"];
function harvestSeasons(p){
  const t=(p.harvest||"").toLowerCase(); const s=new Set();
  if(/year|any season/.test(t)){ SEASONS.forEach(x=>s.add(x)); return s; }
  if(/spring/.test(t)) s.add("Spring");
  if(/summer/.test(t)) s.add("Summer");
  if(/fall|autumn/.test(t)) s.add("Fall");
  if(/winter/.test(t)) s.add("Winter");
  const M={jan:"Winter",feb:"Winter",mar:"Spring",apr:"Spring",may:"Spring",jun:"Summer",jul:"Summer",aug:"Summer",sep:"Fall",oct:"Fall",nov:"Fall",dec:"Winter"};
  for(const m in M){ if(t.includes(m)) s.add(M[m]); }
  return s;
}
function isFood(p){ return Math.max(p.s.raw[0], p.s.cooked[0]) >= 5; }
function fruitLabel(p){
  if(!p.minPlantsFruit) return null;
  return p.minPlantsFruit>=2 ? p.minPlantsFruit+" to fruit" : "Self-fruitful";
}
/* show "No Data Found" for empty fields (matters most for lesser-known plants) */
function nd(v){ return (v!=null && String(v).trim()!=="") ? v : "No Data Found"; }

/* ---- Soil Exam: fit model ---- */
const TEXTURES=["Sandy","Loam","Clay","Silt"];
const DRAINAGE=["Well-drained","Moist","Wet"]; // ordered dry -> wet
const PH_BANDS=[
  {label:"Acidic (4.5–5.5)", lo:4.5, hi:5.5},
  {label:"Slightly acidic (5.5–6.5)", lo:5.5, hi:6.5},
  {label:"Neutral (6.5–7.5)", lo:6.5, hi:7.5},
  {label:"Alkaline (7.5–8.5)", lo:7.5, hi:8.5},
];
const GOOD_FIT=66; // % threshold for a "good fit"
function parsePh(txt){ const m=(txt||"").match(/(\d+(?:\.\d+)?)\s*[–-]\s*(\d+(?:\.\d+)?)/); return m?[parseFloat(m[1]),parseFloat(m[2])]:null; }
function texScore(plantTex, sel){
  if(!sel.length) return 1;
  const set=new Set(plantTex||[]);
  if(sel.some(t=>set.has(t))) return 1;
  return (plantTex||[]).length>=3 ? 0.5 : 0; // adaptable = partial
}
function drainScore(plantDr, sel){
  if(!sel.length) return 1;
  const set=new Set(plantDr||[]);
  if(sel.some(d=>set.has(d))) return 1;
  const idx=d=>DRAINAGE.indexOf(d);
  const near=sel.some(sd=>(plantDr||[]).some(pd=>Math.abs(idx(pd)-idx(sd))===1));
  return near?0.5:0;
}
function phScore(plantPh, selBands){
  if(!selBands.length) return 1;
  const r=parsePh(plantPh); if(!r) return 0.5;
  const [plo,phi]=r;
  if(selBands.some(b=>plo<=b.hi && phi>=b.lo)) return 1;         // overlap
  if(selBands.some(b=>plo-0.5<=b.hi && phi+0.5>=b.lo)) return 0.5; // within 0.5
  return 0;
}
function soilFit(p, sel){
  const t=texScore(p.soilTexture,sel.tex), d=drainScore(p.soilDrainage,sel.dr), h=phScore(p.soilPh,sel.ph);
  return {t,d,h, pct:Math.round((t+d+h)/3*100)};
}
function fitCls(v){ return v>=1?"ok":(v>=0.5?"mid":"no"); }
function pctColor(pct){ return pct>=GOOD_FIT?"var(--green)":(pct>=40?"var(--yellow)":"var(--red)"); }

/* ---- Risk register: severity from each plant's Risk text ---- */
function riskSeverity(p){
  const raw=p.risks||""; const t=raw.toLowerCase().trim();
  if(!t || /^(none|no significant|no notable|not a food)/.test(t) || /no significant (hazard|toxicity)|none significant|no meaningful/.test(t)) return "low";
  if(/TOXIC|POISON|HIGHLY/.test(raw) || /poison|fatal|deadly|severely toxic|highly toxic|cytisine|aristolochic|carcinogen|all parts/.test(t)) return "high";
  if(/toxic|cyanogenic|irritat|sting|saponin|nausea|laxativ|emetic|acrid|photosensit|pyrrolizidine|caution|pregnan|hallucin|ergot|kidney|hepato|thorn|spine|prickl|bitter/.test(t)) return "mod";
  return "low";
}
const RISK_META={high:{label:"High",dot:"#9a2c22"}, mod:{label:"Moderate",dot:"#dd4b3e"}, low:{label:"Low",dot:"#b98c82"}};
const RISK_ORDER={high:0, mod:1, low:2};
function RiskRegister({chosen}){
  const rows=chosen.map(p=>({p, sev:riskSeverity(p)}))
    .sort((a,b)=>RISK_ORDER[a.sev]-RISK_ORDER[b.sev] || a.p.common.localeCompare(b.p.common));
  const counts={high:0,mod:0,low:0}; rows.forEach(r=>counts[r.sev]++);
  return (
    <div className="riskwrap">
      <div className="risksum">
        <span className="rpill hi">{counts.high} high</span>
        <span className="rpill mo">{counts.mod} moderate</span>
        <span className="rpill lo">{counts.low} low or none</span>
      </div>
      {rows.map(({p,sev})=>(
        <div className="rrow" key={p.id}>
          <span className="rdot" style={{background:RISK_META[sev].dot}}></span>
          <div className="rnm">{p.common}<span className="rtag" style={{color:RISK_META[sev].dot}}>{RISK_META[sev].label}</span></div>
          <div className="rtxt">{p.risks || "No significant hazards noted."}</div>
        </div>
      ))}
    </div>
  );
}

/* Add-to-plan control: a single toggle button when there's one plan, else a
   dropdown of plans (each row toggles membership; a plant can be in several). */
function AddToPlan({p, plans, memberOf, toggle}){
  const [open,setOpen]=useState(false);
  useEffect(()=>{ if(!open) return; const h=()=>setOpen(false);
    document.addEventListener("click",h); return ()=>document.removeEventListener("click",h); },[open]);
  const inSet=new Set(memberOf||[]);
  if((plans||[]).length<=1){
    const pl=plans[0]; if(!pl) return null;
    const inPlan=inSet.has(pl.id);
    return <button className={"addbtn"+(inPlan?" in":"")} onClick={e=>{e.stopPropagation();toggle(p.id,pl.id);}}>
      {inPlan?"★ In your plan — remove":"+ Add to my plan"}</button>;
  }
  const count=(memberOf||[]).length;
  return (
    <div className="addwrap" onClick={e=>e.stopPropagation()}>
      <button className={"addbtn"+(count?" in":"")} onClick={()=>setOpen(o=>!o)}>
        {count?`★ In ${count} plan${count>1?"s":""} — edit ▾`:"+ Add to a plan ▾"}
      </button>
      {open && (
        <div className="planmenu">
          {plans.map(pl=>{ const inP=inSet.has(pl.id); return (
            <button key={pl.id} className="prow" onClick={()=>toggle(p.id,pl.id)}>
              <span className="dot" style={{background:pl.color}}></span>
              <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{pl.name}</span>
              <span className="chk">{inP?"✓ added":"+ add"}</span>
            </button>
          );})}
        </div>
      )}
    </div>
  );
}

/* ---------- Database page ---------- */
function Pager({page, pageCount, go}){
  if(pageCount<=1) return null;
  const many=pageCount>12;
  const nums=[]; for(let i=1;i<=pageCount;i++) nums.push(i);
  return (
    <div className="pager">
      <button disabled={page<=1} onClick={()=>go(page-1)}>‹ Prev</button>
      {many
        ? <span className="pgnum">Page {page} of {pageCount}</span>
        : nums.map(n=><button key={n} className={n===page?"on":""} onClick={()=>go(n)}>{n}</button>)}
      <button disabled={page>=pageCount} onClick={()=>go(page+1)}>Next ›</button>
    </div>
  );
}

function Database({plants, state, setState, plans, membership, toggle}){
  const inAnyPlan=id=>!!(membership[id]&&membership[id].length);
  const [q,setQ]=useState("");
  const [sortKey,setSortKey]=useState("overall");
  const [dir,setDir]=useState(-1); // -1 desc, 1 asc
  const [types,setTypes]=useState([]); // active type filters
  const [flags,setFlags]=useState({nf:false,pol:false,raw:false,cooked:false,plan:false,notplan:false,deer:false,dec:false});
  const [batch,setBatch]=useState("all"); // added-batch filter (by created_at cluster)
  const [planFilter,setPlanFilter]=useState([]); // selected plan ids to filter by (empty = any)
  const [foodF,setFoodF]=useState([]), [matF,setMatF]=useState([]), [lifeF,setLifeF]=useState([]); // food/material/lifecycle filters

  const allTypes=[...new Set(plants.map(p=>p.type))];
  // distinct batches with their add-date + count, for the "Added batch" dropdown
  const batches=useMemo(()=>{
    const m=new Map();
    plants.forEach(p=>{ if(p.batch==null) return;
      const b=m.get(p.batch)||{n:p.batch,count:0,date:p.createdAt};
      b.count++; if(p.createdAt && (!b.date || p.createdAt<b.date)) b.date=p.createdAt;
      m.set(p.batch,b); });
    return [...m.values()].sort((a,b)=>a.n-b.n);
  },[plants]);
  const fmtDate=d=>d?new Date(d).toLocaleDateString(undefined,{month:"short",day:"numeric",year:"numeric"}):"";
  const toggleType=t=>setTypes(ts=>ts.includes(t)?ts.filter(x=>x!==t):[...ts,t]);
  const toggleFlag=f=>setFlags(s=>({...s,[f]:!s[f]}));

  const view=useMemo(()=>{
    let arr=plants.filter(p=>{
      if(q){const s=(p.common+" "+p.sci).toLowerCase(); if(!s.includes(q.toLowerCase())) return false;}
      if(types.length && !types.includes(p.type)) return false;
      if(flags.nf && !p.nf) return false;
      if(flags.pol && !p.pol) return false;
      if(flags.raw && p.s.raw[0]<5) return false;
      if(flags.cooked && p.s.cooked[0]<5) return false;
      if(flags.deer && !p.deerResistant) return false;
      if(flags.dec && !p.decPriority) return false;
      if(planFilter.length && !planFilter.some(pid=>(membership[p.id]||[]).includes(pid))) return false;
      if(foodF.length && !foodF.some(t=>(p.foodTypes||[]).includes(t))) return false;
      if(matF.length && !matF.some(t=>(p.materialTypes||[]).includes(t))) return false;
      if(lifeF.length && !lifeF.includes(p.lifecycle)) return false;
      if(flags.notplan && inAnyPlan(p.id)) return false;
      if(batch!=="all" && String(p.batch)!==batch) return false;
      return true;
    });
    const val=p=>{
      if(sortKey==="overall") return overall(p,state);
      if(sortKey==="nativity") return nativity(p,state).v;
      if(sortKey==="name") return p.common.toLowerCase();
      return p.s[sortKey][0];
    };
    arr.sort((a,b)=>{const va=val(a),vb=val(b); if(va<vb)return -1*dir; if(va>vb)return 1*dir; return 0;});
    return arr;
  },[plants,q,types,flags,sortKey,dir,state,membership,batch,planFilter,foodF,matF,lifeF]);

  // pagination: cap at 100 plants per page
  const PER_PAGE=100;
  const [page,setPage]=useState(1);
  const pageCount=Math.max(1, Math.ceil(view.length/PER_PAGE));
  const curPage=Math.min(page, pageCount);
  const pageItems=view.slice((curPage-1)*PER_PAGE, curPage*PER_PAGE);
  useEffect(()=>{ setPage(1); },[q,types,flags,sortKey,dir,state,batch,planFilter,foodF,matF,lifeF]); // reset to page 1 on filter change
  useEffect(()=>{ setPlanFilter(pf=>pf.filter(id=>plans.some(p=>p.id===id))); },[plans]); // drop deleted plans
  const goPage=n=>{ setPage(n); window.scrollTo({top:0,behavior:"smooth"}); };

  return (
    <div>
      <div className="pagehead">
        <div className="eye">Database · {plants.length} plants</div>
        <h2>Browse native plants</h2>
        <p>Scores update to your state. Tap any card to expand details and sources, and add plants to your plan.</p>
      </div>

      <div className="statebar">
        <span className="lbl">My state</span>
        <select value={state} onChange={e=>setState(e.target.value)}>
          {STATES.map(s=><option key={s} value={s}>{STATE_NAMES[s]} ({s})</option>)}
        </select>
        <span className="note">Nativity is recalculated for {STATE_NAMES[state]} (10 in-state · 8 in-region · 5 in-US · 0 non-native · −5 invasive).</span>
      </div>

      <div className="controls">
        <div className="fld search"><label>Search name (common or scientific)</label>
          <input value={q} onChange={e=>setQ(e.target.value)} placeholder="e.g. hazelnut or Corylus" /></div>
        <div className="fld"><label>Sort by</label>
          <select value={sortKey} onChange={e=>setSortKey(e.target.value)}>
            <option value="overall">Overall score</option>
            <option value="nativity">Nativity</option>
            <option value="raw">Edible Raw</option>
            <option value="cooked">Edible Cooked</option>
            <option value="life">Lifecycle</option>
            <option value="eco">Ecology</option>
            <option value="materials">Materials</option>
            <option value="med">Medicinal</option>
            <option value="name">Name (A–Z)</option>
          </select></div>
        <div className="fld"><label>Added batch</label>
          <select value={batch} onChange={e=>setBatch(e.target.value)}>
            <option value="all">All batches</option>
            {batches.map(b=><option key={b.n} value={String(b.n)}>Batch {b.n} — {fmtDate(b.date)} ({b.count})</option>)}
          </select></div>
        <div style={{minWidth:180,flex:"1 1 180px"}}><PlanFilter plans={plans} value={planFilter} onChange={setPlanFilter} /></div>
        <button className="dirbtn" title="Toggle direction" onClick={()=>setDir(d=>-d)}>{dir===-1?"↓":"↑"}</button>
      </div>

      <div className="controls">
        <div style={{minWidth:170,flex:"1 1 170px"}}><MultiSelect label="Food type" options={FOOD_TYPES} value={foodF} onChange={setFoodF} /></div>
        <div style={{minWidth:170,flex:"1 1 170px"}}><MultiSelect label="Material type" options={MATERIAL_TYPES} value={matF} onChange={setMatF} /></div>
        <div style={{minWidth:170,flex:"1 1 170px"}}><MultiSelect label="Lifecycle" options={LIFECYCLES} value={lifeF} onChange={setLifeF} /></div>
      </div>

      <div className="toggles">
        {allTypes.map(t=><button key={t} className={"chip"+(types.includes(t)?" on":"")} onClick={()=>toggleType(t)}>{t}</button>)}
        <span style={{width:1,background:"var(--line)",margin:"0 3px"}}></span>
        <button className={"chip"+(flags.nf?" on":"")} onClick={()=>toggleFlag("nf")}>N-fixer</button>
        <button className={"chip"+(flags.pol?" on":"")} onClick={()=>toggleFlag("pol")}>Pollinator</button>
        <button className={"chip"+(flags.raw?" on":"")} onClick={()=>toggleFlag("raw")}>Good raw</button>
        <button className={"chip"+(flags.cooked?" on":"")} onClick={()=>toggleFlag("cooked")}>Good cooked</button>
        <button className={"chip"+(flags.deer?" on":"")} onClick={()=>toggleFlag("deer")}>Deer resistant</button>
        <button className={"chip"+(flags.dec?" on":"")} onClick={()=>toggleFlag("dec")}>NY priority</button>
        <button className={"chip"+(flags.notplan?" on":"")} onClick={()=>toggleFlag("notplan")}>Not in any plan</button>
      </div>

      <div className="count">{view.length} shown{pageCount>1?` · page ${curPage} of ${pageCount}`:""}</div>
      <Pager page={curPage} pageCount={pageCount} go={goPage} />
      {pageItems.map(p=><PlantCard key={p.id} p={p} state={state} plans={plans} memberOf={membership[p.id]} toggle={toggle} />)}
      {view.length===0 && <div className="empty">No plants match those filters. Clear a filter or search to see more.</div>}
      <Pager page={curPage} pageCount={pageCount} go={goPage} />
    </div>
  );
}

const TILE_LAYERS = [
  { name:"Map", url:"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", max:19, attr:"&copy; OpenStreetMap contributors" },

function ppAcronym(name){
  const w=(name||"").replace(/[^A-Za-z ]/g," ").split(/\s+/).filter(Boolean);
  if(!w.length) return "?";
  if(w.length===1) return w[0].slice(0,4).toUpperCase();
  return w.map(x=>x[0]).join("").slice(0,4).toUpperCase();
}
function ppCodes(plants){ // unique short marker label per plant within the plan
  const used={}, out={};
  plants.forEach(p=>{ let b=ppAcronym(p.common), c=b, i=2; while(used[c]){ c=b.slice(0,3)+i; i++; } used[c]=true; out[p.id]=c; });
  return out;
}

/* ---- Step 3 soil-mapping vocab. Keys MATCH the Soil Exam's TEXTURES /
   DRAINAGE / PH_BANDS labels so a painted map can feed the exam directly. ---- */
const SOIL_DEF = {

    {k:"Sandy", c:"#e3cd95", pat:"dots"},   // area symbols, USDA-style
    {k:"Silt",  c:"#cabf98", pat:"fine"},
    {k:"Loam",  c:"#b98c5a", pat:"solid"},

  ]},
